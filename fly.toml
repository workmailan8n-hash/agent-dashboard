# fly.toml app configuration file generated for agent-dashboard-ancient-mountain-4835 on 2026-04-17T20:12:44+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'agent-dashboard-ancient-mountain-4835'
primary_region = 'fra'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3737'

[http_service]
  internal_port = 3737
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/api/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
