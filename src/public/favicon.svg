<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#1e1830"/>

  <!-- Tail (curved) -->
  <path d="M 10 22 Q 2 20 4 12" stroke="#e8902a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 10 22 Q 2 20 4 12" stroke="#d07820" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Body -->
  <ellipse cx="16" cy="22" rx="8" ry="6" fill="#e8902a"/>
  <ellipse cx="16" cy="23" rx="4" ry="3" fill="#f5c870"/>
  <!-- Body stripes -->
  <path d="M 11 20 Q 12 19 13 20" stroke="#c07018" stroke-width="1" fill="none"/>
  <path d="M 19 20 Q 20 19 21 20" stroke="#c07018" stroke-width="1" fill="none"/>

  <!-- Front legs -->
  <rect x="12" y="26" width="3" height="3" rx="1.5" fill="#d07820"/>
  <rect x="17" y="26" width="3" height="3" rx="1.5" fill="#d07820"/>

  <!-- Head -->
  <ellipse cx="20" cy="13" rx="7" ry="6" fill="#e8902a"/>

  <!-- Ears (triangles) -->
  <polygon points="14,10 15,4 18,9" fill="#e8902a"/>
  <polygon points="15,8 16,5 17,8" fill="#ff79c6"/>
  <polygon points="22,9 25,4 26,10" fill="#e8902a"/>
  <polygon points="23,8 24,5 25,8" fill="#ff79c6"/>

  <!-- Eyes -->
  <ellipse cx="17" cy="12" rx="1.6" ry="2" fill="#1a1020"/>
  <ellipse cx="23" cy="12" rx="1.6" ry="2" fill="#1a1020"/>
  <!-- Eye highlights -->
  <circle cx="17.3" cy="11.3" r="0.6" fill="#ffcc20"/>
  <circle cx="23.3" cy="11.3" r="0.6" fill="#ffcc20"/>

  <!-- Nose -->
  <polygon points="19,15 21,15 20,16.5" fill="#ff79c6"/>
  <!-- Mouth -->
  <path d="M 20 16.5 Q 19 18 17.5 17.5" stroke="#2a1808" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  <path d="M 20 16.5 Q 21 18 22.5 17.5" stroke="#2a1808" stroke-width="0.8" fill="none" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="12" y1="14" x2="16" y2="14.5" stroke="#ffffff" stroke-width="0.5"/>
  <line x1="12" y1="16" x2="16" y2="15.5" stroke="#ffffff" stroke-width="0.5"/>
  <line x1="24" y1="14.5" x2="28" y2="14" stroke="#ffffff" stroke-width="0.5"/>
  <line x1="24" y1="15.5" x2="28" y2="16" stroke="#ffffff" stroke-width="0.5"/>
</svg>
