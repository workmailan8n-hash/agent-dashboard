<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Office</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<div id="loading-screen">
  <div class="loading-logo">▶ AGENT OFFICE</div>
  <canvas id="loading-canvas" width="320" height="80"></canvas>
  <div class="loading-status" id="loading-status">BOOTING SYSTEM...</div>
</div>

<div id="settings-backdrop"></div>
<div id="leaderboard-backdrop"></div>
<div id="leaderboard-panel">
  <div class="lb-header">
    <span>🏆 LEADERBOARD</span>
    <button class="lb-close" id="lb-close">×</button>
  </div>
  <div class="lb-tabs">
    <button class="lb-tab active" data-game="snake">🐍 SNAKE</button>
    <button class="lb-tab" data-game="darts">🎯 DARTS</button>
    <button class="lb-tab" data-game="pingpong">🏓 PING PONG</button>
  </div>
  <div class="lb-body" id="lb-body"></div>
</div>
<div id="settings-panel">
  <div class="settings-header">
    <span>⚙ SETTINGS</span>
    <button class="settings-close" id="settings-close">×</button>
  </div>
  <div class="settings-body">
    <div class="settings-row"><span>SOUND</span><div class="toggle on" data-key="sound"></div></div>
    <div class="settings-row"><span>PARTICLES</span><div class="toggle on" data-key="particles"></div></div>
    <div class="settings-row"><span>ANIMATIONS</span><div class="toggle on" data-key="animations"></div></div>
  </div>
</div>

<header>
  <div class="hz hz-logo">
    <span class="logo">▶ AGENT OFFICE <span class="blink">_</span></span>
  </div>
  <div class="hz hz-utils">
    <button id="btn-leaderboard">🏆 TOP</button>
    <button id="btn-settings">⚙ SET</button>
  </div>
  <div class="hz hz-info">
    <span id="agent-count" class="agent-count">0 agents</span>
    <div class="tunnel-status" id="tunnel-status" title="tunnel offline">
      <span class="led off"></span>
      <span class="tunnel-label">tunnel</span>
    </div>
    <a id="public-url" class="loading" href="#" target="_blank" style="display:none"></a>
  </div>
</header>

<div class="canvas-toolbar" id="canvas-toolbar"></div>
<div class="canvas-wrapper">
  <canvas id="office" width="1400" height="600"></canvas>
</div>

<div id="grid">
  <div id="mood-meter">
    <div class="mm-header">
      <span class="mm-label">📊 OFFICE MOOD</span>
      <span id="mm-emoji" class="mm-emoji">😐</span>
      <span id="mm-level" class="mm-level">CHILL</span>
    </div>
    <div class="mm-bar-track">
      <div id="mm-bar" class="mm-bar" style="width:0%"></div>
      <span id="mm-pct" class="mm-pct">0%</span>
    </div>
    <div id="mm-stats" class="mm-stats">— no agents —</div>
  </div>
</div>

<div class="conn">
  <div class="led" id="led"></div>
  <span id="conn-label">connecting</span>
</div>


<script type="module" src="./main.js"></script>
</body>
</html>
