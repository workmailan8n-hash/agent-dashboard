name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: node server.js &
      - run: sleep 3
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test
