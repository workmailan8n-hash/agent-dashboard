// ── Kanban board — shows myTasks on the office wall ──────────────
function drawKanban(ctx) {
  if (!myTasks || !COUCH_DEFS.length || KITCHEN_WALL_COL === 0) return;
  // Position: upper-right empty floor space (above kitchen partition, right of main desks)
  const bx = OX + (KITCHEN_WALL_COL + 1) * T;
  const by = OY + T * 1;
  const bw = T * 8.5, bh = T * 5;

  // Board background (corkboard feel)
  ctx.save();
  ctx.shadowColor = '#00000060'; ctx.shadowBlur = 8; ctx.shadowOffsetY = 3;
  ctx.fillStyle = '#6b4c28';
  ctx.fillRect(bx, by, bw, bh);
  ctx.restore();
  ctx.fillStyle = '#c8a870';
  ctx.fillRect(bx + 2, by + 2, bw - 4, bh - 4);

  // Header
  ctx.fillStyle = '#3d2a0a';
  ctx.font = "bold 7px monospace";
  ctx.textAlign = 'center';
  ctx.fillText('KANBAN', bx + bw/2, by + 11);

  // Divider line
  ctx.fillStyle = '#a08050';
  ctx.fillRect(bx + 2, by + 14, bw - 4, 1);

  // Two columns
  const colW = (bw - 6) / 2;
  const col1x = bx + 3, col2x = bx + 3 + colW + 2;
  const colY = by + 18;

  // Column headers
  ctx.font = "bold 6px monospace";
  ctx.textAlign = 'left';
  ctx.fillStyle = '#e0af68'; ctx.fillText('TODO', col1x + 2, colY);
  ctx.fillStyle = '#9ece6a'; ctx.fillText('DONE', col2x + 2, colY);
  ctx.fillStyle = '#a08050';
  ctx.fillRect(bx + colW + 5, by + 14, 1, bh - 14); // column divider

  // Task cards
  const todo = myTasks.filter(t => t.status === 'todo').slice(0, 5);
  const done = myTasks.filter(t => t.status === 'done').slice(0, 5);
  const cardH = 10, gap = 2;

  todo.forEach((task, i) => {
    const cy2 = colY + 4 + i * (cardH + gap);
    if (cy2 + cardH > by + bh - 2) return;
    ctx.fillStyle = '#e0af6830';
    ctx.fillRect(col1x, cy2, colW - 1, cardH);
    ctx.fillStyle = '#e0af68';
    ctx.fillRect(col1x, cy2, 2, cardH); // priority bar
    ctx.fillStyle = '#3d2a0a';
    ctx.font = '5px monospace';
    const label = task.title.substring(0, 14);
    ctx.fillText(label, col1x + 4, cy2 + 7);
  });

  done.forEach((task, i) => {
    const cy2 = colY + 4 + i * (cardH + gap);
    if (cy2 + cardH > by + bh - 2) return;
    ctx.fillStyle = '#9ece6a20';
    ctx.fillRect(col2x, cy2, colW - 1, cardH);
    ctx.fillStyle = '#9ece6a';
    ctx.fillRect(col2x, cy2, 2, cardH);
    ctx.fillStyle = '#3d2a0a80';
    ctx.font = '5px monospace';
    const label = task.title.substring(0, 14);
    // Strikethrough line
    ctx.fillText(label, col2x + 4, cy2 + 7);
    ctx.fillStyle = '#3d2a0a50';
    ctx.fillRect(col2x + 4, cy2 + 5, Math.min(label.length * 3, colW - 8), 1);
  });

  if (myTasks.length === 0) {
    ctx.fillStyle = '#a08050';
    ctx.font = '5px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('no tasks yet', bx + bw/2, colY + 14);
  }

  // Pushpin decorations
  [[col1x + colW/2, by + 12],[col2x + colW/2, by + 12]].forEach(([px, py2]) => {
    ctx.fillStyle = '#c04040';
    ctx.beginPath(); ctx.arc(px, py2, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff6060';
    ctx.beginPath(); ctx.arc(px - 1, py2 - 1, 1.2, 0, Math.PI*2); ctx.fill();
  });

  ctx.textAlign = 'left';
}

function drawWallClock(ctx) {
  const now = new Date();
  const h = now.getHours() % 12, m = now.getMinutes(), s = now.getSeconds();
  const [cx, cy] = ts(COLS/2 - 1, 0.2);
  const px2 = cx + T/2, py2 = cy + T*0.55;
  const R = 11;
  // Frame
  ctx.fillStyle = '#1a1824';
  ctx.beginPath(); ctx.arc(px2, py2, R+3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#3a3858';
  ctx.beginPath(); ctx.arc(px2, py2, R+2, 0, Math.PI*2); ctx.fill();
  // Face
  ctx.fillStyle = '#f0ece4';
  ctx.beginPath(); ctx.arc(px2, py2, R, 0, Math.PI*2); ctx.fill();
  // Hour marks
  ctx.strokeStyle = '#1a1824'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2 - Math.PI / 2;
    const r1 = i % 3 === 0 ? R - 3 : R - 2;
    ctx.beginPath();
    ctx.moveTo(px2 + Math.cos(a)*r1, py2 + Math.sin(a)*r1);
    ctx.lineTo(px2 + Math.cos(a)*(R-0.5), py2 + Math.sin(a)*(R-0.5));
    ctx.stroke();
  }
  // Hour hand
  const hAngle = ((h + m/60) / 12) * Math.PI * 2 - Math.PI / 2;
  ctx.strokeStyle = '#1a1824'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(px2, py2);
  ctx.lineTo(px2 + Math.cos(hAngle)*(R*0.55), py2 + Math.sin(hAngle)*(R*0.55));
  ctx.stroke();
  // Minute hand
  const mAngle = (m / 60) * Math.PI * 2 - Math.PI / 2;
  ctx.strokeStyle = '#2a2844'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(px2, py2);
  ctx.lineTo(px2 + Math.cos(mAngle)*(R*0.78), py2 + Math.sin(mAngle)*(R*0.78));
  ctx.stroke();
  // Second hand
  const sAngle = (s / 60) * Math.PI * 2 - Math.PI / 2;
  ctx.strokeStyle = '#f7768e'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(px2, py2);
  ctx.lineTo(px2 + Math.cos(sAngle)*(R*0.88), py2 + Math.sin(sAngle)*(R*0.88));
  ctx.stroke();
  // Center dot
  ctx.fillStyle = '#1a1824';
  ctx.beginPath(); ctx.arc(px2, py2, 2, 0, Math.PI*2); ctx.fill();
  ctx.lineCap = 'butt';
}

function drawTrashCan(ctx, level) {
  const [tx2, ty2] = ts(KITCHEN_WALL_COL - 2, 3);
  const cx2 = tx2 + T/2, cy2 = ty2 + T*0.5;
  // Can body
  ctx.fillStyle = '#404050';
  ctx.beginPath();
  ctx.moveTo(cx2-8, cy2+14);
  ctx.lineTo(cx2+8, cy2+14);
  ctx.lineTo(cx2+6, cy2-8);
  ctx.lineTo(cx2-6, cy2-8);
  ctx.closePath(); ctx.fill();
  // Rim
  ctx.fillStyle = '#505060';
  ctx.fillRect((cx2-8)|0, (cy2-10)|0, 16, 3);
  // Trash papers sticking out proportional to level
  if (level > 0) {
    const papers = Math.floor(level);
    const paperColors = ['#f0ece4','#e4f0e0','#e0e8f4','#f4e8e0'];
    for (let p = 0; p < papers && p < 8; p++) {
      const px3 = cx2 - 4 + (p % 3) * 4 + Math.sin(p*1.3)*2;
      const dropY = cy2 - 8 - (p * (level/papers) * 2.5);
      ctx.fillStyle = paperColors[p % paperColors.length];
      ctx.save();
      ctx.translate(px3, dropY);
      ctx.rotate((p % 3 - 1) * 0.3);
      ctx.fillRect(-3, -6, 6, 8);
      ctx.fillStyle = '#80808040';
      ctx.fillRect(-2, -4, 4, 1);
      ctx.fillRect(-2, -2, 3, 1);
      ctx.restore();
    }
  }
  // Level indicator tint
  if (level >= 8) {
    ctx.fillStyle = '#f7768e40';
    ctx.beginPath(); ctx.arc(cx2, cy2, 14, 0, Math.PI*2); ctx.fill();
  }
}

// ════════════════════════════════════════════════════════════════
const bgBuf=document.createElement('canvas');
bgBuf.width=CW; bgBuf.height=900;
const bgx=bgBuf.getContext('2d');
bgx.imageSmoothingEnabled=false;

function ts(tx,ty) { return [OX+tx*T, OY+ty*T]; }
function fillR(ctx,x,y,w,h,c) { if(!c)return; ctx.fillStyle=c; ctx.fillRect(x|0,y|0,w|0,h|0); }

function buildBackground() {
  const ctx=bgx;
  ctx.imageSmoothingEnabled=false;
  ctx.clearRect(0,0,CW,bgBuf.height);

  // Floor + walls
  for (let row=0; row<ROWS; row++) {
    for (let col=0; col<COLS; col++) {
      const x=OX+col*T, y=OY+row*T;
      const wall=col===0||col===COLS-1||row===0||row===ROWS-1;
      const inKitchen = KITCHEN_WALL_COL>0 && col>KITCHEN_WALL_COL && col<COLS-1 && row>=KITCHEN_START_ROW && row<ROWS-1;
      const isKitPartWall = KITCHEN_WALL_COL>0 && col===KITCHEN_WALL_COL && row>=KITCHEN_START_ROW && row<ROWS-1 && row!==KITCHEN_DOOR_ROW;
      if (wall) {
        if (row===0) {
          fillR(ctx,x,y,T,T,'#16152e');
          fillR(ctx,x,y+T-4,T,4,'#22204a');
          fillR(ctx,x,y+T-1,T,1,'#2e2c60');
        } else {
          fillR(ctx,x,y,T,T,WL_TOP);
        }
      } else if (isKitPartWall) {
        // Kitchen partition wall segment
        fillR(ctx,x,y,T,T,'#252344');
        fillR(ctx,x,y,4,T,'#1e1c38');       // shadow side
        fillR(ctx,x+T-4,y,4,T,'#3a3860');   // lit side
        fillR(ctx,x+4,y,T-8,2,'#3a3860');   // top highlight
      } else if (inKitchen) {
        // Kitchen tile floor — cool grey checker
        const checker=(row+col)%2;
        fillR(ctx,x,y,T,T,checker?'#cec8bc':'#c4beb2');
        fillR(ctx,x,y+T-1,T,1,'rgba(0,0,0,0.13)'); // grout H
        fillR(ctx,x+T-1,y,1,T,'rgba(0,0,0,0.13)'); // grout V
      } else {
        // Wood floor planks — rows of alternating shades with grain
        const pi = (row + ((col/5)|0)) % 3;
        const plankC = ['#e2ddd2','#ddd8cd','#d8d3c8'][pi];
        fillR(ctx,x,y,T,T,plankC);
        fillR(ctx,x,y+T-1,T,1,'rgba(0,0,0,0.09)'); // groove
        if ((col*7+row*13)%17===0) fillR(ctx,x+(col*5)%24,y,1,T,'rgba(0,0,0,0.04)'); // grain
      }
    }
  }
  // Kitchen partition door frame highlight
  if (KITCHEN_WALL_COL>0) {
    const dx=OX+KITCHEN_WALL_COL*T, dy=OY+KITCHEN_DOOR_ROW*T;
    fillR(ctx,dx,dy,T,T*3,'#2e2c50');     // door opening — 3 tiles tall
    fillR(ctx,dx,dy,4,T*3,'#4a4880');     // door frame left
    fillR(ctx,dx+T-4,dy,4,T*3,'#4a4880'); // door frame right
  }

  // Windows
  for (let i=0; i<4; i++) {
    const wx=OX+(3+i*6)*T+4, wy=OY+5;
    fillR(ctx,wx,wy,T-8,T-10,'#1a2844');
    fillR(ctx,wx+2,wy+2,T-12,T-14,'#4a80b060');
    ctx.strokeStyle='#3a3860'; ctx.lineWidth=1;
    ctx.strokeRect(wx+.5,wy+.5,T-9,T-11);
    ctx.beginPath();
    ctx.moveTo(wx+(T-8)/2,wy); ctx.lineTo(wx+(T-8)/2,wy+T-10);
    ctx.moveTo(wx,wy+(T-10)/2); ctx.lineTo(wx+T-8,wy+(T-10)/2);
    ctx.strokeStyle='#3a386060'; ctx.stroke();
    // light shaft
    ctx.save(); ctx.globalAlpha=0.055;
    ctx.fillStyle='#ffe8a0';
    ctx.beginPath(); ctx.moveTo(wx,wy+T-10); ctx.lineTo(wx+T-8,wy+T-10);
    ctx.lineTo(wx+T,wy+T*2.5); ctx.lineTo(wx-8,wy+T*2.5); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  // Ceiling strip lights
  for (let li=1; li<COLS-1; li+=6) {
    const lx=OX+li*T+T/2, ly=OY+T;
    fillR(ctx,lx-10,ly-3,20,4,'#c0b8d8');
    fillR(ctx,lx-8,ly+1,16,3,'#fffff060');
    ctx.save(); ctx.globalAlpha=0.045;
    const lg=ctx.createRadialGradient(lx,ly+T,0,lx,ly+T,T*4);
    lg.addColorStop(0,'#fffff0'); lg.addColorStop(1,'transparent');
    ctx.fillStyle=lg; ctx.fillRect(OX,ly,CW-OX*2,T*8);
    ctx.restore();
  }

  // Lounge rug
  if (COUCH_DEFS.length > 0) {
    const [rx,ry]=ts(1.5, COUCH_DEFS[0].ty-0.5);
    const rugW=Math.min(COUCH_DEFS.length*3.5+2, COLS-3)*T;
    ctx.save(); ctx.shadowColor='#00000050'; ctx.shadowBlur=10; ctx.shadowOffsetY=4;
    fillR(ctx,rx,ry,rugW,T*2,'#3a2060');
    ctx.restore();
    fillR(ctx,rx+4,ry+4,rugW-8,T*2-8,'#4a2878');
    ctx.strokeStyle='#5a3898'; ctx.lineWidth=2;
    ctx.strokeRect(rx+7,ry+7,rugW-14,T*2-14);
  }

  // Desks
  for (const {tx,ty} of DESK_DEFS) {
    const [x,y]=ts(tx,ty); const W=T*2, H=T;
    ctx.save(); ctx.shadowColor='#00000070'; ctx.shadowBlur=7; ctx.shadowOffsetY=5;
    fillR(ctx,x,y,W,H,DESK_TOP);
    ctx.restore();
    fillR(ctx,x,y,W,3,'#d4c49a');
    fillR(ctx,x,y+H,W,7,DESK_FRONT);
    fillR(ctx,x+W,y,3,H+7,'#7a6030');
    ctx.strokeStyle=DESK_EDGE; ctx.lineWidth=1; ctx.strokeRect(x+.5,y+.5,W-1,H-1);
    fillR(ctx,x+W/2-14,y+3,28,20,MON_DARK);
    fillR(ctx,x+W/2-13,y+4,26,18,'#0e0e1a');
    fillR(ctx,x+W/2-11,y+6,22,14,SCREEN_C);
    fillR(ctx,x+W/2-3,y+H-8,6,8,'#2a2a3c');
    const gl=['#7aa2f770','#9ece6a50','#bb9af760','#f7768e40'];
    for (let li=0;li<4;li++) fillR(ctx,x+W/2-9,y+8+li*3,6+(li%3)*5,2,gl[li]);
    fillR(ctx,x+W/2-12,y+H-10,24,7,'#1e1e30');
    fillR(ctx,x+W/2-11,y+H-9,22,5,'#2a2a42');
    fillR(ctx,x+W/2+14,y+H-9,6,7,'#2a2a3c');
    const cx2=x+W/2-9, cy2=y+H+9;
    fillR(ctx,cx2,cy2,18,15,CHAIR_C); fillR(ctx,cx2+2,cy2+2,14,11,CHAIR_SEAT);
    fillR(ctx,cx2,cy2-9,18,9,CHAIR_C); fillR(ctx,cx2+2,cy2-8,14,7,CHAIR_SEAT);
    fillR(ctx,cx2-2,cy2+13,4,3,'#181828'); fillR(ctx,cx2+16,cy2+13,4,3,'#181828'); fillR(ctx,cx2+7,cy2+14,4,3,'#181828');
  }

  // Couches
  for (const {tx,ty,w} of COUCH_DEFS) {
    const [x,y]=ts(tx,ty); const W=w*T, H=T*0.85;
    ctx.save(); ctx.shadowColor='#00000070'; ctx.shadowBlur=9; ctx.shadowOffsetY=5;
    fillR(ctx,x,y,W,H+10,COUCH_C);
    ctx.restore();
    fillR(ctx,x,y,W,10,COUCH_C); fillR(ctx,x+2,y+1,W-4,8,'#4a3880');
    fillR(ctx,x,y+10,W,H,COUCH_SEAT); fillR(ctx,x+3,y+13,W-6,H-6,COUCH_HI);
    fillR(ctx,x,y+10+H,W,6,'#281e50'); fillR(ctx,x+W,y,3,H+16,'#1e1640');
    fillR(ctx,x,y,9,H+10,COUCH_C); fillR(ctx,x+W-9,y,9,H+10,COUCH_C);
    const sec=Math.max(1,Math.floor(w));
    for (let s=1;s<sec;s++) fillR(ctx,x+s*(W/sec)-1,y+10,2,H,'#382860');
    const tx2=x+10, ty2=y+10+H+8;
    fillR(ctx,tx2,ty2,W-20,16,'#5a4830'); fillR(ctx,tx2+2,ty2+2,W-24,12,'#6a5840');
    fillR(ctx,tx2,ty2+16,W-20,4,'#3a2818');
    fillR(ctx,tx2+4,ty2+4,6,6,'#b8a020'); fillR(ctx,tx2+5,ty2+3,4,2,'#f0f0c0');
  }

  // Plants — draw at positions defined in IDLE_SPOTS (type:'plant')
  IDLE_SPOTS.filter(s=>s.type==='plant').forEach(({tx:ptx,ty:pty}) => {
    if (ptx>=COLS-1||pty>=ROWS-1) return;
    const [px,py]=ts(ptx,pty);
    const pcx = px + T/2;
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.beginPath(); ctx.ellipse(pcx, py+T-3, 10, 3, 0, 0, Math.PI*2); ctx.fill();
    // Terracotta pot
    ctx.save(); ctx.shadowColor='#00000060'; ctx.shadowBlur=5;
    ctx.fillStyle='#a04820';
    ctx.beginPath();
    ctx.moveTo(pcx-9,py+T-8); ctx.lineTo(pcx-7,py+T-2); ctx.lineTo(pcx+7,py+T-2); ctx.lineTo(pcx+9,py+T-8); ctx.closePath(); ctx.fill();
    ctx.restore();
    ctx.fillStyle='#c06030'; // pot rim
    ctx.fillRect(pcx-10, py+T-11, 20, 4);
    ctx.fillStyle='#904018'; // pot base strip
    ctx.fillRect(pcx-6, py+T-2, 12, 2);
    ctx.fillStyle='#7a3010'; // soil
    ctx.fillRect(pcx-8, py+T-10, 16, 4);
    ctx.fillStyle='#3a2010';
    ctx.fillRect(pcx-6, py+T-10, 12, 3);
    // Leaves — tropical / monstera style
    const leafBase = py + T - 10;
    // Main stem
    ctx.strokeStyle='#2a5018'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(pcx, leafBase); ctx.lineTo(pcx, leafBase-22); ctx.stroke();
    // Left leaf
    ctx.fillStyle='#1e5818';
    ctx.beginPath(); ctx.moveTo(pcx-1, leafBase-10);
    ctx.quadraticCurveTo(pcx-16, leafBase-20, pcx-14, leafBase-28);
    ctx.quadraticCurveTo(pcx-6, leafBase-22, pcx-1, leafBase-10); ctx.fill();
    ctx.fillStyle='#3a7828'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(pcx-1, leafBase-10);
    ctx.quadraticCurveTo(pcx-10, leafBase-18, pcx-10, leafBase-26); ctx.stroke();
    // Right leaf
    ctx.fillStyle='#2a6820';
    ctx.beginPath(); ctx.moveTo(pcx+1, leafBase-14);
    ctx.quadraticCurveTo(pcx+16, leafBase-24, pcx+13, leafBase-30);
    ctx.quadraticCurveTo(pcx+4, leafBase-24, pcx+1, leafBase-14); ctx.fill();
    // Center leaf (top)
    ctx.fillStyle='#3a7828';
    ctx.beginPath(); ctx.moveTo(pcx-1, leafBase-20);
    ctx.quadraticCurveTo(pcx-6, leafBase-36, pcx, leafBase-38);
    ctx.quadraticCurveTo(pcx+6, leafBase-36, pcx+1, leafBase-20); ctx.fill();
    // Leaf highlights
    ctx.strokeStyle='#60a840'; ctx.lineWidth=0.8; ctx.globalAlpha=0.7;
    ctx.beginPath(); ctx.moveTo(pcx-1, leafBase-20); ctx.lineTo(pcx, leafBase-38); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pcx-1, leafBase-10); ctx.lineTo(pcx-10, leafBase-26); ctx.stroke();
    ctx.globalAlpha=1;
  });

  // Enclosed kitchen room — appliances (right side)
  if (ROWS > 6 && KITCHEN_WALL_COL > 0) {
    const kitIntX = KITCHEN_WALL_COL + 1; // first interior column
    const [kx,ky] = ts(kitIntX, KITCHEN_START_ROW);

    // Long counter along back wall (right wall side)
    ctx.save(); ctx.shadowColor='#00000070'; ctx.shadowBlur=6; ctx.shadowOffsetY=4;
    fillR(ctx,kx,ky,T*9,T*0.6,'#c4b488'); ctx.restore();
    fillR(ctx,kx,ky,T*9,3,'#d4c49a');  // counter highlight
    fillR(ctx,kx,ky+T*0.6,T*9,5,DESK_FRONT); // counter front

    // Coffee machine (dark, glowing display)
    const [cmx,cmy] = [kx+4, ky+3];
    ctx.save(); ctx.shadowColor='#3060a060'; ctx.shadowBlur=10;
    fillR(ctx,cmx,cmy,24,26,'#1a1824'); ctx.restore();
    fillR(ctx,cmx+2,cmy+2,20,11,'#0a0e18');
    fillR(ctx,cmx+3,cmy+3,18,9,SCREEN_C);
    fillR(ctx,cmx+5,cmy+5,5,2,'#9ece6a');
    fillR(ctx,cmx+12,cmy+5,4,2,'#7aa2f7');
    fillR(ctx,cmx+5,cmy+14,14,7,'#2a2a3c');
    fillR(ctx,cmx+10,cmy+20,4,5,'#404050');
    fillR(ctx,cmx+11,cmy+21,2,2,'#c8a060'); // drip

    // Toaster / microwave
    const [mcx,mcy] = [kx+T+4, ky+3];
    fillR(ctx,mcx,mcy,28,20,'#2a2830');
    fillR(ctx,mcx+2,mcy+2,24,8,'#181624');
    fillR(ctx,mcx+3,mcy+3,20,6,SCREEN_C);
    fillR(ctx,mcx+4,mcy+4,3,2,'#f7768e');
    fillR(ctx,mcx+9,mcy+4,3,2,'#9ece6a');
    fillR(ctx,mcx+14,mcy+4,6,2,'#7aa2f7');
    fillR(ctx,mcx+22,mcy+4,3,10,'#404058');

    // Fridge (tall, silver)
    const [frx,fry] = ts(kitIntX+8, KITCHEN_START_ROW);
    ctx.save(); ctx.shadowColor='#00000060'; ctx.shadowBlur=6;
    fillR(ctx,frx+2,fry,24,T*1.5,'#d0d8e8'); ctx.restore();
    fillR(ctx,frx+3,fry+1,22,T*0.55,'#e0e8f4');  // freezer
    fillR(ctx,frx+3,fry+T*0.55+1,22,T*0.9,'#e8f0f8'); // main
    fillR(ctx,frx+6,fry+T*0.55,12,2,'#b0b8c8');  // divider
    fillR(ctx,frx+24,fry+5,2,9,'#a0a8b8');  // freezer handle
    fillR(ctx,frx+24,fry+T*0.6,2,10,'#a0a8b8'); // main handle
    fillR(ctx,frx+4,fry+8,7,2,'#80b8e0');

    // Dining table in middle of kitchen
    const [tbx,tby] = ts(kitIntX+1, KITCHEN_START_ROW+1.6);
    ctx.save(); ctx.shadowColor='#00000060'; ctx.shadowBlur=8; ctx.shadowOffsetY=3;
    fillR(ctx,tbx,tby,T*5,T*0.5,'#a09060'); ctx.restore();
    fillR(ctx,tbx,tby,T*5,3,'#c4b488');  // table top highlight
    fillR(ctx,tbx+4,tby+T*0.5,6,T*0.4,'#7a6030'); // left leg
    fillR(ctx,tbx+T*5-10,tby+T*0.5,6,T*0.4,'#7a6030'); // right leg
    // Plates on table
    for(let p=0;p<3;p++){
      const px=tbx+T*0.5+p*T, py=tby+4;
      ctx.fillStyle='#e8e0d0'; ctx.beginPath(); ctx.ellipse(px,py,8,4,0,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#c8b090'; ctx.beginPath(); ctx.ellipse(px,py,5,2.5,0,0,Math.PI*2); ctx.fill();
    }

    // Kitchen label (above doorway)
    const [klx,kly] = ts(kitIntX+1, KITCHEN_START_ROW-0.3);
    ctx.fillStyle='#6a6080'; ctx.font="5px 'Press Start 2P',monospace";
    ctx.fillText('KITCHEN',klx,kly);
  }

  // Water cooler
  if (ROWS>4) {
    const [wx,wy]=ts(COLS-3, Math.floor(ROWS/2)-1);
    ctx.save(); ctx.shadowColor='#00000060'; ctx.shadowBlur=6;
    fillR(ctx,wx+6,wy+2,18,26,'#d0d8e8'); ctx.restore();
    fillR(ctx,wx+8,wy+2,14,16,'#5090c0'); fillR(ctx,wx+9,wy+3,12,14,'#70b0e0');
    fillR(ctx,wx+8,wy+18,14,10,'#e0e8f0');
    fillR(ctx,wx+9,wy+22,4,4,'#4080c0'); fillR(ctx,wx+15,wy+22,4,4,'#c04040');
    fillR(ctx,wx+6,wy+28,18,4,'#a0b0c8');
  }

  // Snack machine
  if (ROWS>6) {
    const [smx,smy]=ts(COLS-3, Math.floor(ROWS/2)+2);
    ctx.save(); ctx.shadowColor='#00000070'; ctx.shadowBlur=7;
    fillR(ctx,smx+2,smy+1,26,28,'#282840'); ctx.restore();
    fillR(ctx,smx+4,smy+3,22,18,'#101020'); fillR(ctx,smx+5,smy+4,20,16,'#0a1830');
    const sc=['#e0a030','#c04040','#40a060','#8040c0'];
    for (let r=0;r<3;r++) for (let c2=0;c2<3;c2++) fillR(ctx,smx+7+c2*6,smy+6+r*4,4,3,sc[(r+c2)%4]);
    fillR(ctx,smx+4,smy+21,22,4,'#1e1e38'); fillR(ctx,smx+8,smy+22,8,2,'#3a3a60');
    fillR(ctx,smx+2,smy+29,26,4,'#1a1830');
  }

  // Nameplate
  const npX=OX+Math.floor((COLS-10)/2)*T, npY=OY+6;
  fillR(ctx,npX,npY,10*T,20,'#2a2848'); fillR(ctx,npX+2,npY,10*T-4,18,'#1e1c38');
  ctx.fillStyle='#7aa2f7'; ctx.font="bold 9px 'Press Start 2P',monospace";
  ctx.textAlign='center'; ctx.fillText('AGENT OFFICE',OX+COLS/2*T,npY+14); ctx.textAlign='left';

  // ── Wall Clock (static frame drawn on background; hands drawn dynamically) ──
  {
    const [wcx, wcy] = ts(13, 0.2);
    const cx2 = wcx + T/2, cy2 = wcy + T*0.55;
    ctx.save(); ctx.shadowColor='#00000060'; ctx.shadowBlur=5;
    ctx.fillStyle='#1a1824';
    ctx.beginPath(); ctx.arc(cx2, cy2, 14, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.fillStyle='#3a3858';
    ctx.beginPath(); ctx.arc(cx2, cy2, 13, 0, Math.PI*2); ctx.fill();
  }

  // ── Bookshelf (left wall, social zone) — wide floor-to-wall unit ──
  if (ACT_ZONE_Y > 0) {
    const shelfY = ACT_ZONE_Y + 11;
    const [bsx, bsy] = ts(0.3, shelfY - 0.8);
    const bW = T * 4.5, bH = T * 3.5;
    // Shadow
    ctx.save(); ctx.shadowColor='#00000090'; ctx.shadowBlur=12; ctx.shadowOffsetY=4;
    fillR(ctx, bsx, bsy, bW, bH, '#3d2410'); ctx.restore();
    // Back panel
    fillR(ctx, bsx + 6, bsy + 2, bW - 12, bH - 2, '#5a3818');
    // Side panels (thick wood)
    fillR(ctx, bsx, bsy, 7, bH, '#4a2c14');
    fillR(ctx, bsx + bW - 7, bsy, 7, bH, '#4a2c14');
    // Wood grain highlights on sides
    ctx.fillStyle='#6a4020'; ctx.fillRect(bsx+2, bsy+8, 2, bH-16);
    ctx.fillStyle='#3a2010'; ctx.fillRect(bsx+4, bsy+12, 1, bH-24);
    ctx.fillStyle='#6a4020'; ctx.fillRect(bsx+bW-5, bsy+8, 2, bH-16);
    // Top board
    fillR(ctx, bsx, bsy, bW, 6, '#5a3818');
    fillR(ctx, bsx, bsy, bW, 2, '#7a5030'); // top highlight
    // Bottom board
    fillR(ctx, bsx, bsy+bH-5, bW, 5, '#3d2010');
    // Three shelves
    const shH = 4;
    const sh = [bsy + T*1.0, bsy + T*2.0, bsy + T*3.0];
    for (const sy of sh) {
      fillR(ctx, bsx+6, sy, bW-12, shH, '#3a2010');
      fillR(ctx, bsx+6, sy-1, bW-12, 2, '#7a5030'); // shelf highlight
    }
    // Books helper
    const drawBookRow = (cols, bottomY, count) => {
      let bkx = bsx + 9;
      for (let i = 0; i < count; i++) {
        const bkw = 5 + (i*3) % 5;
        const bkh = 10 + (i*7) % 12;
        const bc = cols[i % cols.length];
        fillR(ctx, bkx, bottomY - bkh, bkw, bkh, bc);
        fillR(ctx, bkx, bottomY - bkh, 1, bkh, bc+'55'); // spine shadow
        fillR(ctx, bkx+1, bottomY - bkh, bkw-2, 2, '#ffffff20'); // top edge
        bkx += bkw + 2;
        if (bkx > bsx + bW - 12) break;
      }
    };
    const bc1 = ['#f7768e','#7aa2f7','#9ece6a','#e0af68','#bb9af7','#2ac3de','#ff9e64','#f7768e'];
    const bc2 = ['#2ac3de','#e0af68','#bb9af7','#f7768e','#9ece6a','#7aa2f7','#ff9e64','#2ac3de'];
    const bc3 = ['#9ece6a','#ff9e64','#7aa2f7','#f7768e','#e0af68','#bb9af7','#2ac3de','#9ece6a'];
    drawBookRow(bc1, sh[0] - 1, 10);
    drawBookRow(bc2, sh[1] - 1, 10);
    drawBookRow(bc3, sh[2] - 1, 10);
    // Decorative items on top shelf
    // Small plant pot
    ctx.fillStyle='#904020'; ctx.fillRect(bsx+bW-22, bsy+3, 12, 8);
    ctx.fillStyle='#b05030'; ctx.fillRect(bsx+bW-23, bsy+2, 14, 3);
    ctx.fillStyle='#2a6020'; ctx.beginPath(); ctx.arc(bsx+bW-16, bsy-2, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#3a8030'; ctx.beginPath(); ctx.arc(bsx+bW-20, bsy-4, 4, 0, Math.PI*2); ctx.fill();
    // Trophy / award
    ctx.fillStyle='#c8a020'; ctx.fillRect(bsx+14, bsy+4, 8, 6);
    ctx.fillStyle='#e0c040'; ctx.beginPath(); ctx.arc(bsx+18, bsy+2, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#c8a020'; ctx.fillRect(bsx+16, bsy+8, 4, 3);
    ctx.fillStyle='#a08010'; ctx.fillRect(bsx+12, bsy+10, 12, 2);
  }

  // ── Printer (right side, before kitchen wall) ─────────────────────
  if (KITCHEN_WALL_COL > 0 && KITCHEN_START_ROW > 0) {
    const [prx, pry] = ts(KITCHEN_WALL_COL - 3, KITCHEN_START_ROW - 2);
    ctx.save(); ctx.shadowColor='#00000070'; ctx.shadowBlur=6;
    fillR(ctx, prx + 2, pry + 4, T*1.6, T*0.9, '#c0c0cc'); ctx.restore();
    fillR(ctx, prx + 4, pry + 6, T*1.6-4, T*0.9-4, '#d0d0dc');
    // Paper slot (dark groove)
    fillR(ctx, prx + 8, pry + 8, T*1.6-12, 3, '#808090');
    // Status light
    ctx.fillStyle = '#9ece6a';
    ctx.beginPath(); ctx.arc(prx + T*1.6 - 4, pry + 7, 3, 0, Math.PI*2); ctx.fill();
    // Brand strip
    fillR(ctx, prx + 4, pry + 6, T*1.6-4, 5, '#a0a0b0');
    // Output tray
    fillR(ctx, prx + 4, pry + T*0.9 + 2, T*1.6 - 4, 4, '#b0b0bc');
    // Label
    ctx.fillStyle = '#606070'; ctx.font = "4px 'Press Start 2P',monospace";
    ctx.fillText('PRINT', prx + 8, pry + 14);
  }

  // ── Vending Machine (inside kitchen area) ────────────────────────
  if (KITCHEN_WALL_COL > 0 && ACT_ZONE_Y > 0) {
    const [vmx, vmy] = ts(KITCHEN_WALL_COL + 1, ACT_ZONE_Y - 2);
    ctx.save(); ctx.shadowColor='#00000070'; ctx.shadowBlur=8;
    fillR(ctx, vmx, vmy, T*1.5, T*2.2, '#282840'); ctx.restore();
    fillR(ctx, vmx + 2, vmy + 2, T*1.5-4, T*2.2-4, '#30304a');
    // Glass front
    fillR(ctx, vmx + 4, vmy + 6, T*1.5-8, T*1.4, '#101828');
    // Snack rows
    const vmColors = ['#e0a030','#c04040','#40a060','#8040c0','#2ac3de','#f7768e'];
    for (let r = 0; r < 3; r++) {
      for (let c2 = 0; c2 < 3; c2++) {
        fillR(ctx, vmx+6+c2*12, vmy+8+r*14, 10, 11, vmColors[(r*3+c2)%6]);
        fillR(ctx, vmx+7+c2*12, vmy+9+r*14, 4, 3, '#ffffff30');
      }
    }
    // Coin slot
    fillR(ctx, vmx + 4, vmy + T*1.4+8, 8, 3, '#404058');
    // Display
    fillR(ctx, vmx + 14, vmy + T*1.4+6, T*1.5-18, 8, '#0a1828');
    fillR(ctx, vmx + 15, vmy + T*1.4+7, T*1.5-20, 6, SCREEN_C);
    // Delivery slot
    fillR(ctx, vmx + 4, vmy + T*2.2-8, T*1.5-8, 6, '#1a1830');
  }

  // ── Conference Table (social zone below gym) ─────────────────────
  if (ACT_ZONE_Y > 0) {
    const [cfx, cfy] = ts(4, ACT_ZONE_Y + 10);
    const ctW = T*6, ctH = T*2;
    ctx.save(); ctx.shadowColor='#00000070'; ctx.shadowBlur=10; ctx.shadowOffsetY=4;
    // Oval table
    ctx.fillStyle='#5a3c18';
    ctx.beginPath(); ctx.ellipse(cfx + ctW/2, cfy + ctH/2, ctW/2, ctH/2, 0, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.fillStyle='#6a4820';
    ctx.beginPath(); ctx.ellipse(cfx + ctW/2, cfy + ctH/2, ctW/2-3, ctH/2-3, 0, 0, Math.PI*2); ctx.fill();
    // Wood grain
    ctx.strokeStyle='#5a3c1840'; ctx.lineWidth=1;
    for (let g=0;g<4;g++){
      ctx.beginPath(); ctx.ellipse(cfx+ctW/2, cfy+ctH/2, ctW/2-6-g*6, ctH/2-4-g*4, 0, 0, Math.PI*2); ctx.stroke();
    }
    // Chairs around table (north and south)
    const chairCol = CHAIR_C;
    for (let i = 0; i < 4; i++) {
      const chx = cfx + T*0.7 + i * T*1.3;
      // North chairs
      fillR(ctx, chx, cfy - T*0.5, T*0.8, T*0.5, chairCol);
      fillR(ctx, chx+2, cfy - T*0.5+2, T*0.8-4, T*0.5-4, CHAIR_SEAT);
      // South chairs
      fillR(ctx, chx, cfy + ctH + 4, T*0.8, T*0.5, chairCol);
      fillR(ctx, chx+2, cfy + ctH + 6, T*0.8-4, T*0.5-4, CHAIR_SEAT);
    }
    // Label
    ctx.fillStyle='#8a6a30'; ctx.font="5px 'Press Start 2P',monospace";
    ctx.textAlign='center';
    ctx.fillText('CONF ROOM', cfx + ctW/2, cfy + ctH/2 + 3);
    ctx.textAlign='left';
  }

  // ── Trash Can (static body drawn on background) ───────────────────
  {
    const [tcx, tcy] = ts(KITCHEN_WALL_COL - 2, 3);
    const cx2 = tcx + T/2, cy2 = tcy + T*0.5;
    ctx.save(); ctx.shadowColor='#00000060'; ctx.shadowBlur=4;
    ctx.fillStyle='#404050';
    ctx.beginPath();
    ctx.moveTo(cx2-8, cy2+14);
    ctx.lineTo(cx2+8, cy2+14);
    ctx.lineTo(cx2+6, cy2-8);
    ctx.lineTo(cx2-6, cy2-8);
    ctx.closePath(); ctx.fill();
    ctx.restore();
    ctx.fillStyle='#505060';
    ctx.fillRect((cx2-8)|0, (cy2-10)|0, 16, 3);
    ctx.fillStyle='#606070';
    ctx.fillRect((cx2-6)|0, (cy2-10)|0, 3, 22);
    ctx.fillRect((cx2+3)|0, (cy2-10)|0, 3, 22);
  }

  // ════ Activity zone ═══════════════════════════════════════════
  if (ACT_ZONE_Y > 0) {
    // Zone divider strip
    const [zx, zy] = ts(1, ACT_ZONE_Y);
    fillR(ctx, zx, zy, (COLS-2)*T, 3, '#3a3860');
    fillR(ctx, zx, zy+3, (COLS-2)*T, 2, '#22204a');

    // ── GYM (left side) ──────────────────────────────────────────
    const [gx,gy] = ts(1, ACT_ZONE_Y+0.5);

    // Gym label
    ctx.fillStyle='#5a5070'; ctx.font="5px 'Press Start 2P',monospace";
    ctx.fillText('GYM', gx, gy-4);

    // Treadmill 1
    const [t1x,t1y] = ts(1, ACT_ZONE_Y+0.8);
    ctx.save(); ctx.shadowColor='#00000070'; ctx.shadowBlur=5;
    fillR(ctx,t1x+2,t1y+8,T*1.2,T*0.7,'#282840'); ctx.restore();
    fillR(ctx,t1x+4,t1y+10,T*1.2-4,T*0.35,'#1a1a2e');
    fillR(ctx,t1x+4,t1y+10,T*1.2-4,T*0.35,'#3a3060');  // belt tint
    fillR(ctx,t1x+2,t1y+6,8,4,'#404058');  // control panel
    fillR(ctx,t1x+3,t1y+7,6,2,SCREEN_C);
    fillR(ctx,t1x+4,t1y+7,2,1,'#9ece6a');
    // legs/frame
    fillR(ctx,t1x+4,t1y+T*0.7+10,4,8,'#1e1e30');
    fillR(ctx,t1x+T*1.2,t1y+T*0.7+10,4,8,'#1e1e30');

    // Treadmill 2
    const [t2x,t2y] = ts(4, ACT_ZONE_Y+0.8);
    fillR(ctx,t2x+2,t2y+8,T*1.2,T*0.7,'#282840');
    fillR(ctx,t2x+4,t2y+10,T*1.2-4,T*0.35,'#3a3060');
    fillR(ctx,t2x+2,t2y+6,8,4,'#404058');
    fillR(ctx,t2x+3,t2y+7,6,2,SCREEN_C);
    fillR(ctx,t2x+4,t2y+7,2,1,'#7aa2f7');
    fillR(ctx,t2x+4,t2y+T*0.7+10,4,8,'#1e1e30');
    fillR(ctx,t2x+T*1.2,t2y+T*0.7+10,4,8,'#1e1e30');

    // Dumbbell rack
    const [drx,dry] = ts(1, ACT_ZONE_Y+3.5);
    fillR(ctx,drx,dry,T*1.4,T*0.4,'#1e1e30');  // rack frame
    for(let d=0;d<4;d++){
      const dx=drx+4+d*10;
      fillR(ctx,dx,dry+2,8,T*0.3,'#404050');
      fillR(ctx,dx,dry+3,8,4,'#606070');  // weights
      fillR(ctx,dx+2,dry+2,4,T*0.3,'#484858');
    }

    // Exercise mat
    const [mx,my] = ts(3.5, ACT_ZONE_Y+3.2);
    ctx.save(); ctx.shadowColor='#00000050'; ctx.shadowBlur=4;
    fillR(ctx,mx,my,T*1.5,T*0.35,'#2a5a3a'); ctx.restore();
    fillR(ctx,mx+2,my+2,T*1.5-4,T*0.35-4,'#2e6640');
    for(let m=0;m<4;m++) fillR(ctx,mx+4+m*9,my+3,1,T*0.35-8,'#22502e');

    // ── GAMING/TV ZONE (center) ──────────────────────────────────
    const [tvx,tvy] = ts(9, ACT_ZONE_Y+0.3);

    // TV label
    ctx.fillStyle='#5a5070'; ctx.font="5px 'Press Start 2P',monospace";
    ctx.fillText('GAMING', tvx, tvy-4);

    // Big TV (wall-mounted look)
    ctx.save(); ctx.shadowColor='#0050ff30'; ctx.shadowBlur=20;
    fillR(ctx,tvx,tvy,T*4,T*2.5,'#0a0a18'); ctx.restore();
    fillR(ctx,tvx+4,tvy+4,T*4-8,T*2.5-8,SCREEN_C);
    // TV screen content (colorful game)
    fillR(ctx,tvx+6,tvy+6,T*4-14,8,'#0d1a3a');  // sky
    fillR(ctx,tvx+6,tvy+T*2.5-14,T*4-14,8,'#1a3a10'); // ground
    // pixel character on screen
    fillR(ctx,tvx+12,tvy+10,6,8,'#f7768e');  // game char
    fillR(ctx,tvx+13,tvy+8,4,4,'#f5c2a0');   // head
    // score
    ctx.fillStyle='#9ece6a'; ctx.font="4px 'Press Start 2P',monospace";
    ctx.fillText('SCORE:9999',tvx+T*2+4,tvy+10);
    // TV stand
    fillR(ctx,tvx+T*2-4,tvy+T*2.5,8,6,'#181828');
    fillR(ctx,tvx+T*2-10,tvy+T*2.5+6,20,4,'#1e1e30');

    // Console unit
    const [cx2,cy2] = ts(10, ACT_ZONE_Y+3);
    fillR(ctx,cx2,cy2,T*1.2,T*0.4,'#1a1a2e');
    fillR(ctx,cx2+2,cy2+2,T*1.2-4,T*0.4-4,'#22223a');
    fillR(ctx,cx2+4,cy2+4,8,4,'#0d0d1a'); // disk slot
    fillR(ctx,cx2+T*1.2-12,cy2+4,6,6,'#3a3a60'); // power button area
    fillR(ctx,cx2+T*1.2-10,cy2+5,4,4,'#404060');
    ctx.fillStyle='#9ece6a80'; ctx.beginPath(); ctx.arc(cx2+T*1.2-8,cy2+7,2,0,Math.PI*2); ctx.fill();

    // Gaming sofa (3-seat)
    const [sfx,sfy] = ts(10, ACT_ZONE_Y+4);
    ctx.save(); ctx.shadowColor='#00000070'; ctx.shadowBlur=8;
    fillR(ctx,sfx,sfy,T*4,T*0.7+10,COUCH_C); ctx.restore();
    fillR(ctx,sfx,sfy,T*4,10,COUCH_C);
    fillR(ctx,sfx+2,sfy+1,T*4-4,8,'#4a3880');
    fillR(ctx,sfx,sfy+10,T*4,T*0.7,COUCH_SEAT);
    fillR(ctx,sfx+3,sfy+13,T*4-6,T*0.7-6,COUCH_HI);
    // armrests
    fillR(ctx,sfx,sfy,9,T*0.7+10,COUCH_C);
    fillR(ctx,sfx+T*4-9,sfy,9,T*0.7+10,COUCH_C);
    // section dividers
    fillR(ctx,sfx+T-1,sfy+10,2,T*0.7,'#382860');
    fillR(ctx,sfx+T*2-1,sfy+10,2,T*0.7,'#382860');
    fillR(ctx,sfx+T*3-1,sfy+10,2,T*0.7,'#382860');

    // ── PING PONG TABLE (right-center) ──────────────────────────
    const ppX2 = Math.min(19, COLS-8);
    const [ppx,ppy] = ts(ppX2-2, ACT_ZONE_Y+1.5);

    // Table surface (no floating text)
    const ppW = T*6, ppH = T*1.5;
    ctx.save(); ctx.shadowColor='#00000080'; ctx.shadowBlur=10; ctx.shadowOffsetY=6;
    fillR(ctx,ppx,ppy,ppW,ppH,'#164028'); ctx.restore();
    // Surface with border
    fillR(ctx,ppx+2,ppy+2,ppW-4,ppH-4,'#1d7040');
    // Table border stripe (white)
    ctx.strokeStyle='#ffffffcc'; ctx.lineWidth=2;
    ctx.strokeRect(ppx+4,ppy+4,ppW-8,ppH-8);
    // Center line (vertical)
    fillR(ctx,ppx+ppW/2-1,ppy+4,2,ppH-8,'#ffffffb0');
    // Side edge highlights
    fillR(ctx,ppx,ppy,ppW,3,'#30a060'); // top edge highlight
    fillR(ctx,ppx,ppy+ppH-3,ppW,3,'#0d3020'); // bottom shadow
    fillR(ctx,ppx,ppy,3,ppH,'#30a060'); // left edge
    fillR(ctx,ppx+ppW-3,ppy,3,ppH,'#0d3020'); // right edge
    // Net posts
    ctx.fillStyle='#808890';
    ctx.fillRect(ppx+ppW/2-2, ppy-8, 4, 10); // left post above table
    ctx.fillRect(ppx+ppW/2-2, ppy+ppH-2, 4, 10); // right post below table
    ctx.fillStyle='#a0a8b8';
    ctx.fillRect(ppx+ppW/2-1, ppy-7, 2, 8);
    // Net mesh (white stripes between posts)
    ctx.fillStyle='#ffffffd0';
    ctx.fillRect(ppx+ppW/2-2, ppy, 4, 3); // top of net
    ctx.fillStyle='#ffffff80';
    for(let ni=1; ni<6; ni++) {
      ctx.fillRect(ppx+ppW/2-1, ppy+ni*((ppH)/6), 2, 1);
    }
    ctx.fillStyle='#ffffffd0'; ctx.fillRect(ppx+ppW/2-2, ppy+ppH-3, 4, 3);
    // Table legs (4 legs with cross bar)
    const legH = T*0.55;
    ctx.fillStyle='#0e2818';
    ctx.fillRect(ppx+6, ppy+ppH, 5, legH);
    ctx.fillRect(ppx+ppW-11, ppy+ppH, 5, legH);
    ctx.fillRect(ppx+6, ppy+ppH+legH, ppW-12, 4);
    // Paddles resting on table edges
    const drawPaddle = (ex, ey, color) => {
      ctx.fillStyle='#2a1808'; ctx.beginPath(); ctx.ellipse(ex,ey,5,7,0.3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=color; ctx.beginPath(); ctx.ellipse(ex,ey,4,6,0.3,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=color+'88'; ctx.beginPath(); ctx.ellipse(ex-1,ey-1,2,3,0.3,0,Math.PI*2); ctx.fill();
    };
    drawPaddle(ppx+14, ppy+ppH/2, '#e03030');
    drawPaddle(ppx+ppW-14, ppy+ppH/2, '#3030e0');
  }

  // ── Cat bowls (structure only — contents drawn dynamically) ──────
  for (const bowl of CAT_BOWLS) {
    const [bx, by] = ts(bowl.tx, bowl.ty);
    const isWater = bowl.type === 'water';
    const rimOuter = isWater ? '#2860c0' : '#c04878';
    const rimInner = isWater ? '#4090e8' : '#e060a0';
    const rimFloor = isWater ? '#3070d0' : '#d05090';
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(bx+T/2, by+T*0.75+3, 9, 3, 0, 0, Math.PI*2); ctx.fill();
    // Bowl body
    ctx.fillStyle=rimOuter;
    ctx.beginPath(); ctx.arc(bx+T/2, by+T*0.65, 9, 0, Math.PI); ctx.closePath(); ctx.fill();
    ctx.fillStyle=rimInner;
    ctx.beginPath(); ctx.ellipse(bx+T/2, by+T*0.55, 9, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle=rimFloor;
    ctx.beginPath(); ctx.ellipse(bx+T/2, by+T*0.55, 7, 3.5, 0, 0, Math.PI*2); ctx.fill();
    // Label icon
    ctx.font='7px sans-serif'; ctx.textAlign='center';
    ctx.fillText(isWater ? '💧' : '🐾', bx+T/2, by+T*0.28);
    ctx.textAlign='left';
  }
}

// Draw cat bowls dynamically (food/water appears/disappears)
function drawCatBowls(ctx, tick) {
  for (const bowl of CAT_BOWLS) {
    const cx = OX + bowl.tx * T + T/2;
    const cy = OY + bowl.ty * T + T * 0.58; // bowl center Y
    if (bowl.type === 'food') {
      if (bowl.hasFod) {
        // Kibble pieces — visible orange/brown chunks
        const kibble = [[-5,-1],[0,-2],[5,-1],[-2.5,2],[2.5,2]];
        for (const [kx,ky] of kibble) {
          ctx.fillStyle='#c06010';
          ctx.beginPath(); ctx.ellipse(cx+kx, cy+ky, 3, 2.2, kx*0.3, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle='#e8902a';
          ctx.beginPath(); ctx.ellipse(cx+kx-0.5, cy+ky-0.5, 2, 1.5, kx*0.3, 0, Math.PI*2); ctx.fill();
        }
      } else {
        // Empty — faint reflection inside bowl
        ctx.fillStyle='rgba(180,80,120,0.3)';
        ctx.beginPath(); ctx.ellipse(cx, cy, 5, 2.5, 0, 0, Math.PI*2); ctx.fill();
        // "empty" text hint
        ctx.fillStyle='#ffffff50'; ctx.font='5px sans-serif'; ctx.textAlign='center';
        ctx.fillText('…', cx, cy+1); ctx.textAlign='left';
      }
    } else {
      // Water bowl
      if (bowl.hasFod) {
        // Animated water — blue fill with ripple
        ctx.fillStyle='#2a80e880';
        ctx.beginPath(); ctx.ellipse(cx, cy, 7, 3.5, 0, 0, Math.PI*2); ctx.fill();
        // Water surface ripples
        const phase = (tick * 0.05) % (Math.PI * 2);
        ctx.strokeStyle='#60c0ff90'; ctx.lineWidth=1;
        for (let r=0; r<2; r++) {
          const rp = phase + r * Math.PI;
          const rw = 3 + Math.sin(rp) * 1.5;
          ctx.beginPath(); ctx.ellipse(cx, cy, rw, rw*0.4, 0, 0, Math.PI*2); ctx.stroke();
        }
        // Highlight glint
        ctx.fillStyle='#ffffff70';
        ctx.beginPath(); ctx.ellipse(cx-2, cy-1, 2, 1, -0.3, 0, Math.PI); ctx.fill();
      } else {
        // Empty water — dry bowl
        ctx.fillStyle='rgba(40,100,180,0.2)';
        ctx.beginPath(); ctx.ellipse(cx, cy, 5, 2.5, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle='#ffffff40'; ctx.font='5px sans-serif'; ctx.textAlign='center';
        ctx.fillText('…', cx, cy+1); ctx.textAlign='left';
      }
    }
  }
}

// ════════════════════════════════════════════════════════════════
//  DYNAMIC EFFECTS  (monitor glow, animated light shafts, coffee steam)
// ════════════════════════════════════════════════════════════════
function drawDynamicEffects(ctx, tick) {
  // Animated monitor content + glow for working agents
  for (const [id, sp] of Object.entries(agentStates)) {
    if (!sp.arrived || !sp.isWorking || sp.state==='walking') continue;
    const def = DESK_DEFS[Math.min(sp.slotIdx, DESK_DEFS.length-1)];
    if (!def) continue;
    const [dx,dy] = ts(def.tx, def.ty);
    const W = T*2;
    const sx = dx+W/2-9, sy = dy+8;
    ctx.save();
    // Bright code lines on screen
    const lineC = ['#7aa2f7','#9ece6a','#bb9af7','#ff9e64','#2ac3de'];
    for (let li=0; li<4; li++) {
      const lw = (4 + ((tick*0.4 + li*6 + sp.slotIdx*4)|0) % 16);
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = lineC[(li+(tick/20|0))%lineC.length];
      ctx.fillRect(sx+1, sy+li*3, lw, 2);
    }
    // Cursor blink
    if ((tick>>3)&1) {
      ctx.globalAlpha=1; ctx.fillStyle='#ffffff';
      const lw=(4+((tick*0.4+3*6+sp.slotIdx*4)|0)%16);
      ctx.fillRect(sx+1+lw, sy+9, 2, 2);
    }
    // Screen glow — bright halo around desk
    ctx.globalAlpha = 0.12+Math.sin(tick*0.04)*0.04;
    const g=ctx.createRadialGradient(sx+11,sy+7,0,sx+11,sy+7,50);
    g.addColorStop(0,sp.palette.accent); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.fillRect(sx-30,sy-20,82,70);
    ctx.restore();
  }

  // Animated window light shafts — more visible
  for (let i=0; i<4; i++) {
    const wx=OX+(3+i*6)*T+4, wy=OY+5;
    const alpha=0.07+Math.sin(tick*0.012+i*2.1)*0.025;
    ctx.save(); ctx.globalAlpha=alpha;
    ctx.fillStyle='#ffe8a0';
    ctx.beginPath();
    ctx.moveTo(wx,wy+T-10); ctx.lineTo(wx+T-8,wy+T-10);
    ctx.lineTo(wx+T+6,wy+T*3.5); ctx.lineTo(wx-14,wy+T*3.5);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}

// ════════════════════════════════════════════════════════════════
//  AGENT STATE  (dt-based lerp, full state machine)
// ════════════════════════════════════════════════════════════════
const TOOLS_MAP = {
  Bash:'⚡bash', Read:'📖read', Write:'✍write', Edit:'✏edit',
  Grep:'🔍grep', Glob:'📂glob', WebFetch:'🌐fetch',
  WebSearch:'🔎web', Agent:'🤖spawn', TodoWrite:'📋todo',
};

class AgentState {
  constructor(id, slug) {
    this.id   = id;
    this.slug = slug;
    // floating-point tile position
    this.tx = 4 + Math.random() * 8;
    this.ty = 2 + Math.random() * 4;
    this.targetTx = this.tx; this.targetTy = this.ty;
    this.palette  = getPalette(slug);
    // state machine
    this.state      = 'walking';
    this.nextState  = null;   // queued after non-loop anim finishes
    this.animTime   = 0;      // accumulated seconds in current state
    this.animT      = 0;      // normalized [0..1]
    // logic
    this.isWorking  = false;
    this.slotIdx    = -1;
    this.arrived    = false;
    this.idleTimer  = 0;
    this.walkTimer  = 0;  // how long trying to reach idle slot
    this.isCleaning = false; // true while assigned to clean cat mess
    this._cleanTimer = 0;
    this.thought    = '';
    this.burnout    = 0;  // 0-4: fresh, tired, drained, burnout, crispy
    this._wasWorking = false; // track working transition for burnout
    // celebrating
    this.celebrating      = false;
    this.celebrateTimer   = 0;
    // label spring
    this.labelScale = 0; this.labelVel = 0;
    // spawn flash (scale-in)
    this.spawnScale = 0; this.spawnAlpha = 1; this.spawnBurst = true;
    // stable prefs
    let h=0; for (const c of id) h=(h*31+c.charCodeAt(0))|0;
    // 4 кардинально разных поведения на диване
    const cs = Math.abs(h)%4;
    this.couchIdleState = ['sleeping','drinking_beer','phone','stretching'][cs];
    this.activityAnim = null;
    this.activityDur  = 0;
    this.flip        = Math.abs(h)%3===1; // зеркалит позу на диване
    this.prevStatus  = '';
    this.waypoints   = [];  // A* path waypoints
  }

  get depth() { return this.ty + this.tx * 0.001; }
  get sx()    { return OX + this.tx * T + T/2; }
  get sy()    { return OY + this.ty * T + T/2; }

  setAnim(state, next=null) {
    if (this.state === state) return;
    this.state = state; this.nextState = next;
    this.animTime = 0; this.animT = 0;
  }

  // Set movement target and compute pathfinding waypoints
  setTarget(tx, ty) {
    if (Math.abs(this.targetTx - tx) < 0.01 && Math.abs(this.targetTy - ty) < 0.01) return;
    this.targetTx = tx; this.targetTy = ty;
    this.waypoints = astar(this.tx, this.ty, tx, ty) || [];
  }

  moveToward(dt, speed=3.5) {
    // Follow A* waypoints first
    while (this.waypoints.length > 0) {
      const wp = this.waypoints[0];
      const dtx = wp.tx - this.tx, dty = wp.ty - this.ty;
      const dist = Math.sqrt(dtx*dtx + dty*dty);
      if (dist < 0.18) { this.waypoints.shift(); continue; }
      const step = Math.min(speed * dt, dist);
      this.tx += (dtx/dist)*step; this.ty += (dty/dist)*step;
      return false;
    }
    // Direct movement to final target
    const dtx=this.targetTx-this.tx, dty=this.targetTy-this.ty;
    const dist=Math.sqrt(dtx*dtx+dty*dty);
    if (dist < 0.04) { this.tx=this.targetTx; this.ty=this.targetTy; return true; }
    const step=Math.min(speed*dt, dist);
    this.tx += (dtx/dist)*step; this.ty += (dty/dist)*step;
    return false;
  }

  update(agentData, deskSet, dt, tick) {
    // ── Spawn scale-in spring ─────────────────────────────────────
    if (this.spawnScale < 1) {
      this.spawnScale = Math.min(1, this.spawnScale + dt * 4);
    }

    // ── Label spring (k=180, d=16) ────────────────────────────────
    const lf = (1 - this.labelScale)*180 - this.labelVel*16;
    this.labelVel += lf*dt;
    this.labelScale = clamp(this.labelScale + this.labelVel*dt, 0, 1.25);

    // ── Detect task completion → celebrate ────────────────────────
    const working = agentData.status==='working' || agentData.status==='thinking';
    if (this.prevStatus && this.isWorking && !working && !this.celebrating) {
      this.celebrating = true;
      this.celebrateTimer = ANIM.celebrating.frames / ANIM.celebrating.fps;
      PS.confetti(this.sx, this.sy);
      sndState();
    }
    // ── Burnout tracking ──────────────────────────────────────────
    if (this._wasWorking && !working) {
      this.burnout = Math.min(4, this.burnout + 1);
    }
    this._wasWorking = working;
    this.prevStatus = agentData.status;
    this.lastAgentData = agentData;
    if (this.celebrating) {
      this.celebrateTimer -= dt;
      if (this.celebrateTimer <= 0) this.celebrating = false;
    }

    // ── Slot assignment ───────────────────────────────────────────
    // If cleaning, don't touch slot assignment — cleaning logic controls movement
    if (this.isCleaning) return;

    if (working !== this.isWorking) {
      // Release idle slot when transitioning away from idle
      if (!this.isWorking && this.slotIdx >= 0 && idleOccupied[this.slotIdx] === this.id) {
        delete idleOccupied[this.slotIdx];
      }
      this.isWorking = working; this.slotIdx = -1; this.arrived = false;
      this.activityAnim = null; this.activityDur = 0;
    }
    if (working) {
      if (this.slotIdx === -1) {
        for (let i=0;i<DESK_SLOTS.length;i++) { if(!deskSet.has(i)){this.slotIdx=i;deskSet.add(i);break;} }
        if (this.slotIdx===-1) this.slotIdx=deskSet.size%DESK_SLOTS.length;
      }
      const slot=DESK_SLOTS[Math.min(this.slotIdx,DESK_SLOTS.length-1)];
      this.setTarget(slot.tx, slot.ty);
    } else {
      // Pick activity if none or expired
      if (this.slotIdx===-1 || this.activityDur<=0) {
        // Release current slot before picking new
        if (this.slotIdx >= 0 && idleOccupied[this.slotIdx] === this.id) {
          delete idleOccupied[this.slotIdx];
        }
        this.slotIdx = -1;

        // Build list of available slots (not held by any other agent)
        const avail=[];
        for(let i=0;i<IDLE_SPOTS.length;i++){
          const holder=idleOccupied[i];
          if(holder !== undefined && holder !== this.id) continue; // taken by another
          const sp=IDLE_SPOTS[i];
          if(sp.type==='group'){
            const pair=GROUP_PAIRS[sp.groupId];
            const otherIdx=pair[0]===i?pair[1]:pair[0];
            const otherHolder=idleOccupied[otherIdx];
            // Allow only if partner slot is free
            if(otherHolder===undefined || otherHolder===this.id) avail.push({i,w:sp.w});
          } else {
            avail.push({i,w:sp.w});
          }
        }
        if(avail.length>0){
          const totalW=avail.reduce((s,a)=>s+a.w,0);
          let r=Math.random()*totalW;
          for(const a of avail){ r-=a.w; if(r<=0){this.slotIdx=a.i;break;} }
          if(this.slotIdx===-1) this.slotIdx=avail[avail.length-1].i;
        } else {
          this.slotIdx=Math.floor(Math.random()*Math.max(1,IDLE_SPOTS.length));
        }
        idleOccupied[this.slotIdx] = this.id;  // claim slot
        const sp=IDLE_SPOTS[this.slotIdx];
        this.activityAnim = sp.anim;
        this.activityDur = 10 + Math.random()*20;  // 10–30 seconds
        this.arrived=false; this.walkTimer=0;
      }
      const sp=IDLE_SPOTS[Math.min(this.slotIdx,IDLE_SPOTS.length-1)];
      this.setTarget(sp.tx, sp.ty);
    }

    // ── Advance anim timer ────────────────────────────────────────
    const cfg = ANIM[this.state] ?? ANIM.walking;
    this.animTime += dt;
    const totalDur = cfg.frames / cfg.fps;
    if (cfg.loop) {
      this.animT = (this.animTime % totalDur) / totalDur;
    } else {
      this.animT = Math.min(this.animTime / totalDur, 1);
      if (this.animT >= 0.99 && this.nextState) {
        this.setAnim(this.nextState);
      }
    }

    // ── Override: celebration ─────────────────────────────────────
    if (this.celebrating) {
      if (this.state !== 'celebrating') this.setAnim('celebrating');
      this.moveToward(dt, 2);
      this.thought = '🎉';
      return;
    }

    // ── Movement / state machine ──────────────────────────────────
    if (!this.arrived) {
      if (this.state !== 'walking') this.setAnim('walking');
      const walkSpeed = this.burnout >= 3 ? 2.5 : 3.5;
      if (this.moveToward(dt, walkSpeed)) {
        this.arrived = true; this.idleTimer = 0; this.walkTimer = 0;
        if (working) this.setAnim('sitting_down','typing_normal');
        else         this.setAnim(this.activityAnim || this.couchIdleState);
      } else if (!working) {
        // Timeout: give up on this slot after 5s and pick another
        this.walkTimer += dt;
        if (this.walkTimer > 7) {
          if (this.slotIdx >= 0 && idleOccupied[this.slotIdx] === this.id)
            delete idleOccupied[this.slotIdx];
          this.slotIdx = -1; this.activityDur = 0; this.walkTimer = 0;
        }
      }
    } else {
      this.idleTimer += dt;
      if (working) {
        const furious = agentData.currentTool==='Bash'||agentData.currentTool==='Write'||agentData.currentTool==='Edit';
        const wantBase = agentData.status==='thinking' ? 'thinking'
                       : furious ? 'typing_furious' : 'typing_normal';
        const notBusy = this.state!=='sitting_down'&&this.state!=='drinking_desk'&&this.state!=='spinning_chair';
        if (notBusy && this.state!==wantBase) this.setAnim(wantBase);
        // Idle variety: coffee every ~30s
        if (this.idleTimer > 30 && this.state==='typing_normal') {
          this.setAnim('drinking_desk','typing_normal'); this.idleTimer=0;
        }
        // Idle variety: spin every ~60s
        if (this.idleTimer > 60 && this.state==='typing_normal') {
          this.setAnim('spinning_chair','typing_normal'); this.idleTimer=0;
        }
        if (this.state==='typing_furious') PS.sweat(this.sx+10, this.sy-10);
        if (this.state==='typing_normal'||this.state==='thinking') PS.smoke(this.sx+18, this.sy-14);
      } else {
        this.activityDur -= dt;
        const want = this.activityAnim || this.couchIdleState;
        if (this.state!==want && this.state!=='sitting_couch') this.setAnim(want);
        // Particles by activity
        if (this.state==='sleeping'||this.state==='desk_nap') PS.zzz(this.sx+12, this.sy-16);
        if (this.state==='drinking_beer') PS.foam(this.sx-4, this.sy-18);
        if (this.state==='at_coffee'||this.state==='eating') PS.smoke(this.sx+8, this.sy-14);
        if (this.state==='headphones'||this.state==='air_guitar') {
          if(Math.random()<0.02) PS.emit(this.sx+8,this.sy-18,1,{vx:(Math.random()-0.5)*20,vy:-30,spread:4,gravity:-5,life:1,size:4,color:this.palette.accent});
        }
      }
    }

    // ── Thought content ───────────────────────────────────────────
    this.thought = (agentData.currentTool && working)
      ? (TOOLS_MAP[agentData.currentTool] ?? agentData.currentTool.toLowerCase())
      : agentData.status==='thinking' ? '...' : '';
  }

  draw(ctx) {
    ctx.save();
    // spawn scale-in
    if (this.spawnScale < 1) {
      ctx.translate(this.sx, this.sy);
      ctx.scale(this.spawnScale, this.spawnScale);
      ctx.translate(-this.sx, -this.sy);
    }
    // зеркало для диванных поз — разнообразие
    const onCouch = this.state==='sleeping'||this.state==='drinking_beer'||this.state==='stretching'||this.state==='sitting_couch';
    if (this.flip && onCouch) {
      ctx.translate(this.sx, this.sy);
      ctx.scale(-1, 1);
      ctx.translate(-this.sx, -this.sy);
    }
    const fn = CHAR_DRAW[this.state] ?? drawWalking;
    fn(ctx, this.sx, this.sy, this.palette, this.animT);
    ctx.restore();
  }

  drawOverlay(ctx, tick) {
    drawLabel(ctx, this.sx, this.sy, getRole(this.lastAgentData || {slug: this.slug}), this.labelScale, this.burnout);
    const showThought = this.thought &&
      (this.state==='typing_normal'||this.state==='typing_furious'||this.state==='thinking');
    if (showThought) drawThoughtBubble(ctx, this.sx, this.sy-8, this.thought, tick);
  }
}

// ════════════════════════════════════════════════════════════════
//  CAT  🐱
// ════════════════════════════════════════════════════════════════
function drawCat(ctx, cx, cy, tick, state) {
  const phase = tick * 0.04;
  const tailSwing = Math.sin(phase) * 0.5;

  // shadow
  ctx.fillStyle='rgba(0,0,0,0.18)';
  ctx.beginPath(); ctx.ellipse(cx,cy+10,9,3,0,0,Math.PI*2); ctx.fill();

  if (state === 'sleeping') {
    // curled up — horizontal oval
    ctx.fillStyle='#e8902a';
    ctx.beginPath(); ctx.ellipse(cx,cy+4,13,8,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#d07820';
    // tail curled over body
    ctx.beginPath();
    ctx.arc(cx+6,cy+2,8,Math.PI*0.2,Math.PI*1.1); ctx.lineWidth=4;
    ctx.strokeStyle='#e8902a'; ctx.stroke();
    ctx.arc(cx+6,cy+2,8,Math.PI*0.2,Math.PI*1.1); ctx.lineWidth=2;
    ctx.strokeStyle='#d07820'; ctx.stroke();
    // head tucked, tiny ears
    ctx.fillStyle='#e8902a';
    ctx.beginPath(); ctx.ellipse(cx-8,cy,7,6,0.4,0,Math.PI*2); ctx.fill();
    // ears (small nubs)
    ctx.beginPath(); ctx.moveTo(cx-13,cy-4); ctx.lineTo(cx-11,cy-9); ctx.lineTo(cx-8,cy-4); ctx.closePath();
    ctx.fillStyle='#e8902a'; ctx.fill();
    // closed eyes
    ctx.strokeStyle='#2a1808'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(cx-9,cy-1,2,Math.PI,0); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx-5,cy-1,2,Math.PI,0); ctx.stroke();
    // stripes
    ctx.strokeStyle='#c07018'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(cx-2,cy+1); ctx.lineTo(cx+4,cy+3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy-3); ctx.lineTo(cx+6,cy-1); ctx.stroke();
    return;
  }

  if (state === 'eating') {
    // Cat leaning down to eat from bowl — head lowered, tail up happy
    ctx.fillStyle='#e8902a';
    // Body leaning forward
    ctx.beginPath(); ctx.ellipse(cx,cy+3,9,7,-0.3,0,Math.PI*2); ctx.fill();
    // Belly
    ctx.fillStyle='#f5c870';
    ctx.beginPath(); ctx.ellipse(cx,cy+5,5,4.5,-0.3,0,Math.PI*2); ctx.fill();
    // Tail up and happy (curled)
    ctx.strokeStyle='#e8902a'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(cx-6,cy+2); ctx.quadraticCurveTo(cx-16,cy-4,cx-12,cy-14); ctx.stroke();
    ctx.strokeStyle='#d07820'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx-6,cy+2); ctx.quadraticCurveTo(cx-16,cy-4,cx-12,cy-14); ctx.stroke();
    // Head down toward bowl (tilted forward)
    ctx.fillStyle='#e8902a';
    ctx.beginPath(); ctx.ellipse(cx+7,cy+4,7,6,0.5,0,Math.PI*2); ctx.fill();
    // Ears
    ctx.beginPath(); ctx.moveTo(cx+3,cy-1); ctx.lineTo(cx+4,cy-7); ctx.lineTo(cx+8,cy-1); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+8,cy-1); ctx.lineTo(cx+10,cy-7); ctx.lineTo(cx+13,cy-1); ctx.closePath(); ctx.fill();
    // Closed happy eyes (eating)
    ctx.strokeStyle='#2a1808'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(cx+6,cy+3,2,Math.PI,0); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx+10,cy+3,2,Math.PI,0); ctx.stroke();
    // Nose
    ctx.fillStyle='#e06080';
    ctx.beginPath(); ctx.ellipse(cx+8,cy+6,1.5,1,0,0,Math.PI*2); ctx.fill();
    // Eating particles (little kibble bits)
    const ep = tick * 0.06;
    ctx.fillStyle='#e8902a80';
    ctx.beginPath(); ctx.arc(cx+10+Math.cos(ep)*3, cy+8+Math.sin(ep*1.3)*2, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+7+Math.cos(ep+2)*2, cy+9+Math.sin(ep*0.9)*1.5, 1, 0, Math.PI*2); ctx.fill();
    return;
  }

  if (state === 'pooping') {
    // squatting - very low, haunches down
    ctx.fillStyle='#e8902a';
    ctx.beginPath(); ctx.ellipse(cx,cy+2,9,7,0,0,Math.PI*2); ctx.fill();
    // ears
    ctx.beginPath(); ctx.moveTo(cx-5,cy-8); ctx.lineTo(cx-3,cy-15); ctx.lineTo(cx,cy-8); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+1,cy-8); ctx.lineTo(cx+3,cy-15); ctx.lineTo(cx+6,cy-8); ctx.closePath(); ctx.fill();
    // head raised (looking away embarrassed)
    ctx.beginPath(); ctx.ellipse(cx+8,cy-6,7,6,0,0,Math.PI*2); ctx.fill();
    // embarrassed eyes (looking away)
    ctx.fillStyle='#1a1020'; ctx.fillRect((cx+5)|0,(cy-8)|0,2,3); ctx.fillRect((cx+10)|0,(cy-8)|0,2,3);
    ctx.fillStyle='#e06080'; ctx.beginPath(); ctx.ellipse(cx+8,cy-5,2,1.5,0,0,Math.PI*2); ctx.fill(); // nose
    // blush
    ctx.fillStyle='#ff808060';
    ctx.beginPath(); ctx.ellipse(cx+4,cy-5,3,2,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+12,cy-5,3,2,0,0,Math.PI*2); ctx.fill();
    // tail up
    ctx.strokeStyle='#e8902a'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.moveTo(cx-8,cy); ctx.quadraticCurveTo(cx-14,cy-8,cx-10,cy-18); ctx.stroke();
    ctx.strokeStyle='#d07820'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx-8,cy); ctx.quadraticCurveTo(cx-14,cy-8,cx-10,cy-18); ctx.stroke();
    // squatted legs
    ctx.fillStyle='#d07820';
    ctx.beginPath(); ctx.ellipse(cx-6,cy+8,4,3,0.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+4,cy+8,4,3,-0.5,0,Math.PI*2); ctx.fill();
    return;
  }

  // Normal sitting/walking cat
  // Body
  ctx.fillStyle='#e8902a';
  ctx.beginPath(); ctx.ellipse(cx,cy+2,9,8,0,0,Math.PI*2); ctx.fill();
  // Belly (lighter)
  ctx.fillStyle='#f5c870';
  ctx.beginPath(); ctx.ellipse(cx,cy+4,5,5,0,0,Math.PI*2); ctx.fill();
  // Tail
  ctx.strokeStyle='#e8902a'; ctx.lineWidth=4;
  ctx.beginPath();
  ctx.moveTo(cx-8,cy+4);
  ctx.quadraticCurveTo(cx-16+Math.sin(phase)*6,cy+10,cx-12+Math.cos(phase+1)*10,cy-4+Math.sin(phase)*4);
  ctx.stroke();
  ctx.strokeStyle='#d07820'; ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(cx-8,cy+4);
  ctx.quadraticCurveTo(cx-16+Math.sin(phase)*6,cy+10,cx-12+Math.cos(phase+1)*10,cy-4+Math.sin(phase)*4);
  ctx.stroke();
  // Feet
  ctx.fillStyle='#d07820';
  ctx.beginPath(); ctx.ellipse(cx-4,cy+9,4,2.5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+4,cy+9,4,2.5,0,0,Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle='#e8902a';
  ctx.beginPath(); ctx.ellipse(cx+4,cy-8,8,7,0,0,Math.PI*2); ctx.fill();
  // Ears
  ctx.beginPath(); ctx.moveTo(cx-1,cy-13); ctx.lineTo(cx+1,cy-20); ctx.lineTo(cx+5,cy-13); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx+5,cy-13); ctx.lineTo(cx+8,cy-20); ctx.lineTo(cx+12,cy-13); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#d07050';
  ctx.beginPath(); ctx.moveTo(cx,cy-13); ctx.lineTo(cx+2,cy-18); ctx.lineTo(cx+4,cy-13); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(cx+6,cy-13); ctx.lineTo(cx+8,cy-18); ctx.lineTo(cx+10,cy-13); ctx.closePath(); ctx.fill();
  // Eyes
  const blink = Math.floor(tick/120)%8===0 && (tick%8<2);
  ctx.fillStyle='#1a1020';
  if (blink) {
    ctx.fillRect((cx+1)|0,(cy-10)|0,4,1);
    ctx.fillRect((cx+7)|0,(cy-10)|0,4,1);
  } else {
    ctx.beginPath(); ctx.ellipse(cx+3,cy-10,2.5,3,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+9,cy-10,2.5,3,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#3a2860';
    ctx.beginPath(); ctx.ellipse(cx+3,cy-10,1.5,2.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+9,cy-10,1.5,2.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffffff';
    ctx.fillRect((cx+2)|0,(cy-12)|0,1,1); ctx.fillRect((cx+8)|0,(cy-12)|0,1,1);
  }
  // Nose
  ctx.fillStyle='#e06080';
  ctx.beginPath(); ctx.ellipse(cx+6,cy-7,2,1.5,0,0,Math.PI*2); ctx.fill();
  // Whiskers
  ctx.strokeStyle='#ffffff70'; ctx.lineWidth=0.8;
  [[cx+6,cy-7,cx-4,cy-8],[cx+6,cy-7,cx+15,cy-8],
   [cx+6,cy-6,cx-4,cy-5],[cx+6,cy-6,cx+15,cy-5]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });
  // Tabby stripes
  ctx.strokeStyle='#c07018'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(cx-5,cy-2); ctx.lineTo(cx-3,cy+3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy-5); ctx.lineTo(cx+1,cy-1); ctx.stroke();
}

function drawMess(ctx, mx, my, tick) {
  // Poop pile with smell waves
  ctx.fillStyle='#6a3a10';
  ctx.beginPath(); ctx.ellipse(mx,my+6,7,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(mx,my+2,5,4,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(mx,my-1,3.5,3.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#8a4a18';
  ctx.beginPath(); ctx.ellipse(mx-1,my+5,4,2,0,0,Math.PI*2); ctx.fill();
  // Smell lines
  ctx.strokeStyle='#60a82080'; ctx.lineWidth=1.5;
  for(let i=0;i<3;i++){
    const off=i*5, sw=Math.sin(tick*0.1+i*2.1)*3;
    ctx.beginPath();
    ctx.moveTo(mx-4+off,my-4);
    ctx.quadraticCurveTo(mx-6+off+sw,my-10,mx-4+off,my-16);
    ctx.stroke();
  }
}

class CatState {
  constructor() {
    this.tx = 5 + Math.random() * (COLS * 0.5);
    this.ty = 3 + Math.random() * 4;
    this.targetTx = this.tx; this.targetTy = this.ty;
    this.state = 'sitting'; // sitting, walking, sleeping, pooping, eating
    this.stateTimer = 4 + Math.random() * 6;
    this.flip = false;
    this.messExists = false;
    this.messTx = 0; this.messTy = 0;
    this.cleaningAgentId = null;
    this.messAssignTimer = 0;
    this.eatTarget = null; // which bowl it's heading to
  }
  get sx() { return OX + this.tx * T + T/2; }
  get sy() { return OY + this.ty * T + T/2; }

  pickTarget() {
    // 30% chance to head to a food bowl (only if it has food)
    const fullBowls = CAT_BOWLS.filter(b => b.hasFod);
    if (fullBowls.length > 0 && Math.random() < 0.30) {
      const bowl = fullBowls[Math.floor(Math.random() * fullBowls.length)];
      this.targetTx = bowl.tx + 0.5; this.targetTy = bowl.ty + 0.5;
      this.eatTarget = bowl;
    } else {
      this.eatTarget = null;
      // Wander around main office floor (avoid kitchen and walls)
      this.targetTx = 2 + Math.random() * Math.min(COLS-8, 20);
      this.targetTy = 2 + Math.random() * Math.max(4, Math.min(ROWS*0.6, 12));
    }
  }

  update(dt, tick) {
    this.stateTimer -= dt;
    if (this.state === 'walking') {
      const dtx = this.targetTx - this.tx, dty = this.targetTy - this.ty;
      const dist = Math.sqrt(dtx*dtx + dty*dty);
      if (dist < 0.25) {
        if (this.eatTarget && this.eatTarget.hasFod) {
          this.eatTarget.hasFod = false; // eat the food
          this.state = 'eating'; this.stateTimer = 4 + Math.random() * 5;
        } else if (this.eatTarget && !this.eatTarget.hasFod) {
          // Bowl empty — sniff and walk away disappointed
          this.eatTarget = null;
          this.state = 'sitting'; this.stateTimer = 2;
        } else {
          this.state = 'sitting'; this.stateTimer = 5 + Math.random() * 10;
        }
      } else {
        const step = Math.min(1.2 * dt, dist);
        this.tx += (dtx/dist)*step; this.ty += (dty/dist)*step;
        this.flip = dtx < 0;
      }
    }
    if (this.state === 'eating' && this.stateTimer <= 0) {
      this.eatTarget = null;
      this.state = 'walking'; this.pickTarget(); this.stateTimer = 3 + Math.random() * 6;
    }
    if (this.stateTimer <= 0 && this.state !== 'eating') {
      const r = Math.random();
      if (r < 0.30) {
        this.state = 'walking'; this.pickTarget(); this.stateTimer = 4 + Math.random() * 8;
      } else if (r < 0.50) {
        this.state = 'sleeping'; this.stateTimer = 10 + Math.random() * 20;
      } else if (r < 0.70) {
        this.state = 'sitting'; this.stateTimer = 5 + Math.random() * 8;
      } else if (!this.messExists && r < 0.85) {
        this.state = 'pooping'; this.stateTimer = 4 + Math.random() * 3;
      } else {
        this.state = 'sitting'; this.stateTimer = 4 + Math.random() * 6;
      }
    }
    // After pooping, leave mess and walk away
    if (this.state === 'pooping' && this.stateTimer < 1 && !this.messExists) {
      this.messExists = true;
      this.messTx = this.tx; this.messTy = this.ty + 1;
      this.state = 'walking'; this.pickTarget(); this.stateTimer = 5;
    }
  }

  draw(ctx, tick) {
    ctx.save();
    if (this.flip) {
      ctx.translate(this.sx, this.sy); ctx.scale(-1,1); ctx.translate(-this.sx, -this.sy);
    }
    drawCat(ctx, this.sx, this.sy, tick, this.state);
    ctx.restore();
    // Draw mess
    if (this.messExists) {
      drawMess(ctx, OX+this.messTx*T+T/2, OY+this.messTy*T+T/2, tick);
    }
  }
}

const cat = new CatState();
// Bowl refill tracking: [{agentId, bowlIdx, refillTimer}]
const bowlRefills = {}; // bowlIdx -> {agentId, timer}

// ════════════════════════════════════════════════════════════════
//  GAME LOOP  (delta-time based)
// ════════════════════════════════════════════════════════════════
const canvas  = document.getElementById('office');
const ctx     = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const agentsData    = {};
const agentStates   = {};
const idleOccupied  = {}; // slotIdx → agentId  (persistent, exclusive slots)
let   globalTick  = 0;
let   lastTime    = 0;
const startTime = Date.now();

// ── Side panel helpers ────────────────────────────────────────────
function drawLeftPanel(ctx, tick) {
  const W = OX - 6, H = CH;
  // Background
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#1a1c2e';
  ctx.fillRect(W, 0, 3, H);

  // Title
  ctx.fillStyle = '#7aa2f7';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('◈ AGENTS', W/2, 22);
  ctx.fillStyle = '#2a2c4e';
  ctx.fillRect(6, 28, W-12, 1);

  let y = 46;
  const entries = Object.entries(agentStates);
  for (const [id, sp] of entries) {
    const ad = agentsData[id];
    if (!ad) continue;
    const role = getRole(ad);
    const isWork = sp.isWorking;
    const status = ad.status || 'idle';

    // Row bg for working agents
    if (isWork) {
      ctx.fillStyle = 'rgba(122,162,247,0.10)';
      ctx.fillRect(4, y-14, W-8, 26);
    }

    // Status dot
    const dotC = isWork ? '#9ece6a' : status === 'thinking' ? '#e0af68' : '#3d4466';
    ctx.fillStyle = dotC;
    ctx.beginPath(); ctx.arc(13, y-3, 4, 0, Math.PI*2); ctx.fill();
    if (isWork) {
      ctx.fillStyle = dotC + '40';
      ctx.beginPath(); ctx.arc(13, y-3, 7, 0, Math.PI*2); ctx.fill();
    }

    // Role name
    ctx.fillStyle = isWork ? '#e4ecff' : '#8892b0';
    ctx.font = (isWork ? 'bold ' : '') + '11px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(role.substring(0, 11), 24, y);

    // Tool / state badge
    if (isWork && ad.currentTool) {
      ctx.fillStyle = '#bb9af7';
      ctx.font = '9px monospace';
      ctx.fillText(ad.currentTool.substring(0, 11), 24, y + 12);
    } else if (!isWork && sp.activityAnim) {
      ctx.fillStyle = '#3d4466';
      ctx.font = '9px monospace';
      ctx.fillText(sp.activityAnim.replace(/_/g,' ').substring(0, 13), 24, y + 12);
    }

    y += 28;
    if (y > H - 28) break;
  }

  // Footer — total count
  ctx.fillStyle = '#2a2c4e';
  ctx.fillRect(6, H-28, W-12, 1);
  ctx.fillStyle = '#565f89';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  const total = entries.length;
  const working = entries.filter(([,s])=>s.isWorking).length;
  ctx.fillText(`${working}/${total} working`, W/2, H-10);
}

function drawRightPanel(ctx, tick) {
  const panelX = CW - OX + 3;
  const W = OX - 6, H = CH;

  // Background
  ctx.fillStyle = '#1a1c2e';
  ctx.fillRect(panelX - 3, 0, 3, H);
  ctx.fillStyle = '#0d0d1a';
  ctx.fillRect(panelX, 0, W + 6, H);

  // Title
  ctx.fillStyle = '#bb9af7';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('◈ STATS', panelX + W/2, 22);
  ctx.fillStyle = '#2a2c4e';
  ctx.fillRect(panelX + 6, 28, W-12, 1);

  const label = (txt, val, col, yy) => {
    ctx.fillStyle = '#565f89';
    ctx.font = '9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(txt, panelX + 8, yy);
    ctx.fillStyle = col || '#c8d3f5';
    ctx.font = 'bold 14px monospace';
    ctx.fillText(String(val), panelX + 8, yy + 16);
  };

  // Uptime
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const hh = String(Math.floor(elapsed/3600)).padStart(2,'0');
  const mm = String(Math.floor((elapsed%3600)/60)).padStart(2,'0');
  const ss = String(elapsed%60).padStart(2,'0');
  label('UPTIME', `${hh}:${mm}:${ss}`, '#7aa2f7', 46);

  // Agent counts
  const agents = Object.values(agentStates);
  const working = agents.filter(s=>s.isWorking).length;
  const idle = agents.length - working;
  label('ONLINE', agents.length, '#9ece6a', 84);
  label('WORKING', working, '#e0af68', 118);
  label('IDLE', idle, '#565f89', 152);

  // Tasks
  const doneTasks = (typeof myTasks !== 'undefined') ? myTasks.filter(t=>t.status==='done').length : 0;
  const todoTasks = (typeof myTasks !== 'undefined') ? myTasks.filter(t=>t.status==='todo').length : 0;
  ctx.fillStyle = '#2a2c4e';
  ctx.fillRect(panelX+6, 180, W-12, 1);
  label('TODO', todoTasks, '#e0af68', 194);
  label('DONE', doneTasks, '#9ece6a', 228);

  // Cat status
  ctx.fillStyle = '#2a2c4e';
  ctx.fillRect(panelX+6, 256, W-12, 1);
  ctx.fillStyle = '#565f89'; ctx.font = '9px monospace'; ctx.textAlign='left';
  ctx.fillText('CAT', panelX+8, 270);
  const catMood = cat.messExists ? '💩 mess!' : cat.state === 'sleeping' ? '😴 asleep' : cat.state === 'eating' ? '🍽 eating' : '🐱 roaming';
  ctx.fillStyle = cat.messExists ? '#f7768e' : '#c8d3f5';
  ctx.font = 'bold 11px monospace';
  ctx.fillText(catMood, panelX+8, 286);

  // Mini activity bar
  ctx.fillStyle = '#2a2c4e';
  ctx.fillRect(panelX+6, 306, W-12, 1);
  ctx.fillStyle = '#565f89'; ctx.font = '9px monospace';
  ctx.fillText('ACTIVITY', panelX+8, 320);
  if (agents.length > 0) {
    const barW = W - 16;
    const wFrac = working / agents.length;
    ctx.fillStyle = '#1a2040';
    ctx.fillRect(panelX+8, 326, barW, 8);
    ctx.fillStyle = '#9ece6a';
    ctx.fillRect(panelX+8, 326, barW * wFrac, 8);
    ctx.fillStyle = '#ffffff20';
    ctx.fillRect(panelX+8, 326, barW, 3);
  }

  // Blinking indicator
  if ((tick >> 4) & 1) {
    ctx.fillStyle = '#9ece6a';
    ctx.beginPath(); ctx.arc(panelX + W - 10, 14, 4, 0, Math.PI*2); ctx.fill();
  }

  ctx.textAlign = 'left';
}

function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;
  globalTick++;

  // ── Sync ─────────────────────────────────────────────────────
  for (const id of Object.keys(agentStates)) {
    if (!agentsData[id]) {
      // Release any held idle slot
      for (const k of Object.keys(idleOccupied)) {
        if (idleOccupied[k] === id) delete idleOccupied[k];
      }
      PS.puff(agentStates[id].sx, agentStates[id].sy, agentStates[id].palette.accent);
      sndRemove();
      delete agentStates[id];
    }
  }
  for (const [id, a] of Object.entries(agentsData)) {
    if (!agentStates[id]) {
      agentStates[id] = new AgentState(id, a.slug);
      PS.burst(agentStates[id].sx, agentStates[id].sy, getPalette(a.slug).accent);
      sndSpawn();
    }
  }

  // ── Layout ───────────────────────────────────────────────────
  const n = Object.keys(agentsData).length;
  if (generateLayout(Math.max(1, n))) {
    // Clear all slot bookings — layout changed, spots shifted
    for (const k of Object.keys(idleOccupied)) delete idleOccupied[k];
    for (const sp of Object.values(agentStates)) { sp.slotIdx=-1; sp.arrived=false; sp.activityDur=0; }
    buildBackground();
    buildObstacleGrid();
  }

  // ── Update ────────────────────────────────────────────────────
  const deskSet=new Set();
  for (const sp of Object.values(agentStates)) {
    if (sp.arrived && sp.slotIdx>=0 && sp.isWorking) deskSet.add(sp.slotIdx);
  }
  for (const [id,sp] of Object.entries(agentStates)) sp.update(agentsData[id],deskSet,dt,globalTick);

  // ── Agent separation (soft collision) ──────────────────────────
  {
    const list = Object.values(agentStates);
    const MIN = 0.9; // min distance in tiles
    for (let i = 0; i < list.length; i++) {
      for (let j = i + 1; j < list.length; j++) {
        const a = list[i], b = list[j];
        const dx = a.tx - b.tx, dy = a.ty - b.ty;
        const d2 = dx*dx + dy*dy;
        if (d2 > MIN*MIN || d2 < 0.0001) continue;
        const d = Math.sqrt(d2);
        const overlap = (MIN - d) / d; // fractional overlap
        const nx = dx * overlap, ny = dy * overlap;
        if (!a.arrived && !b.arrived) {
          // both walking — push equally apart
          a.tx += nx * 0.5; a.ty += ny * 0.5;
          b.tx -= nx * 0.5; b.ty -= ny * 0.5;
        } else if (!a.arrived) {
          // b is seated — push a away fully
          a.tx += nx; a.ty += ny;
        } else if (!b.arrived) {
          // a is seated — push b away fully
          b.tx -= nx; b.ty -= ny;
        }
      }
    }
  }

  cat.update(dt, globalTick);

  // ── Ping pong ball physics ──────────────────────────────────────
  {
    // Active only when both players are at their spots
    const ppPair = GROUP_PAIRS[10];
    const bothHere = ppPair && ppPair.every(idx => {
      const holder = idleOccupied[idx];
      return holder && agentStates[holder]?.arrived;
    });
    ppBall.active = bothHere;
    if (ppBall.active) {
      ppBall.t += ppBall.dir * ppBall.speed * dt;
      if (ppBall.t >= 1) { ppBall.t = 1; ppBall.dir = -1; }
      if (ppBall.t <= 0) { ppBall.t = 0; ppBall.dir =  1; }
    }
  }

  // ── Cat mess cleanup ───────────────────────────────────────────
  if (!cat.messExists) {
    if (cat.cleaningAgentId && agentStates[cat.cleaningAgentId]) {
      const sp = agentStates[cat.cleaningAgentId];
      sp.isCleaning = false; sp._cleanTimer = 0;
      sp.slotIdx = -1; sp.activityDur = 0; sp.arrived = false;
    }
    cat.cleaningAgentId = null; cat.messAssignTimer = 0;
  } else {
    // Release if cleaner went working
    if (cat.cleaningAgentId && agentStates[cat.cleaningAgentId]?.isWorking) {
      agentStates[cat.cleaningAgentId].isCleaning = false;
      agentStates[cat.cleaningAgentId]._cleanTimer = 0;
      cat.cleaningAgentId = null; cat.messAssignTimer = 0;
    }
    // Assign nearest free agent after 3s
    if (cat.cleaningAgentId === null) {
      cat.messAssignTimer += dt;
      if (cat.messAssignTimer >= 3) {
        let nearest = null, nearestDist = Infinity;
        for (const [aid, sp] of Object.entries(agentStates)) {
          if (sp.isWorking || sp.isCleaning) continue;
          const dx = sp.tx - cat.messTx, dy = sp.ty - cat.messTy;
          const d = Math.sqrt(dx*dx + dy*dy);
          if (d < nearestDist) { nearestDist = d; nearest = aid; }
        }
        if (nearest) {
          const sp = agentStates[nearest];
          if (sp.slotIdx >= 0 && idleOccupied[sp.slotIdx] === nearest)
            delete idleOccupied[sp.slotIdx];
          sp.slotIdx = -1; sp.activityDur = 0;
          sp.isCleaning = true; sp._cleanTimer = 0; sp.arrived = false;
          cat.cleaningAgentId = nearest; cat.messAssignTimer = 0;
        } else {
          cat.messAssignTimer = 2; // retry in 1s
        }
      }
    }
    // Move cleaner toward mess, then clean
    if (cat.cleaningAgentId && agentStates[cat.cleaningAgentId]) {
      const sp = agentStates[cat.cleaningAgentId];
      const dx = cat.messTx - sp.tx, dy = cat.messTy - sp.ty;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 1.0) {
        if (sp.state !== 'walking') sp.setAnim('walking');
        const step = Math.min(3.5 * dt, dist);
        sp.tx += (dx/dist)*step; sp.ty += (dy/dist)*step;
        sp.flip = dx < 0;
      } else {
        if (sp.state !== 'cleaning') sp.setAnim('cleaning');
        sp._cleanTimer += dt;
        if (sp._cleanTimer >= 4) cat.messExists = false;
      }
    }
  }

  // Bowl refill logic — assign a free agent to refill empty bowls
  for (let bi = 0; bi < CAT_BOWLS.length; bi++) {
    const bowl = CAT_BOWLS[bi];
    if (bowl.hasFod) { delete bowlRefills[bi]; continue; }
    if (!bowlRefills[bi]) {
      // Find a free agent not already on refill duty
      const busyIds = Object.values(bowlRefills).map(r => r.agentId);
      const idle = Object.entries(agentStates).filter(([aid, s]) =>
        !s.isWorking && s.state !== 'cleaning' && !busyIds.includes(aid));
      if (idle.length > 0) {
        const [aid] = idle[Math.floor(Math.random() * idle.length)];
        bowlRefills[bi] = { agentId: aid, timer: 0 };
      }
    }
    const refill = bowlRefills[bi];
    if (!refill) continue;
    const sp = agentStates[refill.agentId];
    if (!sp || sp.isWorking) { delete bowlRefills[bi]; continue; } // agent left
    const bdx = sp.tx - (bowl.tx + 0.5), bdy = sp.ty - (bowl.ty + 0.5);
    const distToBowl = Math.sqrt(bdx*bdx + bdy*bdy);
    if (distToBowl > 1.2) {
      sp.setTarget(bowl.tx + 0.5, bowl.ty + 0.5);
      sp.arrived = false;
    } else {
      // Arrived — pour food (use 'at_coffee' anim as generic pouring)
      if (sp.state !== 'at_coffee') sp.setAnim('at_coffee');
      refill.timer += dt;
      if (refill.timer >= 3) {
        bowl.hasFod = true;
        delete bowlRefills[bi];
        sp.arrived = false; sp.activityDur = 0;
      }
    }
  }

  // Cat interactions — idle agents nearby
  for (const [id, sp] of Object.entries(agentStates)) {
    if (!sp.arrived || sp.isWorking) continue;
    const dx = sp.tx - cat.tx, dy = sp.ty - cat.ty;
    const distToCat = Math.sqrt(dx*dx + dy*dy);
    // Pet the cat if nearby and cat is sitting/sleeping
    if (distToCat < 2.5 && (cat.state === 'sitting' || cat.state === 'sleeping')
        && sp.state !== 'petting_cat' && sp.state !== 'cleaning') {
      sp.setAnim('petting_cat');
    } else if (distToCat >= 2.5 && sp.state === 'petting_cat') {
      const want = sp.activityAnim || sp.couchIdleState;
      sp.setAnim(want);
    }
  }

  PS.update(dt);

  // ── Printer activation ────────────────────────────────────────
  for (const [id, sp] of Object.entries(agentStates)) {
    const ad = agentsData[id];
    if (ad && (ad.currentTool === 'Write' || ad.currentTool === 'Edit')) {
      printerActive = 3;
      trashLevel = Math.min(10, trashLevel + 0.3);
    }
    if (ad && ad.currentTool === 'Bash') {
      trashLevel = Math.min(10, trashLevel + 0.3);
    }
  }
  if (printerActive > 0) printerActive -= dt;

  // ── Trash stomp logic ─────────────────────────────────────────
  if (trashLevel >= 8 && trashAgentId === null) {
    // Find nearest idle agent
    const trashTx = KITCHEN_WALL_COL - 2 + 0.5, trashTy = 3 + 0.5;
    let nearest = null, nearestDist = Infinity;
    for (const [aid, sp] of Object.entries(agentStates)) {
      if (sp.isWorking || sp.isCleaning) continue;
      const dx = sp.tx - trashTx, dy = sp.ty - trashTy;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < nearestDist) { nearestDist = d; nearest = aid; }
    }
    if (nearest) trashAgentId = nearest;
  }
  if (trashAgentId && agentStates[trashAgentId]) {
    const sp = agentStates[trashAgentId];
    if (sp.isWorking) { trashAgentId = null; }
    else {
      const trashTx = KITCHEN_WALL_COL - 2 + 0.5, trashTy = 3 + 0.5;
      const dx = trashTx - sp.tx, dy = trashTy - sp.ty;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 1.2) {
        sp.setTarget(trashTx, trashTy);
        sp.arrived = false;
        if (sp.state !== 'walking') sp.setAnim('walking');
      } else {
        if (sp.state !== 'stretching') sp.setAnim('stretching');
        sp._cleanTimer = (sp._cleanTimer || 0) + dt;
        if (sp._cleanTimer >= 3) {
          trashLevel = 0;
          trashAgentId = null;
          sp._cleanTimer = 0;
          sp.arrived = false; sp.activityDur = 0;
        }
      }
    }
  } else if (trashAgentId && !agentStates[trashAgentId]) {
    trashAgentId = null;
  }

  // ── Draw ─────────────────────────────────────────────────────
  ctx.clearRect(0, 0, CW, canvas.height);
  ctx.drawImage(bgBuf, 0, 0);
  drawLeftPanel(ctx, globalTick);
  drawRightPanel(ctx, globalTick);
  drawDynamicEffects(ctx, globalTick);

  // Kanban board (live tasks)
  drawKanban(ctx);

  // Wall clock (dynamic hands)
  drawWallClock(ctx);

  // TV game animation — active when any agent is gaming
  if (ACT_ZONE_Y > 0) {
    const anyGaming = Object.values(agentStates).some(s => s.activityAnim === 'gaming' && s.arrived);
    const [tvx, tvy] = ts(9, ACT_ZONE_Y + 0.3);
    const sx = tvx + 6, sy = tvy + 6, sw = T*4 - 14, sh = T*2.5 - 12;
    if (anyGaming) {
      // Clip to TV screen bounds
      ctx.save();
      ctx.beginPath(); ctx.rect(sx, sy, sw, sh); ctx.clip();
      // Animated game screen
      const gf = (globalTick >> 2) & 3; // 0-3 frame
      // Sky gradient
      ctx.fillStyle = '#0d1a3a'; ctx.fillRect(sx, sy, sw, sh);
      // Scrolling ground
      ctx.fillStyle = '#1a3a10'; ctx.fillRect(sx, sy + sh - 10, sw, 10);
      // Platforms (scrolling left)
      const scroll = (globalTick * 1.2) % (sw + 30);
      ctx.fillStyle = '#2a5a20';
      [[sw - scroll, sh - 20, 24, 6],[sw - scroll + 50, sh - 32, 20, 6],[sw - scroll + 90, sh - 18, 18, 6]].forEach(([px,py,pw,ph]) => {
        if (px > -pw && px < sw) ctx.fillRect(sx + px, sy + py, pw, ph);
      });
      // Player character running
      const runFrame = gf;
      const pcy = sy + sh - 22;
      ctx.fillStyle = '#f7768e'; ctx.fillRect(sx + 18, pcy, 8, 10); // body
      ctx.fillStyle = '#f5c2a0'; ctx.fillRect(sx + 19, pcy - 7, 6, 7); // head
      ctx.fillStyle = '#3d59a1'; ctx.fillRect(sx + 17 + (runFrame%2), pcy + 7, 4, 5); // leg L
      ctx.fillStyle = '#3d59a1'; ctx.fillRect(sx + 22 - (runFrame%2), pcy + 7, 4, 5); // leg R
      // Enemy
      const ex = sx + sw - 30 - (globalTick % 20 < 10 ? 1 : 0);
      ctx.fillStyle = '#e0af68'; ctx.fillRect(ex, pcy + 2, 10, 8);
      ctx.fillStyle = '#f7768e'; ctx.fillRect(ex + 2, pcy - 2, 6, 6);
      // Score (incrementing)
      ctx.fillStyle = '#9ece6a'; ctx.font = "4px 'Press Start 2P',monospace";
      ctx.textAlign = 'left';
      ctx.fillText(`SCORE:${String(Math.floor(globalTick * 3)).padStart(4,'0')}`, sx + 2, sy + 9);
      // Lives
      ctx.fillStyle = '#f7768e';
      for (let li = 0; li < 3; li++) ctx.fillRect(sx + sw - 20 + li*7, sy + 4, 5, 5);
      ctx.restore(); // end clip
    } else {
