<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Agent Office</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080810;
      color: #c8d3f5;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 14px;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.035) 3px, rgba(0,0,0,0.035) 4px);
      pointer-events: none;
      z-index: 9999;
    }
    header {
      width: 100%;
      max-width: 1200px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid #1a1c2e;
    }
    .logo { font-size: 10px; color: #7aa2f7; text-shadow: 0 0 14px #7aa2f755; letter-spacing: 1px; }
    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    #agent-count { color: #3a4060; font-size: 7px; }
    #public-url {
      margin-left: auto;
      font-size: 6px; color: #9ece6a; text-decoration: none;
      border: 1px solid #9ece6a44; padding: 3px 8px;
      transition: border-color .3s, color .3s;
    }
    #public-url:hover { border-color: #9ece6a; color: #b8f080; }
    #public-url.loading { color: #2a3050; border-color: #1a1c2e; }

    canvas#office {
      max-width: 1200px;
      width: 100%;
      image-rendering: pixelated;
      border: 2px solid #1a1c2e;
      display: block;
      box-shadow: 0 0 40px #7aa2f710;
    }

    /* ── Agent Cards Grid ───────────────────────────────────────── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 8px;
      width: 100%;
      max-width: 1200px;
    }
    .card {
      background: linear-gradient(160deg, #0c0d1e 0%, #0a0b1a 100%);
      border: 1px solid #1e2240;
      border-top: 2px solid var(--ac, #1e2240);
      border-radius: 4px;
      padding: 12px 14px 12px 16px;
      position: relative;
      overflow: hidden;
      transition: transform .15s ease, box-shadow .35s ease;
      cursor: default;
    }
    .card:hover { transform: translateY(-2px); }
    .card.working  { border-color: var(--ac, #7aa2f7); box-shadow: 0 2px 22px var(--ac-glow, #7aa2f740); }
    .card.thinking { border-color: #bb9af7; box-shadow: 0 2px 22px #bb9af740; }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; width: 3px; height: 100%;
      background: var(--ac, #1e2240);
      transition: background .3s, box-shadow .3s;
    }
    .card.working::before  { box-shadow: 0 0 10px var(--ac-glow, #7aa2f780); }
    .card.thinking::before { background: #bb9af7; box-shadow: 0 0 8px #bb9af7; }
    .card-dot {
      position: absolute; top: 12px; right: 12px;
      width: 7px; height: 7px;
      background: #1e2030; border-radius: 50%;
      transition: background .3s, box-shadow .3s;
    }
    .card.working  .card-dot { background: var(--ac, #7aa2f7); box-shadow: 0 0 8px var(--ac, #7aa2f7); animation: pulse 1.8s ease-in-out infinite; }
    .card.thinking .card-dot { background: #bb9af7; box-shadow: 0 0 6px #bb9af7; animation: blink .8s step-end infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:.7} }
    .card-name { font-size: 10px; color: #e4ecff; margin-bottom: 8px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 20px; letter-spacing: .5px; }
    .card-status { font-size: 8px; color: #4a5070; line-height: 2.2; }
    .card-status .t  { color: var(--ac, #7aa2f7); background: var(--ac-badge, #7aa2f725); padding: 1px 5px; border-radius: 3px; }
    .card-status .th { color: #bb9af7; }
    .card-status .idle { color: #3a405a; }
    .card-status .dim  { color: #3a405a; }
    .scan { position: absolute; bottom: 0; left: 0; height: 2px; display: none; animation: scan 2s ease-in-out infinite; }
    .working  .scan { display: block; background: linear-gradient(90deg, transparent, var(--ac, #7aa2f7) 50%, transparent); }
    .thinking .scan { display: block; background: linear-gradient(90deg, transparent, #bb9af7cc, transparent); animation-duration: 3s; }
    @keyframes scan { 0%{left:0;width:0} 50%{left:0;width:100%} 100%{left:100%;width:0} }

    /* ── Connection indicator ─────────────────────────────────── */
    .conn { position: fixed; bottom: 10px; right: 14px; font-size: 5px; color: #2a3050; display: flex; align-items: center; gap: 5px; }
    .led { width: 5px; height: 5px; border-radius: 50%; background: #9ece6a; box-shadow: 0 0 4px #9ece6a; animation: blink 2s step-end infinite; }
    .led.off { background: #f7768e; box-shadow: 0 0 4px #f7768e; animation: none; }

    .view-tabs { display: flex; gap: 6px; }
    .tab-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      background: #0c0d1e;
      color: #3a4060;
      border: 1px solid #1e2240;
      padding: 5px 10px;
      cursor: pointer;
      transition: all .2s;
    }
    .tab-btn:hover { color: #7aa2f7; border-color: #7aa2f7; }
    .tab-btn.active { color: #7aa2f7; border-color: #7aa2f7; background: #0d1020; box-shadow: 0 0 10px #7aa2f730; }

    #task-view {
      display: none;
      width: 100%;
      max-width: 1200px;
      flex-direction: column;
      gap: 10px;
    }
    #task-view.visible { display: flex; }

    .task-add-form {
      display: flex; gap: 6px; align-items: center;
      background: #0a0b1a; border: 1px solid #1e2240;
      padding: 10px 12px; border-radius: 4px;
    }
    .task-input {
      flex: 1;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      background: #06070f;
      color: #c8d3f5;
      border: 1px solid #2a3060;
      padding: 7px 10px;
      outline: none;
      border-radius: 2px;
    }
    .task-input:focus { border-color: #7aa2f7; }
    .task-select {
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      background: #06070f;
      color: #7a8aaa;
      border: 1px solid #2a3060;
      padding: 7px 6px;
      border-radius: 2px;
      cursor: pointer;
    }
    .task-add-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      background: #7aa2f7;
      color: #06070f;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 2px;
      transition: background .2s;
      white-space: nowrap;
    }
    .task-add-btn:hover { background: #9ab8ff; }

    #task-summary {
      font-size: 6px; color: #3a4060;
      display: flex; gap: 16px; padding: 2px 0;
    }
    #task-summary span { color: #7aa2f7; }

    .task-section { display: flex; flex-direction: column; gap: 6px; }
    .task-section-title {
      font-size: 7px; color: #4a5080;
      padding: 6px 0 4px;
      border-bottom: 1px solid #1e2240;
      letter-spacing: 1px;
    }
    .task-section-title.done { color: #3a5a30; }

    .task-item {
      display: flex; align-items: center; gap: 10px;
      background: #0a0b1a;
      border: 1px solid #1e2240;
      border-left: 3px solid #2a3060;
      border-radius: 2px;
      padding: 9px 12px;
      font-size: 7px; color: #c8d3f5;
      transition: border-color .2s, opacity .2s;
      cursor: default;
    }
    .task-item:hover { border-left-color: #7aa2f7; }
    .task-item.done-item { opacity: 0.45; border-left-color: #2a4a28; }
    .task-item.done-item .task-title { text-decoration: line-through; color: #4a5a40; }
    .task-item .task-check {
      width: 14px; height: 14px; min-width: 14px;
      border: 1px solid #3a4060; border-radius: 2px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 8px; transition: all .15s;
    }
    .task-item .task-check:hover { border-color: #9ece6a; color: #9ece6a; }
    .task-item.done-item .task-check { background: #1a3a18; border-color: #3a6a30; color: #9ece6a; }
    .task-item .task-title { flex: 1; line-height: 1.7; }
    .task-item .task-meta { font-size: 5px; color: #3a4060; white-space: nowrap; }
    .task-item .task-del {
      font-size: 9px; color: #2a2a40; cursor: pointer; padding: 0 2px;
      transition: color .15s;
    }
    .task-item .task-del:hover { color: #f7768e; }
    .task-pri-dot { width: 6px; height: 6px; min-width:6px; border-radius: 50%; }
    .task-pri-dot.high   { background: #f7768e; }
    .task-pri-dot.medium { background: #e0af68; }
    .task-pri-dot.low    { background: #3a4060; }
    .task-empty { font-size: 6px; color: #2a2e4a; padding: 16px 0; text-align: center; }
    .task-assignee-tag {
      font-size: 5px; color: #3a4070; background: #0d0e1e;
      border: 1px solid #1e2240; padding: 2px 5px; border-radius: 2px;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<header>
  <span class="logo">▶ AGENT OFFICE <span class="blink">_</span></span>
  <div class="view-tabs">
    <button class="tab-btn active" id="tab-office" onclick="switchTab('office')">🖥 OFFICE</button>
    <button class="tab-btn" id="tab-tasks" onclick="switchTab('tasks')">📋 TASKS</button>
  </div>
  <span id="agent-count">0 agents</span>
  <a id="public-url" class="loading" href="#" target="_blank">⏳ tunnel...</a>
</header>

<canvas id="office" width="1200" height="600"></canvas>

<div id="grid"></div>

<div id="task-view">
  <!-- Add task form -->
  <div class="task-add-form" id="task-add-form">
    <input type="text" id="task-input" class="task-input" placeholder="Новая задача..." maxlength="120" />
    <select id="task-assignee" class="task-select">
      <option value="me">Я</option>
      <option value="team">Команда</option>
      <option value="claude">Claude</option>
    </select>
    <select id="task-priority" class="task-select">
      <option value="high">🔴 Высокий</option>
      <option value="medium" selected>🟡 Средний</option>
      <option value="low">🟢 Низкий</option>
    </select>
    <button class="task-add-btn" onclick="addTask()">+ ДОБАВИТЬ</button>
  </div>

  <!-- Stats bar -->
  <div id="task-summary">
    <div>Всего: <span id="ts-total">0</span></div>
    <div>В работе: <span id="ts-active">0</span></div>
    <div>Готово: <span id="ts-done">0</span></div>
  </div>

  <!-- Two sections: current + done -->
  <div class="task-section">
    <div class="task-section-title">⚡ ТЕКУЩИЕ</div>
    <div id="tasks-current"></div>
  </div>
  <div class="task-section">
    <div class="task-section-title done">✅ ВЫПОЛНЕННЫЕ</div>
    <div id="tasks-done"></div>
  </div>
</div>

<div class="conn">
  <div class="led" id="led"></div>
  <span id="conn-label">connecting</span>
</div>

<script>
// ════════════════════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════════════════════
const CW   = 1200;
const T    = 32;        // tile size px
const OX   = 140;       // canvas left margin
const OY   = 12;        // canvas top margin
const COLS = 28;        // room width in tiles
let   ROWS = 14;
let   CH   = OY + ROWS * T + OY;
// цвета объявляем сразу — используются в draw-функциях ниже
const SCREEN_C = '#091828';
const MON_DARK = '#12121e';

// ════════════════════════════════════════════════════════════════
//  MATH & EASING
// ════════════════════════════════════════════════════════════════
const lerp  = (a, b, t) => a + (b - a) * t;
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

const ease = {
  inOut:   t => t < .5 ? 2*t*t : -1 + (4 - 2*t)*t,
  outBack: t => { const c1=1.70158, c3=c1+1; return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2); },
  spring:  t => 1 - Math.exp(-8*t) * Math.cos(14*t),
};

// ════════════════════════════════════════════════════════════════
//  AUDIO  (Web Audio API — gentle 8-bit blips)
// ════════════════════════════════════════════════════════════════
let _ac = null;
function getAC() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  if (_ac.state === 'suspended') _ac.resume();
  return _ac;
}
function blip(freq, dur, type='square', vol=0.04) {
  try {
    const ac = getAC();
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(); o.stop(ac.currentTime + dur);
  } catch {}
}
const sndSpawn  = () => { blip(880,.05,'square',.04); setTimeout(()=>blip(1320,.08,'square',.03),60); };
const sndRemove = () => { blip(440,.05,'sawtooth',.03); setTimeout(()=>blip(220,.12,'sawtooth',.02),60); };
const sndState  = () => blip(660,.04,'square',.02);

// ════════════════════════════════════════════════════════════════
//  PALETTES
// ════════════════════════════════════════════════════════════════
const PALETTES = [
  // ── Human — light tones
  { hair:'#7aa2f7', skin:'#f5c2a0', shirt:'#2a5faa', pants:'#1e2a50', accent:'#7aa2f7' },
  { hair:'#bb9af7', skin:'#f5c2a0', shirt:'#7a3fbb', pants:'#2a1850', accent:'#bb9af7' },
  { hair:'#9ece6a', skin:'#eec98a', shirt:'#3a7a1e', pants:'#1a2e0e', accent:'#9ece6a' },
  { hair:'#ff9e64', skin:'#f5c2a0', shirt:'#bb4a10', pants:'#2a1408', accent:'#ff9e64' },
  { hair:'#f7768e', skin:'#f5d0a9', shirt:'#992244', pants:'#220e18', accent:'#f7768e' },
  { hair:'#2ac3de', skin:'#f5c2a0', shirt:'#0e6a80', pants:'#071e28', accent:'#2ac3de' },
  // ── Human — medium/tan tones
  { hair:'#4a2810', skin:'#c8825a', shirt:'#2a60a0', pants:'#0e1e3c', accent:'#7aa2f7' },
  { hair:'#e0af68', skin:'#c8905a', shirt:'#7a5a20', pants:'#2e2008', accent:'#e0af68' },
  { hair:'#8a4820', skin:'#d09060', shirt:'#c05020', pants:'#281408', accent:'#ff9e64' },
  // ── Human — dark tones
  { hair:'#1a0c04', skin:'#3d1f0a', shirt:'#c03030', pants:'#180808', accent:'#f7768e' },
  { hair:'#280808', skin:'#5a2c10', shirt:'#208060', pants:'#0a2418', accent:'#9ece6a' },
  { hair:'#a9b1d6', skin:'#2a2040', shirt:'#3a4068', pants:'#1a1e38', accent:'#a9b1d6' },
  // ── Fantasy — Elf (pointed ears, fair)
  { hair:'#e8d880', skin:'#f0e8c8', shirt:'#2a6838', pants:'#1a3020', accent:'#9ece6a', elf:true },
  // ── Fantasy — Elf (dark, silver hair)
  { hair:'#c8d0f0', skin:'#d0c8e8', shirt:'#3a2868', pants:'#1a1438', accent:'#bb9af7', elf:true },
  // ── Fantasy — Alien (blue skin, big eyes)
  { hair:'#80a0ff', skin:'#a0c0e8', shirt:'#183060', pants:'#0a1428', accent:'#2ac3de', alien:true },
  // ── Fantasy — Neko / Cat-person
  { hair:'#e0a060', skin:'#f0c890', shirt:'#804030', pants:'#281810', accent:'#ff9e64', cat:true },
  // ── Fantasy — Demon (red skin, horns)
  { hair:'#800000', skin:'#c05040', shirt:'#380010', pants:'#180008', accent:'#f7768e', demon:true },
  // ── Fantasy — Robot / Android (metallic)
  { hair:'#60c0d0', skin:'#8090a8', shirt:'#204060', pants:'#101828', accent:'#2ac3de', robot:true },
];
function getPalette(slug) {
  let h = 0;
  for (const c of slug) h = (Math.imul(h, 31) + c.charCodeAt(0)) | 0;
  const ah = Math.abs(h);
  const base = PALETTES[ah % PALETTES.length];
  const isFantasy = !!(base.alien || base.elf || base.cat || base.demon || base.robot);
  return {
    ...base,
    glasses:    !isFantasy && ah%5===0,
    beard:      !isFantasy && ah%7===1,
    bun:        base.bun || (!isFantasy && ah%6===2),
    hat:        !isFantasy && ah%9===3,
    scarf:      !isFantasy && ah%8===0,
    fatigue:    ah%4===0,
    couchStyle: ah%4,
  };
}

// ════════════════════════════════════════════════════════════════
//  ROLES  (short role label based on agent type / slug)
// ════════════════════════════════════════════════════════════════
const AGENT_TYPE_ROLES = {
  'developer':        'Dev',
  'researcher':       'Research',
  'tester':           'Tester',
  'debugger':         'Debug',
  'worker':           'Worker',
  'boss':             'Boss',
  'Explore':          'Scout',
  'Plan':             'Planner',
  'general-purpose':  'Claude',
  'claude-code-guide':'Guide',
  'statusline-setup': 'Config',
  'simplify':         'Refactor',
};
const SLUG_KEYWORDS = [
  ['developer','Dev'],['builder','Builder'],['build','Builder'],
  ['tester','Tester'],['test','Tester'],['debugger','Debug'],['debug','Debug'],
  ['researcher','Research'],['research','Research'],['analyz','Analyst'],
  ['planner','Planner'],['plan','Planner'],['architect','Architect'],
  ['worker','Worker'],['boss','Boss'],['scout','Scout'],['explore','Scout'],
  ['writer','Writer'],['write','Writer'],['coder','Coder'],['code','Coder'],
  ['reviewer','Review'],['review','Review'],['design','Design'],
  ['fix','Fixer'],['refactor','Refactor'],['dashboard','UI'],
];
function getRole(agentData) {
  const type = agentData?.agentType;
  if (type && AGENT_TYPE_ROLES[type]) return AGENT_TYPE_ROLES[type];
  if (type) return type.split(/[-_]/)[0].slice(0,7);
  const slug = (agentData?.slug || '').toLowerCase();
  for (const [kw, role] of SLUG_KEYWORDS) {
    if (slug.includes(kw)) return role;
  }
  return 'Claude';
}

// ════════════════════════════════════════════════════════════════
//  ANIMATION CONFIG  ← PRIMARY CUSTOMIZATION POINT
//
//  When you have real sprite sheets, set:
//    SPRITE_SHEETS.characters.src = './assets/characters.png';
//  Each state's spriteRow maps to the row in the sheet;
//  frames/fps control playback. spriteW/spriteH are tile dims.
//
//  Until then, the CHAR_DRAW table (below) drives placeholder
//  procedural drawing — swap drawXxx for ctx.drawImage calls.
// ════════════════════════════════════════════════════════════════

// const SPRITE_SHEETS = { characters: Object.assign(new Image(), { src: './assets/characters.png' }) };
// const SPRITE_W = 24, SPRITE_H = 32; // px per frame in sheet

const ANIM = {
  // ── Locomotion ────────────────────────────────────────────────
  walking:        { frames: 8,  fps: 12, loop: true,  spriteRow:  0 },

  // ── Desk transitions ─────────────────────────────────────────
  sitting_down:   { frames: 6,  fps: 10, loop: false, spriteRow:  1 }, // walk→desk
  standing_up:    { frames: 6,  fps: 10, loop: false, spriteRow: 11 }, // desk→walk

  // ── Desk work states ─────────────────────────────────────────
  typing_normal:  { frames: 4,  fps:  6, loop: true,  spriteRow:  2 }, // steady focus
  typing_furious: { frames: 4,  fps: 16, loop: true,  spriteRow:  3 }, // intense tool (Bash/Write)
  thinking:       { frames: 6,  fps:  5, loop: true,  spriteRow:  4 }, // text output, hand on chin
  drinking_desk:  { frames: 8,  fps:  6, loop: false, spriteRow:  5 }, // idle coffee break
  spinning_chair: { frames:12,  fps: 10, loop: false, spriteRow:  6 }, // idle fun ~60s
  celebrating:    { frames:10,  fps: 14, loop: false, spriteRow:  7 }, // task complete! jump + confetti

  // ── Couch transitions ─────────────────────────────────────────
  sitting_couch:  { frames: 4,  fps:  8, loop: false, spriteRow:  8 }, // walk→couch

  // ── Couch rest states (4 варианта — выбирается по хэшу ID) ─────
  sleeping:       { frames: 6,  fps:  4, loop: true,  spriteRow:  9 }, // Zzz частицы
  drinking_beer:  { frames: 8,  fps:  6, loop: true,  spriteRow: 10 }, // пьёт пиво
  phone:          { frames:10,  fps:  8, loop: true,  spriteRow: 12 }, // скроллит телефон
  stretching:     { frames: 8,  fps:  5, loop: true,  spriteRow: 13 }, // зевает/тянется
  // ── Kitchen ──────────────────────────────────────────────────────
  at_coffee:      { frames: 8,  fps: 6,  loop: true,  spriteRow: 14 },
  at_fridge:      { frames: 6,  fps: 5,  loop: true,  spriteRow: 15 },
  eating:         { frames: 8,  fps: 5,  loop: true,  spriteRow: 16 },
  // ── Floor solo ───────────────────────────────────────────────────

//  PARTICLE SYSTEM
// ════════════════════════════════════════════════════════════════
class Particle {
  constructor(x, y, o = {}) {
    this.x  = x; this.y = y;
    this.vx = (o.vx ?? 0) + (Math.random() - .5) * (o.spread ?? 60);
    this.vy = (o.vy ?? -80) + (Math.random() - .5) * (o.spread ?? 40);
    this.life = o.life ?? 0.8;
    this.maxLife = this.life;
    this.size = (o.size ?? 3) + Math.random() * 2;
    this.color = o.color ?? '#ffffff';
    this.gravity = o.gravity ?? 120;
    this.rot = Math.random() * Math.PI * 2;
    this.rotSpd = (Math.random() - .5) * 5;
    this.square = o.square ?? false;
  }
  update(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.vy += this.gravity * dt;
    this.life -= dt;
    this.rot += this.rotSpd * dt;
  }
  get alive() { return this.life > 0; }
  get alpha()  { return clamp(this.life / this.maxLife, 0, 1); }
  draw(ctx) {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.fillStyle = this.color;
    if (this.square) ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
    else { ctx.beginPath(); ctx.arc(0, 0, this.size/2, 0, Math.PI*2); ctx.fill(); }
    ctx.restore();
  }
}

class ParticleSystem {
  constructor() { this.ps = []; }
  update(dt) { this.ps = this.ps.filter(p => { p.update(dt); return p.alive; }); }
  draw(ctx)   { for (const p of this.ps) p.draw(ctx); }
  emit(x, y, n, o) { for (let i = 0; i < n; i++) this.ps.push(new Particle(x, y, o)); }

  // Spawn burst — accent color ring
  burst(x, y, color) {
    const cols = [color, '#ffffff', color];
    for (let i = 0; i < 14; i++) {
      this.ps.push(new Particle(x, y, {
        vx: Math.cos(i/14*Math.PI*2) * (60+Math.random()*60),
        vy: Math.sin(i/14*Math.PI*2) * (60+Math.random()*60),
        spread: 0, gravity: 80, life: .7+Math.random()*.3,
        size: 2+Math.random()*3, color: cols[i%3], square: i%2===0,
      }));
    }
  }

  // Confetti on celebrate
  confetti(x, y) {
    const cols = ['#7aa2f7','#9ece6a','#f7768e','#e0af68','#bb9af7','#2ac3de','#ff9e64'];
    for (let i = 0; i < 22; i++) {
      this.ps.push(new Particle(x, y, {
        vx: (Math.random()-.5)*220, vy: -160-Math.random()*100,
        spread:0, gravity:320, life:1+Math.random()*.6,
        size:3+Math.random()*4, color:cols[i%cols.length], square:Math.random()>.4,
      }));
    }
  }

  // Smoke drift (cigarette)
  smoke(x, y) {
    if (Math.random() < .10) {
      this.ps.push(new Particle(x, y, {
        vx:(Math.random()-.5)*14, vy:-28, spread:6,
        gravity:-8, life:1.6, size:5+Math.random()*9, color:'#c0b8d8',
      }));
    }
  }

  // Beer foam bubbles
  foam(x, y) {
    if (Math.random() < .14) {
      this.ps.push(new Particle(x, y, {
        vx:(Math.random()-.5)*10, vy:-35, spread:4,
        gravity:-4, life:.8, size:2+Math.random()*3, color:'#f0e840',
      }));
    }
  }

  // Zzz float
  zzz(x, y) {
    if (Math.random() < .04) {
      this.ps.push(new Particle(x, y, {
        vx:10+Math.random()*10, vy:-22-Math.random()*14, spread:2,
        gravity:-1, life:1.4, size:4+Math.random()*5, color:'#a9b1d6', square:true,
      }));
    }
  }

  // Sweat drops (furious typing)
  sweat(x, y) {
    if (Math.random() < .18) {
      this.ps.push(new Particle(x, y, {
        vx:(Math.random()-.5)*18, vy:12+Math.random()*20, spread:4,
        gravity:60, life:.4, size:2, color:'#4080c0',
      }));
    }
  }

  // Despawn puff
  puff(x, y, color) {
    for (let i = 0; i < 8; i++) {
      this.ps.push(new Particle(x, y, {
        vx:(Math.random()-.5)*80, vy:-40-Math.random()*60,
        spread:0, gravity:50, life:.5, size:3+Math.random()*4, color,
      }));
    }
  }
}
const PS = new ParticleSystem();

//  CHARACTER DRAW FUNCTIONS  (placeholder — sprite-sheet ready)
//
//  Each fn: (ctx, cx, cy, pal, t)
//    cx/cy = float pixel center
//    pal   = { hair, skin, shirt, pants, accent }
//    t     = normalized anim time [0..1] (loops)
//
//  To use sprite sheets, replace body with:
//    ctx.drawImage(SPRITE_SHEETS.characters,
//      frameIdx * SPRITE_W, cfg.spriteRow * SPRITE_H,
//      SPRITE_W, SPRITE_H, cx - SPRITE_W/2, cy - SPRITE_H/2+4,
//      SPRITE_W*2, SPRITE_H*2);
// ════════════════════════════════════════════════════════════════
function px(ctx, x, y, w, h, c) {
  if (!c) return;
  ctx.fillStyle = c;
  ctx.fillRect(x|0, y|0, w|0, h|0);
}
function shd(ctx, cx, cy, rx=8, ry=3) {
  ctx.save(); ctx.globalAlpha = .20;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── helpers: голова с аксессуарами ───────────────────────────────
function drawHeadFront(ctx, cx, cy, pal, blink) {
  // шея
  px(ctx,cx-2,cy+2,4,4,pal.skin);
  // ── Special pre-head features ───────────────────────────────────
  if (pal.demon) {
    // Demon horns
    ctx.fillStyle='#601010';
    ctx.beginPath(); ctx.moveTo(cx-6,cy-16); ctx.lineTo(cx-9,cy-24); ctx.lineTo(cx-3,cy-16); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+6,cy-16); ctx.lineTo(cx+9,cy-24); ctx.lineTo(cx+3,cy-16); ctx.fill();
  }
  if (pal.cat) {
    // Cat ears
    ctx.fillStyle=pal.hair;
    ctx.beginPath(); ctx.moveTo(cx-6,cy-14); ctx.lineTo(cx-10,cy-22); ctx.lineTo(cx-2,cy-14); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+6,cy-14); ctx.lineTo(cx+10,cy-22); ctx.lineTo(cx+2,cy-14); ctx.fill();
    ctx.fillStyle=pal.skin+'cc';
    ctx.beginPath(); ctx.moveTo(cx-6,cy-15); ctx.lineTo(cx-9,cy-21); ctx.lineTo(cx-3,cy-15); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+6,cy-15); ctx.lineTo(cx+9,cy-21); ctx.lineTo(cx+3,cy-15); ctx.fill();
  }
  if (pal.alien) {
    // Alien antennae
    ctx.strokeStyle=pal.hair; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(cx-3,cy-16); ctx.quadraticCurveTo(cx-8,cy-26,cx-6,cy-28); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+3,cy-16); ctx.quadraticCurveTo(cx+8,cy-26,cx+6,cy-28); ctx.stroke();
    ctx.fillStyle=pal.accent;
    ctx.beginPath(); ctx.arc(cx-6,cy-28,2.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+6,cy-28,2.5,0,Math.PI*2); ctx.fill();
  }
  // голова
  const headW = pal.alien ? 8 : 7;
  ctx.fillStyle=pal.skin;
  ctx.beginPath(); ctx.ellipse(cx,cy-8,headW,9,0,0,Math.PI*2); ctx.fill();
  // Robot face plate
  if (pal.robot) {
    ctx.fillStyle=pal.skin+'cc';
    ctx.beginPath(); ctx.ellipse(cx,cy-8,headW,9,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#304050cc';
    ctx.fillRect(cx-6,cy-14,12,8); // faceplate
    ctx.fillStyle=pal.skin;
    ctx.beginPath(); ctx.ellipse(cx,cy-8,headW,9,0,0,Math.PI*2); ctx.fill();
  }
  // уши — elf has pointed ears
  if (pal.elf) {
    ctx.fillStyle=pal.skin;
    ctx.beginPath(); ctx.moveTo(cx-8,cy-9); ctx.lineTo(cx-12,cy-14); ctx.lineTo(cx-6,cy-7); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+8,cy-9); ctx.lineTo(cx+12,cy-14); ctx.lineTo(cx+6,cy-7); ctx.fill();
    px(ctx,cx-11,cy-13,2,2,pal.skin+'aa');
    px(ctx,cx+10,cy-13,2,2,pal.skin+'aa');
  } else {
    px(ctx,cx-8,cy-9,3,5,pal.skin); px(ctx,cx+5,cy-9,3,5,pal.skin);
    px(ctx,cx-7,cy-8,2,3,'#d4a07880');
  }
  // волосы
  if (pal.bun) {
    ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(cx,cy-17,5,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(cx,cy-14,7,5,0,-Math.PI,0); ctx.fill();
    px(ctx,cx-7,cy-15,14,5,pal.hair);
  } else if (pal.hat) {
    ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(cx,cy-14,7,5,0,-Math.PI,0); ctx.fill();
    px(ctx,cx-9,cy-18,18,4,pal.accent+'cc');
    px(ctx,cx-7,cy-22,14,6,pal.accent);
  } else if (!pal.robot && !pal.alien) {
    ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(cx,cy-13,headW,6,0,-Math.PI,0); ctx.fill();
    px(ctx,cx-7,cy-14,4,5,pal.hair); px(ctx,cx+3,cy-14,4,5,pal.hair);
  }
  // глаза
  if (blink) {
    ctx.fillStyle=pal.skin+'dd'; ctx.fillRect(cx-4,cy-10,4,2); ctx.fillRect(cx+1,cy-10,4,2);
  } else if (pal.alien) {
    // Big alien eyes (almond-shaped)
    ctx.fillStyle='#0a1020';
    ctx.beginPath(); ctx.ellipse(cx-4,cy-10,5,3,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+4,cy-10,5,3,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=pal.accent+'bb';
    ctx.beginPath(); ctx.ellipse(cx-4,cy-10,3,2,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+4,cy-10,3,2,0,0,Math.PI*2); ctx.fill();
  } else if (pal.robot) {
    // Visor / LED eyes
    ctx.fillStyle='#001828'; ctx.fillRect(cx-6,cy-12,12,5);
    ctx.fillStyle=pal.accent; ctx.fillRect(cx-5,cy-11,10,3);
    ctx.fillStyle='#ffffff80'; ctx.fillRect(cx-5,cy-11,4,2);
    ctx.fillStyle='#ffffff40'; ctx.fillRect(cx+2,cy-11,3,2);
  } else if (pal.demon) {
    // Glowing eyes
    ctx.fillStyle='#ff2000';
    ctx.beginPath(); ctx.ellipse(cx-3,cy-10,3,2.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+3,cy-10,3,2.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ff8000aa';
    ctx.beginPath(); ctx.arc(cx-3,cy-10,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+3,cy-10,2,0,Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle='#1a1b26'; ctx.fillRect(cx-4,cy-11,4,3); ctx.fillRect(cx+1,cy-11,4,3);
    ctx.fillStyle='#ffffff80'; ctx.fillRect(cx-4,cy-11,2,2); ctx.fillRect(cx+1,cy-11,2,2);
    if (pal.fatigue) { ctx.fillStyle='#80405050'; ctx.fillRect(cx-4,cy-8,4,1); ctx.fillRect(cx+1,cy-8,4,1); }
    if (pal.glasses) {
      ctx.strokeStyle='#808090'; ctx.lineWidth=1;
      ctx.strokeRect(cx-5,cy-12,5,4); ctx.strokeRect(cx,cy-12,5,4);
      ctx.beginPath(); ctx.moveTo(cx-5,cy-10); ctx.lineTo(cx-8,cy-9); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx+5,cy-10); ctx.lineTo(cx+8,cy-9); ctx.stroke();
    }
  }
  // рот
  if (!pal.robot) {
    if (pal.cat) {
      ctx.fillStyle='#e070a0'; ctx.fillRect(cx-1,cy-5,2,2); // cat nose
      ctx.strokeStyle='#c06080'; ctx.lineWidth=0.8;
      ctx.beginPath(); ctx.moveTo(cx,cy-4); ctx.lineTo(cx-3,cy-2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx,cy-4); ctx.lineTo(cx+3,cy-2); ctx.stroke();
    } else {
      ctx.fillStyle='#c8906090'; ctx.fillRect(cx-3,cy-5,6,2);
    }
  }
  if (pal.beard && !pal.robot && !pal.alien && !pal.demon && !pal.cat) {
    px(ctx,cx-4,cy-4,8,3,pal.hair+'bb'); px(ctx,cx-3,cy-2,6,2,pal.hair+'99');
  }
  if (pal.scarf) { px(ctx,cx-5,cy+1,10,3,pal.accent+'cc'); px(ctx,cx-4,cy+3,3,4,pal.accent); }
}

  } else if (!pal.alien) {
    px(ctx,cx-8,cy-9,3,5,pal.skin); px(ctx,cx+5,cy-9,3,5,pal.skin);

  } else if (pal.robot) {
    ctx.fillStyle='#304050'; ctx.beginPath(); ctx.ellipse(cx,cy-8,headW,9,0,0,Math.PI*2); ctx.fill();

}

// ── 3/4 front head (diagonal toward camera) ─────────────────────
function drawHeadFront34(ctx, cx, cy, pal, flipLeft) {
  const d = flipLeft ? -1 : 1;
  px(ctx,cx-2,cy+2,4,4,pal.skin);
  const headW = pal.alien ? 8 : 7;
  ctx.fillStyle=pal.skin;
  ctx.beginPath(); ctx.ellipse(cx+d*1,cy-8,headW,9,0,0,Math.PI*2); ctx.fill();

    ctx.fillStyle=pal.skin;
    ctx.beginPath(); ctx.moveTo(cx-d*7,cy-9); ctx.lineTo(cx-d*11,cy-14); ctx.lineTo(cx-d*5,cy-7); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+d*8,cy-9); ctx.lineTo(cx+d*11,cy-14); ctx.lineTo(cx+d*6,cy-7); ctx.fill();
  } else if (!pal.alien) {

    ctx.fillStyle=pal.hair;
    ctx.beginPath(); ctx.moveTo(cx-5,cy-14); ctx.lineTo(cx-9,cy-22); ctx.lineTo(cx-1,cy-14); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+5,cy-14); ctx.lineTo(cx+9,cy-22); ctx.lineTo(cx+1,cy-14); ctx.fill();
  }
  if (pal.demon) {
    ctx.fillStyle='#601010';

    ctx.beginPath(); ctx.moveTo(cx+5,cy-16); ctx.lineTo(cx+8,cy-24); ctx.lineTo(cx+2,cy-16); ctx.fill();
  }
  if (pal.bun) {
    ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(cx,cy-17,5,5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(cx,cy-14,7,5,0,-Math.PI,0); ctx.fill();
    px(ctx,cx-7,cy-15,14,5,pal.hair);
  } else if (pal.hat) {
    ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(cx,cy-14,7,5,0,-Math.PI,0); ctx.fill();
    px(ctx,cx-9,cy-18,18,4,pal.accent+'cc');
    px(ctx,cx-7,cy-22,14,6,pal.accent);
  } else if (!pal.robot && !pal.alien) {
    ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(cx,cy-13,headW,6,0,-Math.PI,0); ctx.fill();
    px(ctx,cx-7,cy-14,4,5,pal.hair); px(ctx,cx+3,cy-14,4,5,pal.hair);
  } else if (pal.robot) {
    ctx.fillStyle='#304050'; ctx.beginPath(); ctx.ellipse(cx,cy-8,headW,9,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=pal.skin; ctx.beginPath(); ctx.ellipse(cx+d*1,cy-8,headW,9,0,0,Math.PI*2); ctx.fill();
  }
  if (pal.alien) {
    ctx.fillStyle='#0a1020';
    ctx.beginPath(); ctx.ellipse(cx+d*3,cy-10,4,3,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx-d*3,cy-10,3,2.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=pal.accent+'bb';
    ctx.beginPath(); ctx.ellipse(cx+d*3,cy-10,2,2,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx-d*3,cy-10,2,1.5,0,0,Math.PI*2); ctx.fill();
  } else if (pal.robot) {
    ctx.fillStyle='#001828'; ctx.fillRect(cx-5,cy-12,10,5);
    ctx.fillStyle=pal.accent; ctx.fillRect(cx-4,cy-11,8,3);
  } else if (pal.demon) {
    ctx.fillStyle='#ff2000';
    ctx.beginPath(); ctx.ellipse(cx+d*2,cy-10,3,2.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx-d*3,cy-10,2,2,0,0,Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle='#1a1b26';
    ctx.fillRect(cx+d*1,cy-11,4,3); ctx.fillRect(cx-d*4,cy-11,3,3);
    ctx.fillStyle='#ffffff80';
    ctx.fillRect(cx+d*1,cy-11,2,2); ctx.fillRect(cx-d*4,cy-11,1,2);
    if (pal.glasses) {
      ctx.strokeStyle='#808090'; ctx.lineWidth=1;

    }
  }
  if (!pal.robot) {
    if (pal.cat) {
      ctx.fillStyle='#e070a0'; ctx.fillRect(cx+d*0,cy-5,2,2);

function drawHeadBack34(ctx, cx, cy, pal, flipLeft) {

  } else if (!pal.robot && !pal.alien) {
    ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(cx-d*1,cy-8,headW,9,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=pal.skin; ctx.beginPath(); ctx.ellipse(cx+d*4,cy-6,3,6,0,0,Math.PI*2); ctx.fill();
    px(ctx,cx-6,cy-2,12,5,pal.hair);
  } else if (pal.robot) {
    ctx.fillStyle='#304050'; ctx.beginPath(); ctx.ellipse(cx,cy-8,headW,9,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=pal.skin; ctx.beginPath(); ctx.ellipse(cx+d*3,cy-8,3,6,0,0,Math.PI*2); ctx.fill();
  }
  if (pal.scarf) { px(ctx,cx-5,cy+1,10,3,pal.accent+'cc'); }
}

// ── walking (SOUTH — toward camera, original) ───────────────────
function drawWalkS(ctx, cx, cy, pal, t) {
  const ph = t * Math.PI * 2;
  const lL = Math.sin(ph) * 5, lR = -lL;
  const bob = Math.abs(Math.sin(ph)) * 2.5;
  const aL = Math.sin(ph + Math.PI) * 4;
  const aR = Math.sin(ph) * 4;
  shd(ctx, cx, cy+16);
  px(ctx,cx-5,cy+4+lL, 5,9,pal.pants); px(ctx,cx+1,cy+4+lR, 5,9,pal.pants);
  px(ctx,cx-6,cy+12+lL,6,4,'#1a1a2a'); px(ctx,cx-6,cy+14+lL,3,2,'#2a2a3a');
  px(ctx,cx+1,cy+12+lR,6,4,'#1a1a2a'); px(ctx,cx+1,cy+14+lR,3,2,'#2a2a3a');
  px(ctx,cx-6,cy-2-bob,12,9,pal.shirt);
  px(ctx,cx-1,cy-1-bob,2,3,pal.skin);
  px(ctx,cx+2,cy+1-bob,3,4,'#ffffff1a');
  px(ctx,cx-10,cy+aL-bob, 4,7,pal.skin); px(ctx,cx-10,cy+6+aL-bob,4,3,pal.skin);
  px(ctx,cx+6, cy+aR-bob, 4,7,pal.skin); px(ctx,cx+6, cy+6+aR-bob,4,3,pal.skin);
  drawHeadFront(ctx, cx, cy-12-bob, pal, false);
}
function drawWalking(ctx, cx, cy, pal, t) { drawWalkS(ctx, cx, cy, pal, t); }

// ── walking NORTH (away from camera) ─────────────────────────────
function drawWalkN(ctx, cx, cy, pal, t) {
  const ph = t * Math.PI * 2;

  px(ctx,cx-6,cy+12+lL,6,4,'#1a1a2a'); px(ctx,cx+1,cy+12+lR,6,4,'#1a1a2a');

}

  px(ctx,cx-3,cy+armB-bob, 4,7,pal.shirt); px(ctx,cx-3,cy+6+armB-bob,3,3,pal.skin);

  px(ctx,cx-1,cy+12+legF,6,4,'#1a1a2a'); px(ctx,cx-1,cy+14+legF,3,2,'#2a2a3a');
  px(ctx,cx+2,cy+armF-bob, 4,7,pal.skin); px(ctx,cx+2,cy+6+armF-bob,3,3,pal.skin);

}

// ── directional walk dispatch ────────────────────────────────────
const WALK_DIR_FN = {
  'S': drawWalkS, 'N': drawWalkN, 'E': drawWalkE, 'W': drawWalkW,
  'SE': drawWalkSE, 'SW': drawWalkSW, 'NE': drawWalkNE, 'NW': drawWalkNW,
  'IDLE': drawWalkIdle,
};

// ── sitting_down / sitting_couch (transition) ────────────────────
function drawSittingDown(ctx, cx, cy, pal, t) {
  drawWalking(ctx, cx, cy + ease.inOut(t) * 5, pal, t * 0.25);
}

// ── typing_normal (back to viewer, slow bob) ──────────────────────
function drawTypingNormal(ctx, cx, cy, pal, t) {
  const ph = t * Math.PI * 2;
  const arm = Math.sin(ph) * 2.5;
  const nod = Math.sin(ph * 0.3) * 1.5;
  shd(ctx, cx, cy+16);
  // legs
  px(ctx,cx-5,cy+5,5,9,pal.pants); px(ctx,cx+1,cy+5,5,9,pal.pants);
  px(ctx,cx-6,cy+13,6,3,'#1a1a2a'); px(ctx,cx+1,cy+13,6,3,'#1a1a2a');
  // keyboard glow
  ctx.fillStyle='#3a60d840'; ctx.fillRect((cx-12)|0,(cy+2)|0,24,3);
  // body
  px(ctx,cx-6,cy-3,13,9,pal.shirt);
  px(ctx,cx-1,cy-2,2,7,'#ffffff18');
  px(ctx,cx-8,cy-1,3,4,pal.shirt); px(ctx,cx+5,cy-1,3,4,pal.shirt);
  // arms reaching to keyboard
  px(ctx,cx-13,cy+arm,8,3,pal.skin); px(ctx,cx-13,cy+3+arm,5,4,pal.skin);
  px(ctx,cx+5,cy-arm,8,3,pal.skin); px(ctx,cx+5,cy+3-arm,5,4,pal.skin);
  // head (back) with slow nod
  drawHeadBack(ctx, cx, cy-12+nod, pal);
  // Finger movement on keyboard
  const fp = t * Math.PI * 2;
  ctx.fillStyle = pal.skin;
  for (let fi = 0; fi < 4; fi++) {
    const fx = cx - 10 + fi * 5;
    const fy = cy + 5 + Math.sin(fp * (6 + fi) + fi * 1.3) * 1.5;
    ctx.fillRect(fx, fy, 3, 2);
  }
}

// ── typing_furious ────────────────────────────────────────────────
function drawTypingFurious(ctx, cx, cy, pal, t) {
  const ph = t * Math.PI * 2;
  const shk = Math.sin(ph * 5) * 3;
  const arm = Math.sin(ph * 6) * 5;
  const hshk = Math.sin(ph * 7) * 2;
  shd(ctx, cx, cy+14);
  px(ctx,cx-4,cy+6,4,8,pal.pants); px(ctx,cx+1,cy+6,4,8,pal.pants);
  // keyboard glow bright
  ctx.fillStyle='#6080ff60'; ctx.fillRect((cx-12)|0,(cy+2)|0,24,3);
  // leaning body
  px(ctx,cx-6+shk,cy-4,13,11,pal.shirt);
  px(ctx,cx-1+shk,cy-3,2,8,'#ffffff18');
  // arms flying
  px(ctx,cx-15+shk,cy-1+arm,10,3,pal.skin);
  px(ctx,cx+5+shk,cy-1-arm,10,3,pal.skin);
  // head shaking with hair chaos
  ctx.save(); ctx.translate(cx+hshk, cy-12);
  ctx.fillStyle=pal.skin; ctx.beginPath(); ctx.ellipse(0,0,7,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(0,-3,8,7,0.2,0,Math.PI*2); ctx.fill();
  px(ctx,-3,-12,3,5,pal.hair); px(ctx,2,-13,4,6,pal.hair); // hair standing up
  ctx.restore();
}

// ── thinking (side profile, hand on chin) ────────────────────────
function drawThinking(ctx, cx, cy, pal, t) {
  const bob = Math.sin(t * Math.PI * 2 * 0.3) * 1.5;
  const eyeLid = Math.abs(Math.sin(t * Math.PI * 2 * 0.4)); // slow blink
  shd(ctx, cx, cy+14);
  px(ctx,cx-4,cy+7,4,7,pal.pants); px(ctx,cx+1,cy+7,4,7,pal.pants);
  px(ctx,cx-5,cy+13,5,3,'#1a1a2a'); px(ctx,cx+1,cy+13,5,3,'#1a1a2a');
  px(ctx,cx-5,cy-2,11,9,pal.shirt);
  // one arm with hand on chin
  px(ctx,cx-9,cy+2,3,6,pal.skin);  // arm down
  px(ctx,cx+5,cy-1,3,5,pal.skin);  // arm horizontal
  px(ctx,cx+8,cy-4,5,3,pal.skin);  // forearm to chin
  // head (side profile) — turned slightly
  ctx.save(); ctx.translate(cx, cy-9+bob);
  ctx.fillStyle=pal.skin; ctx.beginPath(); ctx.ellipse(-1,0,6,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(-1,-2,7,6,0,-Math.PI,0); ctx.fill();
  if(pal.hat){ctx.fillStyle=pal.accent;ctx.fillRect(-8,-14,16,6);ctx.fillRect(-10,-10,20,4);}
  // eye (one visible)
  const ey = eyeLid < 0.15 ? 0 : 3;
  ctx.fillStyle='#1a1b26'; ctx.fillRect(-5,-3,3,ey);
  ctx.fillStyle='#ffffff60'; ctx.fillRect(-5,-3,1,Math.min(ey,1));
  // thoughtful mouth
  ctx.fillStyle='#c8906060'; ctx.fillRect(-4,3,5,2);
  ctx.fillStyle='#a07050'; ctx.fillRect(-4,5,2,1); // slight frown curve
  if(pal.beard){px(ctx,-5,3,8,3,pal.hair+'bb');}
  ctx.restore();
}

// ── drinking_desk ─────────────────────────────────────────────────
function drawDrinkingDesk(ctx, cx, cy, pal, t) {
  const lift = Math.sin(t * Math.PI * 2) * 8;
  shd(ctx, cx, cy+14);
  px(ctx,cx-4,cy+7,4,7,pal.pants); px(ctx,cx+1,cy+7,4,7,pal.pants);
  px(ctx,cx-6,cy-2,12,9,pal.shirt); px(ctx,cx,cy-1,1,7,'#ffffff18');
  px(ctx,cx-11,cy+1,6,3,pal.skin);
  px(ctx,cx+5,cy-lift*.6,6,3,pal.skin);
  const my = cy-2-lift*.6;
  px(ctx,cx+10,my,7,8,'#c8a060'); px(ctx,cx+10,my,7,2,'#f0f0c0'); px(ctx,cx+17,my+2,3,4,'#a08040');
  ctx.save(); ctx.globalAlpha=0.4+Math.sin(t*Math.PI*4)*.2;
  ctx.fillStyle='#ffffff60'; ctx.beginPath(); ctx.arc(cx+13,my-4,2,0,Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.fillStyle=pal.skin; ctx.beginPath(); ctx.ellipse(cx,cy-9,7,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(cx,cy-10,7,7,0,0,Math.PI*2); ctx.fill();
  px(ctx,cx-6,cy-4,12,4,pal.hair);
}

// ── spinning_chair ────────────────────────────────────────────────
function drawSpinningChair(ctx, cx, cy, pal, t) {
  const sx = Math.cos(t * Math.PI * 2);
  shd(ctx, cx, cy+14);

}

// ── celebrating ───────────────────────────────────────────────────
function drawCelebrating(ctx, cx, cy, pal, t) {
  const jump = Math.sin(t * Math.PI) * 18;
  const jy = cy - jump;

  px(ctx,cx-5,jy+14+kick,5,3,'#1a1a2a'); px(ctx,cx+1,jy+14-kick,5,3,'#1a1a2a');

  ctx.fillStyle=pal.skin; ctx.beginPath(); ctx.ellipse(cx,jy-10,7,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(cx,jy-13,7,6,0,-Math.PI,0); ctx.fill();
  px(ctx,cx-7,jy-14,4,5,pal.hair); px(ctx,cx+3,jy-14,4,5,pal.hair);
  ctx.fillStyle='#1a1b26'; ctx.fillRect(cx-4,jy-12,3,3); ctx.fillRect(cx+1,jy-12,3,3);

  ctx.fillStyle='#c89060'; ctx.fillRect(cx-4,jy-7,8,2); ctx.fillRect(cx-5,jy-8,2,2); ctx.fillRect(cx+3,jy-8,2,2);
}

// ── phone (couch) — hunched forward, bright screen ───────────────
function drawPhone(ctx, cx, cy, pal, t) {
  const scroll = (t * 4) % 1;
  const glow = 0.7 + Math.sin(t * Math.PI * 2 * 0.2) * 0.2;
  shd(ctx, cx-4, cy+10, 14, 3);
  // legs
  px(ctx,cx-20,cy+4,12,6,pal.pants); px(ctx,cx-10,cy+8,4,5,pal.pants);
  px(ctx,cx-22,cy+9,6,3,'#1a1a2a');
  // body hunched forward
  px(ctx,cx-8,cy-2,12,9,pal.shirt);
  // arms holding phone
  px(ctx,cx-8,cy-8,4,9,pal.skin);
  px(ctx,cx+2,cy-8,4,9,pal.skin);
  // LARGE PHONE — clearly visible glowing screen
  const phx=cx-8, phy=cy-26;
  ctx.fillStyle='#0d0d1e'; ctx.fillRect(phx|0,phy|0,14,20);
  ctx.fillStyle='#1a1a2e'; ctx.fillRect((phx+1)|0,(phy+1)|0,12,18);
  // BRIGHT screen glow
  ctx.save();
  ctx.globalAlpha=glow;
  ctx.fillStyle=SCREEN_C; ctx.fillRect((phx+1)|0,(phy+2)|0,12,14);
  const lc=['#7aa2f7','#9ece6a','#f7768e','#bb9af7','#e0af68'];
  for(let i=0;i<5;i++){
    const ly=phy+3+i*2.5-(scroll*12)|0;
    if(ly>phy+1&&ly<phy+15){
      ctx.fillStyle=lc[(i+(t*1.5|0))%lc.length];
      const lw=3+((i*7+t*3|0)%8);
      ctx.fillRect((phx+2)|0,ly,lw,1);
    }
  }
  ctx.restore();
  // home button
  ctx.fillStyle='#2a2a40';
  ctx.beginPath(); ctx.arc(phx+7,phy+18,2,0,Math.PI*2); ctx.fill();
  // thumb
  px(ctx,phx+4,(phy+7+scroll*6)|0,4,5,pal.skin);
  // screen glow on face
  ctx.save(); ctx.globalAlpha=0.18*glow;
  ctx.fillStyle='#5090e0';
  ctx.fillRect((cx-6)|0,(cy-24)|0,14,14);
  ctx.restore();
  // HEAD tilted down looking at phone
  ctx.save(); ctx.translate(cx+1,cy-12); ctx.rotate(0.35);
  ctx.fillStyle=pal.skin; ctx.beginPath(); ctx.ellipse(0,0,7,8,0,0,Math.PI*2); ctx.fill();
  px(ctx,6,-2,3,5,pal.skin); // ear
  ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(0,-2,8,6,0,-Math.PI,0); ctx.fill();
  if(pal.glasses){ctx.strokeStyle='#808090';ctx.lineWidth=1;ctx.strokeRect(-5,-3,5,4);ctx.strokeRect(0,-3,5,4);}
  ctx.fillStyle='#1a1b26'; ctx.fillRect(-4,-2,4,3); ctx.fillRect(1,-2,4,3);
  ctx.fillStyle='#c8906050'; ctx.fillRect(-2,2,5,2);
  ctx.restore();
}

// ── stretching / yawning (couch) — arms wide, Y silhouette ───────
function drawStretching(ctx, cx, cy, pal, t) {
  const phase = t * Math.PI * 2;
  const armH = Math.sin(phase * 0.35) * 12 + 10; // arms go up and down slowly
  const mouthW = Math.abs(Math.sin(phase * 0.3)); // mouth opens wide
  shd(ctx, cx, cy+14, 14, 3);
  // legs (sitting)
  px(ctx,cx-5,cy+5,5,9,pal.pants); px(ctx,cx+1,cy+5,5,9,pal.pants);
  px(ctx,cx-6,cy+13,6,3,'#1a1a2a'); px(ctx,cx+1,cy+13,6,3,'#1a1a2a');
  // body
  px(ctx,cx-5,cy-2,11,8,pal.shirt);
  // LEFT ARM stretched up-left (Y shape)
  px(ctx,cx-8,cy-3,3,7,pal.skin);          // upper arm down
  px(ctx,cx-14,cy-8-armH,4,armH+8,pal.skin); // forearm stretching up-left
  px(ctx,cx-16,cy-8-armH,6,6,pal.skin);    // hand open
  // RIGHT ARM stretched up-right
  px(ctx,cx+6,cy-3,3,7,pal.skin);
  px(ctx,cx+10,cy-8-armH,4,armH+8,pal.skin);
  px(ctx,cx+10,cy-8-armH,6,6,pal.skin);
  // HEAD — face front, yawning expression
  ctx.fillStyle=pal.skin; ctx.beginPath(); ctx.ellipse(cx,cy-12,7,8,0,0,Math.PI*2); ctx.fill();
  px(ctx,cx-8,cy-14,3,5,pal.skin); px(ctx,cx+5,cy-14,3,5,pal.skin); // ears
  ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(cx,cy-15,7,5,0,-Math.PI,0); ctx.fill();
  if(pal.hat){ctx.fillStyle=pal.accent;ctx.fillRect((cx-8)|0,(cy-26)|0,16,6);ctx.fillRect((cx-10)|0,(cy-22)|0,20,4);}
  if(pal.bun){ctx.fillStyle=pal.hair;ctx.beginPath();ctx.ellipse(cx,cy-22,5,5,0,0,Math.PI*2);ctx.fill();}
  // EYES squinting from yawn
  const sq = Math.max(0, mouthW - 0.1);
  ctx.fillStyle='#1a1b26';
  ctx.fillRect((cx-4)|0,(cy-15)|0,4,Math.max(1,sq*4)|0);
  ctx.fillRect((cx+1)|0,(cy-15)|0,4,Math.max(1,sq*4)|0);
  // BIG YAWNING MOUTH
  if(mouthW>0.15){
    ctx.fillStyle='#2a0808';
    ctx.beginPath(); ctx.ellipse(cx,cy-9,4,5*mouthW,0,0,Math.PI*2); ctx.fill();
    if(mouthW>0.4){
      ctx.fillStyle='#f0e0d0'; ctx.fillRect((cx-3)|0,(cy-11)|0,6,2); // top teeth
      ctx.fillStyle='#e8d0c0'; ctx.fillRect((cx-3)|0,(cy-8+4*mouthW)|0,6,2); // bottom teeth
    }
  } else {
    ctx.fillStyle='#c8906060'; ctx.fillRect((cx-3)|0,(cy-9)|0,6,2);
  }
  if(pal.beard){px(ctx,cx-4,cy-8,8,3,pal.hair+'bb');}
}

// ── sleeping (couch) — horizontal with pillow & closed eyes ───────
function drawSleeping(ctx, cx, cy, pal, t) {
  const br = Math.sin(t * Math.PI * 2 * 0.2) * 1.2; // breathing
  shd(ctx, cx-10, cy+12, 20, 3);
  // pillow (clearly visible)
  ctx.fillStyle='#7a6898'; ctx.fillRect((cx-22)|0,(cy-7+br)|0,14,12);
  ctx.fillStyle='#9a82b8'; ctx.fillRect((cx-21)|0,(cy-6+br)|0,12,10);
  ctx.fillStyle='#b090d0'; ctx.fillRect((cx-20)|0,(cy-5+br)|0,6,3); // highlight
  // legs stretched flat
  px(ctx,cx-22,cy+4+br,15,6,pal.pants);
  px(ctx,cx-25,cy+4+br,4,6,pal.pants); // bent leg
  px(ctx,cx-26,cy+9+br,7,3,'#1a1a2a'); // boots
  // body lying
  px(ctx,cx-10,cy+1+br,14,8+br*0.5,pal.shirt);
  // arm along body
  px(ctx,cx-8,cy+2+br,12,3,pal.skin);
  // HEAD on pillow (side view, peaceful face)
  ctx.fillStyle=pal.skin;
  ctx.beginPath(); ctx.ellipse(cx+5,cy-1+br,8,7,0,0,Math.PI*2); ctx.fill();
  // ear
  px(ctx,cx+12,cy-2+br,3,5,pal.skin);
  // hair
  ctx.fillStyle=pal.hair;
  ctx.beginPath(); ctx.ellipse(cx+5,cy-4+br,9,6,0,Math.PI,0); ctx.fill();
  if(pal.hat){px(ctx,cx-2,cy-14+br,18,6,pal.accent);px(ctx,cx-4,cy-10+br,22,4,pal.accent+'cc');}
  // CLOSED EYES — clear horizontal lines
  ctx.fillStyle='#2a1820';
  ctx.fillRect((cx+2)|0,(cy-2+br)|0,5,1);
  ctx.fillRect((cx+8)|0,(cy-2+br)|0,3,1);
  // tiny smile (content)
  ctx.fillStyle='#c8906070';
  ctx.fillRect((cx+3)|0,(cy+2+br)|0,4,1);
  ctx.fillRect((cx+3)|0,(cy+3+br)|0,1,1);
  ctx.fillRect((cx+6)|0,(cy+3+br)|0,1,1);
}

// ── drinking_beer (couch) — large mug, tilting head ──────────────
function drawDrinkingBeer(ctx, cx, cy, pal, t) {
  const sip = Math.sin(t * Math.PI * 2 * 0.25);
  const tilt = Math.max(0, sip) * 20; // head tilts back when sipping
  const armUp = Math.max(0, sip) * 10 + 6;
  shd(ctx, cx-8, cy+10, 18, 3);
  // legs
  px(ctx,cx-22,cy+4,14,6,pal.pants); px(ctx,cx-12,cy+9,5,5,pal.pants);
  px(ctx,cx-26,cy+9,7,3,'#1a1a2a');
  // body sitting upright
  px(ctx,cx-8,cy-2,13,10,pal.shirt);
  px(ctx,cx-2,cy-1,2,8,'#ffffff18');
  // arm holding mug UP — key silhouette
  px(ctx,cx-11,cy-3-armUp,4,12,pal.skin);
  // BIG BEER MUG
  const my = cy-14-armUp;
  ctx.fillStyle='#e8b820'; ctx.fillRect((cx-14)|0,my|0,13,15); // body
  ctx.fillStyle='#f5d040'; ctx.fillRect((cx-13)|0,my|0,11,5);  // foam top
  ctx.fillStyle='#fffff080'; ctx.fillRect((cx-12)|0,my|0,4,4); // foam hi
  ctx.fillStyle='#c09010'; ctx.fillRect((cx-1)|0,(my+2)|0,5,9); // handle
  ctx.fillStyle='#a07008'; ctx.fillRect((cx-1)|0,(my+2)|0,2,9); // handle dark
  ctx.fillStyle='#c89018'; ctx.fillRect((cx-12)|0,(my+5)|0,9,9); // beer
  ctx.fillStyle='#d4a020'; ctx.fillRect((cx-12)|0,(my+5)|0,2,9); // shine
  // right arm relaxed
  px(ctx,cx+5,cy+1,8,3,pal.skin);
  // head — tilts back when drinking
  ctx.save(); ctx.translate(cx+2,cy-8); ctx.rotate(-tilt*Math.PI/180);
  ctx.fillStyle=pal.skin; ctx.beginPath(); ctx.ellipse(0,0,7,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(0,-2,8,6,0,Math.PI,0); ctx.fill();
  if(!pal.hat){px(ctx,-7,-5,3,4,pal.hair); px(ctx,3,-5,3,4,pal.hair);}
  if(pal.hat){ctx.fillStyle=pal.accent;ctx.fillRect(-8,-14,16,6);ctx.fillRect(-10,-10,20,4);}
  ctx.fillStyle='#1a1b26';
  if(tilt>8){
    // eyes closed, gulping
    ctx.fillRect(-4,-1,4,1); ctx.fillRect(1,-1,4,1);
    ctx.fillStyle='#80302090'; ctx.beginPath(); ctx.ellipse(0,3,4,3,0,0,Math.PI*2); ctx.fill();
  } else {
    ctx.fillRect(-4,-2,4,3); ctx.fillRect(1,-2,4,3);
    ctx.fillStyle='#ffffff60'; ctx.fillRect(-4,-2,1,1); ctx.fillRect(1,-2,1,1);
    ctx.fillStyle='#c8906060'; ctx.fillRect(-2,2,5,2);
  }
  if(pal.beard){ctx.fillStyle=pal.hair+'bb';ctx.fillRect(-4,4,8,3);}
  ctx.restore();
}

// ── at_coffee (kitchen — pressing button, waiting, sipping) ──────
function drawAtCoffee(ctx, cx, cy, pal, t) {
  const ph = t * Math.PI * 2;
  const press = Math.sin(ph * 2) > 0.6 ? 1 : 0; // finger presses button
  const sip = Math.sin(ph * 0.5);
  shd(ctx, cx, cy+16);
  px(ctx,cx-4,cy+5,4,9,pal.pants); px(ctx,cx+1,cy+5,4,9,pal.pants);
  px(ctx,cx-5,cy+13,5,3,'#1a1a2a'); px(ctx,cx+1,cy+13,5,3,'#1a1a2a');
  px(ctx,cx-5,cy-3,11,9,pal.shirt);
  // arm reaching to machine
  px(ctx,cx+4,cy-1-press,8,3,pal.skin); px(ctx,cx+11,cy-2-press,3,4,pal.skin);
  // other arm holding cup
  const cupY = cy-1 - Math.max(0,sip)*6;
  px(ctx,cx-11,cy+1,7,3,pal.skin);
  // coffee cup
  ctx.fillStyle='#d0c0a0'; ctx.fillRect((cx-14)|0,(cupY)|0,6,7);
  ctx.fillStyle='#3a1808'; ctx.fillRect((cx-13)|0,(cupY+2)|0,4,5);
  ctx.fillStyle='#ffffff40'; ctx.fillRect((cx-13)|0,cupY|0,2,2);
  // steam from cup
  if(Math.random()<0.08) PS.smoke(cx-11, cupY-2);
  drawHeadFront(ctx, cx, cy-12, pal, Math.abs(Math.sin(ph*0.7))<0.05);
}

// ── at_fridge (kitchen — opening, looking inside, taking item) ───
function drawAtFridge(ctx, cx, cy, pal, t) {
  const ph = t * Math.PI * 2;
  const bend = Math.sin(ph * 0.5) * 8; // bending to look in
  const reach = Math.max(0, Math.sin(ph * 0.5)) * 6;
  shd(ctx, cx, cy+16);
  px(ctx,cx-4,cy+5+bend*0.3,4,9,pal.pants); px(ctx,cx+1,cy+5+bend*0.3,4,9,pal.pants);
  px(ctx,cx-6,cy+13,6,3,'#1a1a2a'); px(ctx,cx+1,cy+13,6,3,'#1a1a2a');
  px(ctx,cx-5,cy-3+bend*0.2,11,9,pal.shirt);
  // arm reaching into fridge
  px(ctx,cx+5,cy+reach,8,3,pal.skin);
  // other arm bracing on door
  px(ctx,cx-11,cy+1,7,3,pal.skin);
  // head looking in (slight bow)
  ctx.save(); ctx.translate(cx,cy-10+bend*0.4); ctx.rotate(bend*0.03);
  ctx.fillStyle=pal.skin; ctx.beginPath(); ctx.ellipse(0,0,7,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(0,-2,7,6,0,-Math.PI,0); ctx.fill();
  ctx.fillStyle='#1a1b26'; ctx.fillRect(-4,-3,4,3); ctx.fillRect(1,-3,4,3);
  ctx.restore();
}

// ── eating (kitchen table — sandwich/snack) ───────────────────────
function drawEating(ctx, cx, cy, pal, t) {
  const ph = t * Math.PI * 2;
  const bite = Math.sin(ph * 1.5) > 0.5; // takes a bite
  const chew = Math.sin(ph * 3) * 0.5;
  shd(ctx, cx, cy+16);
  px(ctx,cx-5,cy+5,5,9,pal.pants); px(ctx,cx+1,cy+5,5,9,pal.pants);
  px(ctx,cx-6,cy+13,6,3,'#1a1a2a'); px(ctx,cx+1,cy+13,6,3,'#1a1a2a');
  px(ctx,cx-5,cy-3,11,9,pal.shirt);
  // both arms at table level
  px(ctx,cx-11,cy+1,6,3,pal.skin);
  px(ctx,cx+5,cy+1,6,3,pal.skin);
  // sandwich/food
  ctx.fillStyle='#d4b870'; ctx.fillRect((cx-5)|0,(cy-5)|0,10,5);
  ctx.fillStyle='#80c050'; ctx.fillRect((cx-4)|0,(cy-4)|0,8,2);
  ctx.fillStyle='#c05030'; ctx.fillRect((cx-4)|0,(cy-3)|0,8,1);
  ctx.fillStyle='#e0c880'; ctx.fillRect((cx-5)|0,(cy-6)|0,10,2);
  // head
  drawHeadFront(ctx, cx, cy-14, pal, !bite);
  // mouth open/chewing
  if(bite) {
    ctx.fillStyle='#301010';
    ctx.beginPath(); ctx.ellipse(cx,cy-20,3,2,0,0,Math.PI*2); ctx.fill();
  }
}

// ── window_gaze (standing at window) ─────────────────────────────
function drawWindowGaze(ctx, cx, cy, pal, t) {
  const ph = t * Math.PI * 2;
  const sway = Math.sin(ph * 0.2) * 1.5;
  const armCross = Math.sin(ph * 0.15) * 1;
  shd(ctx, cx, cy+16);
  px(ctx,cx-4,cy+5,4,9,pal.pants); px(ctx,cx+1,cy+5,4,9,pal.pants);
  px(ctx,cx-5,cy+13,5,3,'#1a1a2a'); px(ctx,cx+1,cy+13,5,3,'#1a1a2a');
  px(ctx,cx-5,cy-3,11,9,pal.shirt);
  // arms crossed over chest
  px(ctx,cx-9,cy+1+armCross,14,3,pal.skin);
  px(ctx,cx-7,cy+3-armCross,12,3,pal.skin);
  // head (back, looking at window)
  drawHeadBack(ctx, cx+sway, cy-12, pal);
  // window reflection glow
  ctx.save(); ctx.globalAlpha=0.06;
  ctx.fillStyle='#80b0ff';
  ctx.fillRect((cx-8)|0,(cy-24)|0,16,18);
  ctx.restore();
}

// ── headphones (subtle dance / head bob) ─────────────────────────
function drawHeadphones(ctx, cx, cy, pal, t) {
  const ph = t * Math.PI * 2;
  const bob = Math.sin(ph) * 3;
  const hip = Math.sin(ph) * 2;
  const arm1 = Math.sin(ph + 0.5) * 4;
  const arm2 = Math.sin(ph - 0.5) * 4;
  shd(ctx, cx, cy+16);
  px(ctx,cx-4+hip,cy+5,4,9,pal.pants); px(ctx,cx+1+hip,cy+5,4,9,pal.pants);
  px(ctx,cx-5+hip,cy+13,5,3,'#1a1a2a'); px(ctx,cx+1+hip,cy+13,5,3,'#1a1a2a');
  px(ctx,cx-5+hip*0.5,cy-3,11,9,pal.shirt);
  // arms moving to beat
  px(ctx,cx-11,cy+arm1,6,3,pal.skin);
  px(ctx,cx+5,cy+arm2,6,3,pal.skin);
  // head bobbing
  drawHeadFront(ctx, cx, cy-12+bob, pal, false);
  // headphone band
  ctx.fillStyle='#404060'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(cx,cy-20+bob,8,Math.PI,0); ctx.stroke();
  ctx.fillStyle='#404060';
  ctx.fillRect((cx-10)|0,(cy-22+bob)|0,4,5);
  ctx.fillRect((cx+6)|0,(cy-22+bob)|0,4,5);
  ctx.fillStyle='#606090';
  ctx.fillRect((cx-9)|0,(cy-21+bob)|0,3,4);
  ctx.fillRect((cx+7)|0,(cy-21+bob)|0,3,4);
  // music notes particle
  if(Math.random()<0.03) PS.emit(cx+8,cy-22+bob,1,{vx:8,vy:-20,spread:6,gravity:-5,life:1.2,size:4,color:pal.accent});
}

// ── air_guitar (enthusiastic!) ────────────────────────────────────
function drawAirGuitar(ctx, cx, cy, pal, t) {
  const ph = t * Math.PI * 2;
  const strum = Math.sin(ph * 3) * 8;
  const lean = Math.sin(ph * 1.5) * 6;
  const kick = Math.sin(ph * 2) * 6;
  shd(ctx, cx, cy+16);
  // legs — one kicks out
  px(ctx,cx-5+lean*0.3,cy+5,5,9,pal.pants);
  px(ctx,cx+1,cy+5+kick,5,9,pal.pants);
  px(ctx,cx-6+lean*0.3,cy+13,6,3,'#1a1a2a');
  px(ctx,cx+1,cy+13+kick,6,3,'#1a1a2a');
  // body leaning
  px(ctx,cx-5+lean*0.4,cy-3,11,9,pal.shirt);
  // strumming arm (right — dramatic)
  px(ctx,cx+5+lean*0.3,cy-4-strum,3,12,pal.skin);
  px(ctx,cx+5+lean*0.3,cy+6-strum,5,4,pal.skin);
  // fretting arm (left — extended)
  px(ctx,cx-14,cy-2,10,3,pal.skin);
  px(ctx,cx-16,cy-4,4,5,pal.skin);
  // head thrown back
  ctx.save(); ctx.translate(cx+lean*0.3, cy-11);
  ctx.rotate(-lean*0.04);
  ctx.fillStyle=pal.skin; ctx.beginPath(); ctx.ellipse(0,0,7,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(0,-2,8,7,0,-Math.PI,0); ctx.fill();
  ctx.fillStyle='#1a1b26'; ctx.fillRect(-4,-3,4,3); ctx.fillRect(1,-3,4,3);
  // open mouth (rocking!)
  ctx.fillStyle='#301010'; ctx.fillRect(-3,2,6,3);
  ctx.restore();
  // music note particles
  if(Math.random()<0.06) PS.emit(cx+12,cy-16,1,{vx:(Math.random()-0.5)*30,vy:-40,spread:5,gravity:-10,life:1,size:5,color:pal.accent});
}

// ── yoga (warrior pose) ──────────────────────────────────────────
function drawYoga(ctx, cx, cy, pal, t) {
  const ph = t * Math.PI * 2;
  const balance = Math.sin(ph * 0.4) * 2;
  shd(ctx, cx, cy+16, 18, 3);
  // warrior stance — legs wide
  px(ctx,cx-12+balance,cy+5,5,9,pal.pants);
  px(ctx,cx+8,cy+5,5,9,pal.pants);
  px(ctx,cx-14+balance,cy+13,7,3,'#1a1a2a');
  px(ctx,cx+8,cy+13,7,3,'#1a1a2a');
  // body upright
  px(ctx,cx-4+balance*0.3,cy-3,10,9,pal.shirt);
  // arms stretched wide (warrior II)
  px(ctx,cx-14+balance,cy-1,10,3,pal.skin);
  px(ctx,cx+6,cy-1,10,3,pal.skin);
  px(ctx,cx-17+balance,cy-3,4,5,pal.skin); // left hand
  px(ctx,cx+14,cy-3,4,5,pal.skin); // right hand
  // head calm, facing forward
  drawHeadFront(ctx, cx+balance*0.3, cy-13, pal, Math.abs(Math.sin(ph*0.1))<0.02);
}

// ── reading (sitting with book) ───────────────────────────────────
function drawReading(ctx, cx, cy, pal, t) {
  const ph = t * Math.PI * 2;
  const flip = Math.floor(ph/(Math.PI*2)*4) % 2; // page flip occasional
  shd(ctx, cx, cy+16);
  px(ctx,cx-5,cy+5,5,9,pal.pants); px(ctx,cx+1,cy+5,5,9,pal.pants);
  px(ctx,cx-6,cy+13,6,3,'#1a1a2a'); px(ctx,cx+1,cy+13,6,3,'#1a1a2a');
  px(ctx,cx-5,cy-3,11,9,pal.shirt);
  // arms holding book
  px(ctx,cx-10,cy+1,8,3,pal.skin);
  px(ctx,cx+2,cy+1,8,3,pal.skin);
  // book (open)
  ctx.fillStyle='#8a5030'; ctx.fillRect((cx-8)|0,(cy-8)|0,16,12); // cover
  ctx.fillStyle='#f4f0e8'; ctx.fillRect((cx-7)|0,(cy-7)|0,7,10); // left page
  ctx.fillStyle='#f0ece4'; ctx.fillRect((cx)|0,(cy-7)|0,7,10); // right page

  // spine
  ctx.fillStyle='#704020'; ctx.fillRect((cx-1)|0,(cy-7)|0,2,10);

  ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(0,-2,7,6,0,-Math.PI,0); ctx.fill();
  if(pal.glasses){ctx.strokeStyle='#808090';ctx.lineWidth=1;ctx.strokeRect(-5,-3,5,4);ctx.strokeRect(0,-3,5,4);}
  ctx.fillStyle='#1a1b26'; ctx.fillRect(-4,-3,4,3); ctx.fillRect(1,-3,4,3);
  ctx.restore();
}

// ── desk_nap (head on arms at desk) ──────────────────────────────
function drawDeskNap(ctx, cx, cy, pal, t) {
  const br = Math.sin(t * Math.PI * 2 * 0.2) * 1;
  shd(ctx, cx, cy+16);
  px(ctx,cx-5,cy+5,5,9,pal.pants); px(ctx,cx+1,cy+5,5,9,pal.pants);

// ── doodling (drawing at desk) ────────────────────────────────────
function drawDoodling(ctx, cx, cy, pal, t) {

// ── chatting (group — left person in pair) ───────────────────────
function drawChattingL(ctx, cx, cy, pal, t) {
  const ph = t * Math.PI * 2;
  const gesture = Math.sin(ph * 0.8) * 6; // hand gestures
  const nod = Math.sin(ph * 0.6) * 2;
  shd(ctx, cx, cy+16);
  px(ctx,cx-4,cy+5,4,9,pal.pants); px(ctx,cx+1,cy+5,4,9,pal.pants);
  px(ctx,cx-5,cy+13,5,3,'#1a1a2a'); px(ctx,cx+1,cy+13,5,3,'#1a1a2a');
  px(ctx,cx-5,cy-3,11,9,pal.shirt);
  // arm gesturing (right arm toward partner)
  px(ctx,cx+4,cy-2-gesture,7,3,pal.skin);
  px(ctx,cx+10,cy-2-gesture,4,5,pal.skin);
  // other arm
  px(ctx,cx-10,cy+1,6,3,pal.skin);
  // head facing right (toward partner)
  ctx.save(); ctx.translate(cx+2,cy-12+nod);
  ctx.fillStyle=pal.skin; ctx.beginPath(); ctx.ellipse(-1,0,7,8,0,0,Math.PI*2); ctx.fill();
  px(ctx,5,-2,3,5,pal.skin); // ear facing right
  ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(-1,-2,7,6,0,-Math.PI,0); ctx.fill();
  ctx.fillStyle='#1a1b26'; ctx.fillRect(-4,-3,4,3); ctx.fillRect(1,-3,4,3);
  ctx.fillStyle='#c8906060'; ctx.fillRect(-2,3,5,2);
  ctx.restore();

  if((ph*2|0)%8<4) {
    ctx.save(); ctx.fillStyle='rgba(200,210,255,0.9)';
    rrect(ctx,cx+12,cy-22,20,12,3); ctx.fill();
    ctx.fillStyle='#1a1b26'; ctx.font="5px 'Press Start 2P',monospace";
    ctx.fillText('...',cx+14,cy-13);
    ctx.restore();
  }
}

// ── chatting (group — right person in pair) ──────────────────────
function drawChattingR(ctx, cx, cy, pal, t) {
  const ph = t * Math.PI * 2 + Math.PI; // offset phase
  const listen = Math.sin(ph * 0.6) * 1.5; // nodding while listening

}

function drawArguingL(ctx, cx, cy, pal, t) {

}

// ── gossiping (group — left, leaning in whispering) ─────────────
function drawGossipingL(ctx, cx, cy, pal, t) {

// ── gossiping (group — right, receiving) ─────────────────────────
function drawGossipingR(ctx, cx, cy, pal, t) {
  const ph = t * Math.PI * 2 + Math.PI;

// ── gaming (sitting with controller, watching TV) ─────────────────
function drawGaming(ctx, cx, cy, pal, t) {
  const btn = Math.floor(t * 4) % 2; // button mash
  shd(ctx, cx, cy+14);
  // legs forward (sitting on floor/sofa)
  px(ctx,cx-8,cy+6,7,8,pal.pants); px(ctx,cx+2,cy+6,7,8,pal.pants);

  px(ctx,cx-6,cy-2,13,9,pal.shirt);
  // arms holding controller
  px(ctx,cx-10,cy+2,5,4,pal.skin); px(ctx,cx+6,cy+2,5,4,pal.skin);

  ctx.fillStyle='#1a1a2e'; ctx.fillRect(gx,gy,14,6);
  ctx.fillStyle='#f7768e'; ctx.fillRect(gx+1+btn,gy+1,3,3);
  ctx.fillStyle='#9ece6a'; ctx.fillRect(gx+7,gy+1,3,3);
  // head — eyes wide on TV
  ctx.fillStyle=pal.skin; ctx.beginPath(); ctx.ellipse(cx,cy-9,7,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(cx,cy-12,7,6,0,-Math.PI,0); ctx.fill();
  ctx.fillStyle='#1a1b26'; ctx.fillRect(cx-5,cy-12,4,4); ctx.fillRect(cx+1,cy-12,4,4);
  // TV screen glow on face
  ctx.save(); ctx.globalAlpha=0.15+Math.sin(t*Math.PI*2)*0.05;
  ctx.fillStyle='#5090ff'; ctx.fillRect(cx-8,cy-18,16,12);
  ctx.restore();
}

// ── treadmill (running in place) ──────────────────────────────────
function drawTreadmill(ctx, cx, cy, pal, t) {
  const run = t * Math.PI * 2;
  // Forward running lean
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(-0.10);
  ctx.translate(-cx, -cy);
  const legL = Math.sin(run) * 12;
  const legR = Math.sin(run + Math.PI) * 12;
  const armL = Math.sin(run + Math.PI) * 8;
  const armR = Math.sin(run) * 8;
  const bob  = Math.abs(Math.sin(run)) * 3;
  const jy = cy - bob;
  shd(ctx, cx, cy+16, 8, 3);
  // legs
  px(ctx,cx-5,jy+5+legL*.3,4,9,pal.pants); px(ctx,cx+2,jy+5+legR*.3,4,9,pal.pants);
  px(ctx,cx-7,jy+14+legL*.5,5,4,'#1a1a2a'); px(ctx,cx+2,jy+14+legR*.5,5,4,'#1a1a2a');
  // body
  px(ctx,cx-6,jy-1,12,9,pal.shirt);
  // arms pumping
  px(ctx,cx-10,jy+armL,4,8,pal.skin); px(ctx,cx+6,jy+armR,4,8,pal.skin);
  // head bobbing
  ctx.fillStyle=pal.skin; ctx.beginPath(); ctx.ellipse(cx,jy-10,7,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(cx,jy-13,7,6,0,-Math.PI,0); ctx.fill();
  // determined eyes
  ctx.fillStyle='#1a1b26'; ctx.fillRect(cx-5,cy-13,4,3); ctx.fillRect(cx+1,cy-13,4,3);
  // sweat drops
  ctx.fillStyle='#88ccff80';
  ctx.beginPath(); ctx.ellipse(cx+9,cy-8,1.5,2.5,0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+11,cy-5,1,2,0.3,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── ping_pong_l — swing synced to ball arriving on left side ──────
function drawPingPongL(ctx, cx, cy, pal, t) {
  // Hit when ball is near left side (ppBall.t < 0.15)
  const hitPhase = Math.max(0, 1 - ppBall.t / 0.15);
  const swing = hitPhase * 16;
  shd(ctx, cx, cy+16);
  px(ctx,cx-4,cy+5,4,9,pal.pants); px(ctx,cx+1,cy+5,4,9,pal.pants);
  px(ctx,cx-5,cy-3,11,9,pal.shirt);
  px(ctx,cx-10,cy+1,6,3,pal.skin); // back arm
  // hitting arm
  const ax=cx+6+swing*.4, ay=cy-2-swing*.2;
  px(ctx,cx+4,cy+1,6,3,pal.skin);
  ctx.fillStyle='#c04040'; ctx.beginPath(); ctx.ellipse(ax+6,ay-2,7,6,swing*.04,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#300808'; ctx.beginPath(); ctx.ellipse(ax+6,ay-2,4,3,swing*.04,0,Math.PI*2); ctx.fill();
  // grip line
  ctx.fillStyle='#8b3030'; ctx.fillRect(ax+2,ay,4,2);
  // head
  ctx.fillStyle=pal.skin; ctx.beginPath(); ctx.ellipse(cx,cy-10,7,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(cx,cy-13,7,6,0,-Math.PI,0); ctx.fill();
  ctx.fillStyle='#1a1b26'; ctx.fillRect(cx-5,cy-13,4,3); ctx.fillRect(cx+1,cy-13,4,3);
  ctx.fillStyle='#c89060'; ctx.fillRect(cx-3,cy-7,6,2);
  // watching ball — head turns toward table
  if (ppBall.active) {
    ctx.fillStyle='#1a1b26'; ctx.fillRect(cx-2,cy-11,3,2); // shifted eyes
  }
}

// ── ping_pong_r — swing synced to ball arriving on right side ─────
function drawPingPongR(ctx, cx, cy, pal, t) {
  const hitPhase = Math.max(0, (ppBall.t - 0.85) / 0.15);
  const swing = hitPhase * 16;
  shd(ctx, cx, cy+16);
  px(ctx,cx-4,cy+5,4,9,pal.pants); px(ctx,cx+1,cy+5,4,9,pal.pants);
  px(ctx,cx-5,cy-3,11,9,pal.shirt);
  px(ctx,cx+4,cy+1,6,3,pal.skin);
  const ax=cx-6-swing*.4, ay=cy-2-swing*.2;
  px(ctx,cx-10,cy+1,6,3,pal.skin);
  ctx.fillStyle='#4040c0'; ctx.beginPath(); ctx.ellipse(ax-6,ay-2,7,6,-swing*.04,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#080830'; ctx.beginPath(); ctx.ellipse(ax-6,ay-2,4,3,-swing*.04,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#303080'; ctx.fillRect(ax-8,ay,4,2);
  ctx.fillStyle=pal.skin; ctx.beginPath(); ctx.ellipse(cx,cy-10,7,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(cx,cy-13,7,6,0,-Math.PI,0); ctx.fill();
  ctx.fillStyle='#1a1b26'; ctx.fillRect(cx-5,cy-13,4,3); ctx.fillRect(cx+1,cy-13,4,3);
  ctx.fillStyle='#c89060'; ctx.fillRect(cx-3,cy-7,6,2);
}

// ── Draw ping pong ball flying across the table ───────────────────
function drawPingPongBall(ctx) {
  if (!ppBall.active || !PP_L.tx || !PP_R.tx) return;
  const lx = OX + PP_L.tx * T + T*0.5;
  const ly = OY + PP_L.ty * T + T*0.2;
  const rx = OX + PP_R.tx * T - T*0.5;
  const ry = OY + PP_R.ty * T + T*0.2;
  const bx = lx + (rx - lx) * ppBall.t;
  const arc = Math.sin(ppBall.t * Math.PI) * 18; // ball arc height
  const by = ly + (ry - ly) * ppBall.t - arc;
  // shadow on table
  const shadowY = ly + (ry - ly) * ppBall.t;
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.ellipse(bx, shadowY + 4, 3 - arc*0.05, 1.5, 0, 0, Math.PI*2); ctx.fill();
  // ball
  ctx.fillStyle = '#f5f5f0';
  ctx.beginPath(); ctx.arc(bx, by, 3.5, 0, Math.PI*2); ctx.fill();
  // highlight
  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(bx-1, by-1, 1.5, 0, Math.PI*2); ctx.fill();
  // spin trail
  const speed = ppBall.dir * 3;
  ctx.fillStyle = 'rgba(255,255,240,0.4)';
  ctx.beginPath(); ctx.arc(bx - speed*1.5, by, 2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,240,0.15)';
  ctx.beginPath(); ctx.arc(bx - speed*3, by, 1.2, 0, Math.PI*2); ctx.fill();
}

// ── Aquarium fish animation ───────────────────────────────────────
const aquariumFish = [
  { x:0.3, y:0.4, speed:0.012, color:'#ff6040', size:4, phase:0 },
  { x:0.7, y:0.6, speed:-0.008, color:'#40a0ff', size:3.5, phase:1.5 },
  { x:0.5, y:0.3, speed:0.015, color:'#ffcc20', size:3, phase:3 },
  { x:0.2, y:0.7, speed:-0.01, color:'#60ff80', size:3, phase:4.5 },
];
function drawAquariumFish(ctx, tick) {
  const rX = PER_ROW * STEP_X + 2;
  const [_aqTx, _aqTy] = getAdminPos('aquarium', rX+0.3, 8);
  const aqx = OX + _aqTx*T, aqy = OY + _aqTy*T;
  const aqW = T*2.5, aqH = T*1.8;
  // Clip to inside of tank glass
  const cx = aqx+4, cy = aqy+4, cw = aqW-8, ch = aqH-8;
  ctx.save();
  ctx.beginPath(); ctx.rect(cx, cy, cw, ch); ctx.clip();

  for (const f of aquariumFish) {
    f.x += f.speed * 0.016;
    // Bounce off walls instead of wrapping
    if (f.x > 0.92) { f.x = 0.92; f.speed = -Math.abs(f.speed); }
    if (f.x < 0.08) { f.x = 0.08; f.speed = Math.abs(f.speed); }
    const fx = cx + f.x * cw;
    const fy = cy + f.y * ch + Math.sin(tick*0.05 + f.phase) * 3;
    const flip = f.speed > 0 ? 1 : -1;
    ctx.save(); ctx.translate(fx, fy); ctx.scale(flip, 1);
    ctx.fillStyle = f.color;
    ctx.beginPath(); ctx.ellipse(0, 0, f.size, f.size*0.6, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-f.size, 0);
    ctx.lineTo(-f.size-3, -2.5); ctx.lineTo(-f.size-3, 2.5); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(f.size*0.4, -1, 1, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(f.size*0.5, -1, 0.5, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  // Bubbles (clipped inside tank)
  ctx.fillStyle='#80c0ff30';
  for (let i=0; i<3; i++) {
    const bx = cx + ((tick*0.7+i*30)%cw);
    const by = cy + ch - ((tick*0.4+i*20)%ch);
    ctx.beginPath(); ctx.arc(bx, by, 1.5+i*0.5, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore(); // remove clip
}

// ── Dart animation — darts fly toward board when agent is at darts spot ──
let dartAnims = []; // {startTime, angle, progress}
function drawDartAnimation(ctx, tick) {
  const rX = PER_ROW * STEP_X + 2;
  // Check if any agent is at the darts spot
  const dartPlayer = Object.values(agentStates).find(s =>
    s.arrived && s.activityAnim === 'stretching' &&
    IDLE_SPOTS[s.slotIdx]?.type === 'darts'
  );
  if (!dartPlayer) { dartAnims = []; return; }

  // Spawn a new dart every ~60 ticks
  if (tick % 60 < 1 || dartAnims.length === 0) {
    dartAnims.push({
      angle: -0.3 + Math.random() * 0.6, // spread
      t: 0,
      stuck: false,
      stuckX: 0, stuckY: 0
    });
    if (dartAnims.length > 5) dartAnims.shift(); // max 5 darts
  }

  const [_dBx, _dBy] = getAdminPos('darts', rX+1.5, 0);
  const boardX = OX + _dBx * T;
  const boardY = OY + _dBy * T + 4;
  // Agent throw position
  const throwX = OX + dartPlayer.sx ? dartPlayer.sx - OX : (rX + 1.5) * T;
  const throwY = dartPlayer.sy ? dartPlayer.sy - 16 : OY + 7 * T;

  for (const d of dartAnims) {
    if (!d.stuck) {
      d.t += 0.04;
      if (d.t >= 1) {
        d.stuck = true;
        d.stuckX = boardX + (Math.random() - 0.5) * 16;
        d.stuckY = boardY + (Math.random() - 0.5) * 16;
      }
    }

    if (d.stuck) {
      // Dart stuck in board
      const dx2 = d.stuckX, dy2 = d.stuckY;
      ctx.save();
      ctx.translate(dx2, dy2);
      ctx.rotate(-Math.PI/2 + d.angle);
      // Dart body
      ctx.fillStyle='#c0c0d0'; ctx.fillRect(-1, -8, 2, 8);
      // Flights (feathers)
      ctx.fillStyle='#cc2020'; ctx.beginPath();
      ctx.moveTo(0, -8); ctx.lineTo(-4, -12); ctx.lineTo(0, -10); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(0, -8); ctx.lineTo(4, -12); ctx.lineTo(0, -10); ctx.fill();
      // Tip
      ctx.fillStyle='#808080'; ctx.fillRect(-0.5, 0, 1, 3);
      ctx.restore();
    } else {
      // Flying dart
      const px = throwX + (boardX - throwX) * d.t + d.angle * 20 * (1-d.t);
      const py = throwY + (boardY - throwY) * d.t - Math.sin(d.t * Math.PI) * 15;
      ctx.save();
      const flyAngle = Math.atan2(boardY - throwY, boardX - throwX) + d.angle * 0.5;
      ctx.translate(px, py);
      ctx.rotate(flyAngle);
      // Dart body
      ctx.fillStyle='#c0c0d0'; ctx.fillRect(-1, -6, 2, 6);
      ctx.fillStyle='#cc2020';
      ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(-3,-9); ctx.lineTo(0,-7); ctx.fill();
      ctx.beginPath(); ctx.moveTo(0,-6); ctx.lineTo(3,-9); ctx.lineTo(0,-7); ctx.fill();
      ctx.fillStyle='#808080'; ctx.fillRect(-0.5, 0, 1, 2);
      ctx.restore();
      // Motion trail
      ctx.fillStyle='rgba(200,200,220,0.3)';
      ctx.beginPath(); ctx.arc(px - 4, py + 2, 1.5, 0, Math.PI*2); ctx.fill();
    }
  }
}

// ── smoking_beer (couch) — beer in one hand, cigarette in other ──
function drawSmokingBeer(ctx, cx, cy, pal, t) {
  const ph   = t * Math.PI * 2;
  // cigarette cycle: 0-0.35 resting, 0.35-0.65 raise to mouth, 0.65-0.8 puff, 0.8-1 lower
  const cigT = (t % 1);
  const armRaise = cigT < 0.35 ? 0
                 : cigT < 0.65 ? ease.inOut((cigT-0.35)/0.3) * 14
                 : cigT < 0.8  ? ease.inOut((0.8-cigT)/0.15) * 14
                 : 0;
  const puffing = cigT > 0.55 && cigT < 0.78;

  shd(ctx, cx-8, cy+10, 18, 3);

  // legs (sitting, slightly spread)
  px(ctx,cx-22,cy+4,14,6,pal.pants); px(ctx,cx-12,cy+9,5,5,pal.pants);
  px(ctx,cx-26,cy+9,7,3,'#1a1a2a');

  // body slightly slouched back
  px(ctx,cx-8,cy-2,13,10,pal.shirt);
  px(ctx,cx-2,cy-1,2,8,'#ffffff18');

  // LEFT arm holding big beer mug (same as drinking_beer)
  px(ctx,cx-11,cy-1,4,10,pal.skin);
  const my = cy-12;
  ctx.fillStyle='#e8b820'; ctx.fillRect((cx-14)|0,my|0,13,15);
  ctx.fillStyle='#f5d040'; ctx.fillRect((cx-13)|0,my|0,11,5);
  ctx.fillStyle='#fffff080'; ctx.fillRect((cx-12)|0,my|0,4,4);
  ctx.fillStyle='#c09010'; ctx.fillRect((cx-1)|0,(my+2)|0,5,9);
  ctx.fillStyle='#a07008'; ctx.fillRect((cx-1)|0,(my+2)|0,2,9);
  ctx.fillStyle='#c89018'; ctx.fillRect((cx-12)|0,(my+5)|0,9,9);
  ctx.fillStyle='#d4a020'; ctx.fillRect((cx-12)|0,(my+5)|0,2,9);

  // RIGHT arm — cigarette hand (raises to mouth)
  const cArmY = cy + 1 - armRaise;
  px(ctx, cx+5, cArmY, 8, 3, pal.skin);
  // forearm/wrist
  const cigTipX = cx+13, cigTipY = cArmY - 2;
  // cigarette stick
  ctx.fillStyle = '#f5f0e0';
  ctx.save(); ctx.translate(cigTipX, cigTipY); ctx.rotate(-0.3);
  ctx.fillRect(-1,-1,10,3);
  // filter (orange tip)
  ctx.fillStyle = '#d08030'; ctx.fillRect(8,-1,3,3);
  // lit ember
  ctx.fillStyle = '#ff6020'; ctx.beginPath(); ctx.arc(-1,0.5,2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff9040'; ctx.beginPath(); ctx.arc(-1,0.5,1,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Smoke from cigarette tip — always drifting
  if (Math.random() < 0.12) {
    PS.smoke(cigTipX - 3, cigTipY - 3);
  }

  // HEAD — side profile, slightly tilted back & content
  ctx.save();
  ctx.translate(cx+2, cy-8);
  ctx.rotate(puffing ? -0.12 : -0.05);
  ctx.fillStyle = pal.skin; ctx.beginPath(); ctx.ellipse(0,0,7,8,0,0,Math.PI*2); ctx.fill();
  // ear
  px(ctx, 6, -1, 3, 5, pal.skin);
  ctx.fillStyle = pal.hair; ctx.beginPath(); ctx.ellipse(0,-2,8,6,0,Math.PI,0); ctx.fill();
  if (!pal.hat) { px(ctx,-7,-5,3,4,pal.hair); px(ctx,3,-5,3,4,pal.hair); }
  if (pal.hat)  { ctx.fillStyle=pal.accent; ctx.fillRect(-8,-14,16,6); ctx.fillRect(-10,-10,20,4); }
  // EYES — heavy lidded / squinting contentedly
  ctx.fillStyle = '#1a1b26';
  ctx.fillRect(-4,-2,4,2); ctx.fillRect(1,-2,4,2);
  ctx.fillStyle = '#ffffff40'; ctx.fillRect(-4,-2,1,1); ctx.fillRect(1,-2,1,1);
  // mouth — pursed for puffing OR relaxed smirk
  if (puffing) {
    // puckered mouth exhaling
    ctx.fillStyle = '#c87050';
    ctx.beginPath(); ctx.ellipse(0, 3, 3, 2, 0, 0, Math.PI*2); ctx.fill();
    // exhale smoke cloud from mouth
    if (Math.random() < 0.3) PS.smoke(cx+14, cy-5);
  } else {
    ctx.fillStyle = '#c8906060';
    ctx.fillRect(-2, 3, 5, 2);
    ctx.fillRect(-2, 4, 1, 1); ctx.fillRect(2, 4, 1, 1); // tiny smirk
  }
  if (pal.beard) { ctx.fillStyle = pal.hair+'bb'; ctx.fillRect(-4,4,8,3); }
  ctx.restore();
}

// ── playing_arcade — standing at arcade cabinet ──────────────────
function drawPlayingArcade(ctx, cx, cy, pal, t) {
  const s = Math.sin(t * Math.PI * 2);
  const bounce = Math.abs(Math.sin(t * Math.PI * 4)) * 2;
  const lean = 3;
  shd(ctx, cx, cy+16);
  px(ctx,cx-4,cy+5-bounce,4,9+bounce,pal.pants);
  px(ctx,cx+1,cy+5-bounce,4,9+bounce,pal.pants);
  px(ctx,cx-5,cy+13,5,3,'#1a1a2a'); px(ctx,cx+1,cy+13,5,3,'#1a1a2a');
  ctx.save(); ctx.translate(cx,cy-bounce); ctx.rotate(0.2);
  px(ctx,-6,-2,12,9,pal.shirt);
  ctx.restore();
  px(ctx,cx-8+s*3,cy+2-bounce+lean,5,3,pal.skin);
  px(ctx,cx-7+s*3,cy+5-bounce+lean,2,4,'#444');
  px(ctx,cx-8+s*3,cy+9-bounce+lean,4,2,'#333');
  const tap = Math.sin(t * Math.PI * 8) > 0 ? 1 : 0;
  px(ctx,cx+5,cy+2-bounce+lean,5,3,pal.skin);
  px(ctx,cx+8,cy+5-bounce+lean+tap,3,2,pal.skin);
  px(ctx,cx+7,cy+7-bounce+lean,3,2,'#f7768e');
  px(ctx,cx+11,cy+7-bounce+lean,3,2,'#9ece6a');
  drawHeadFront(ctx, cx+lean, cy-12-bounce, pal, false);
}

// ── drinking_espresso — sitting at bar sipping ───────────────────
function drawDrinkingEspresso(ctx, cx, cy, pal, t) {
  const sip = Math.sin(t * Math.PI * 2);
  const drinking = sip > 0.7;
  const cupY = drinking ? -6 : 2;
  shd(ctx, cx, cy+16);
  px(ctx,cx-4,cy+6,4,7,pal.pants); px(ctx,cx+1,cy+6,4,7,pal.pants);
  px(ctx,cx-5,cy+12,5,3,'#1a1a2a'); px(ctx,cx+1,cy+12,5,3,'#1a1a2a');
  px(ctx,cx-8,cy+5,16,2,'#8a6040');
  px(ctx,cx-2,cy+7,4,10,'#8a6040');
  px(ctx,cx-6,cy-3,12,9,pal.shirt);
  px(ctx,cx-9,cy+cupY,5,3,pal.skin);
  px(ctx,cx-11,cy+cupY-1,5,4,'#6a4020');
  px(ctx,cx-10,cy+cupY,3,2,'#f0e8d8');
  if (!drinking) {
    ctx.save(); ctx.globalAlpha=0.3;
    const w1 = Math.sin(t*Math.PI*3)*2;
    const w2 = Math.sin(t*Math.PI*3+1)*2;
    ctx.strokeStyle='#ccc'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cx-10,cy+cupY-3); ctx.quadraticCurveTo(cx-10+w1,cy+cupY-7,cx-9,cy+cupY-10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-8,cy+cupY-3); ctx.quadraticCurveTo(cx-8+w2,cy+cupY-7,cx-7,cy+cupY-10); ctx.stroke();
    ctx.restore();
  }
  px(ctx,cx+5,cy+1,6,3,pal.skin);
  drawHeadFront(ctx, cx, cy-11, pal, drinking);
}

// ── djing — standing at DJ console ───────────────────────────────
function drawDJing(ctx, cx, cy, pal, t) {
  const bob = Math.sin(t * Math.PI * 6) * 2;
  const nod = Math.sin(t * Math.PI * 6) * 0.1;
  const discAngle = t * Math.PI * 2;
  shd(ctx, cx, cy+16);
  px(ctx,cx-6,cy+5-bob,4,9+bob,pal.pants);
  px(ctx,cx+3,cy+5-bob,4,9+bob,pal.pants);
  px(ctx,cx-7,cy+13,5,3,'#1a1a2a'); px(ctx,cx+3,cy+13,5,3,'#1a1a2a');
  px(ctx,cx-6,cy-2-bob,12,9,pal.shirt);
  const txOff = Math.cos(discAngle)*4;
  const tyOff = Math.sin(discAngle)*2;
  px(ctx,cx-10+txOff,cy+1-bob+tyOff,5,3,pal.skin);
  const fader = Math.sin(t*Math.PI*4)*3;
  px(ctx,cx+7,cy+1-bob,5,3,pal.skin);
  px(ctx,cx+10,cy+2-bob+fader,3,2,pal.skin);
  ctx.save(); ctx.translate(cx,cy-11-bob); ctx.rotate(nod);
  ctx.fillStyle=pal.skin; ctx.beginPath(); ctx.ellipse(0,0,7,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=pal.hair; ctx.beginPath(); ctx.ellipse(0,-2,7,6,0,-Math.PI,0); ctx.fill();
  ctx.fillStyle='#1a1b26'; ctx.fillRect(-4,-2,4,3); ctx.fillRect(1,-2,4,3);
  ctx.strokeStyle='#303040'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,-4,9,Math.PI*1.1,Math.PI*1.9); ctx.stroke();
  px(ctx,-9,-2,3,6,'#303040');
  px(ctx,7,-2,3,6,'#303040');
  ctx.restore();
}

// ── fixing_server — crouching at server rack ─────────────────────
function drawFixingServer(ctx, cx, cy, pal, t) {
  const reach = Math.sin(t * Math.PI * 2) * 3;
  const spark = Math.sin(t * Math.PI * 8) > 0.9;
  shd(ctx, cx, cy+16);
  px(ctx,cx-5,cy+4,5,5,pal.pants); px(ctx,cx+1,cy+4,5,5,pal.pants);
  px(ctx,cx-7,cy+8,5,6,pal.pants); px(ctx,cx+3,cy+8,5,6,pal.pants);
  px(ctx,cx-8,cy+13,5,3,'#1a1a2a'); px(ctx,cx+3,cy+13,5,3,'#1a1a2a');

// ── shooting_basket — throwing basketball ────────────────────────
function drawShootingBasket(ctx, cx, cy, pal, t) {
  const phase = t < 0.4 ? 0 : t < 0.6 ? 1 : 2;
  const lift = phase === 1 ? 2 : 0;
  shd(ctx, cx, cy+16);
  px(ctx,cx-4,cy+5+lift,4,9-lift,pal.pants);
  px(ctx,cx+1,cy+5+lift,4,9-lift,pal.pants);
  px(ctx,cx-5,cy+13,5,3,'#1a1a2a'); px(ctx,cx+1,cy+13,5,3,'#1a1a2a');
  px(ctx,cx-6,cy-2-lift,12,9,pal.shirt);
  if (phase === 0) {
    px(ctx,cx-7,cy-8-lift,5,3,pal.skin);
    px(ctx,cx+3,cy-8-lift,5,3,pal.skin);
    ctx.fillStyle='#e88030'; ctx.beginPath(); ctx.arc(cx,cy-14-lift,4,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#c06020'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(cx,cy-14-lift,4,0,Math.PI*2); ctx.stroke();
  } else if (phase === 1) {
    const releaseT = (t - 0.4) / 0.2;
    px(ctx,cx-5,cy-14-lift,4,3,pal.skin);
    px(ctx,cx+2,cy-14-lift,4,3,pal.skin);
    const ballY = cy - 18 - lift - releaseT * 14;
    const ballX = cx + releaseT * 4;
    ctx.fillStyle='#e88030'; ctx.beginPath(); ctx.arc(ballX,ballY,4,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#c06020'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(ballX,ballY,4,0,Math.PI*2); ctx.stroke();
  } else {
    px(ctx,cx-5,cy-14,4,3,pal.skin);
    px(ctx,cx+2,cy-14,4,3,pal.skin);
    const ftT = (t - 0.6) / 0.4;
    const ballY = cy - 32 + ftT * 10;
    const ballX = cx + 4 + ftT * 2;
    ctx.fillStyle='#e88030'; ctx.beginPath(); ctx.arc(ballX,ballY,4,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#c06020'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(ballX,ballY,4,0,Math.PI*2); ctx.stroke();
  }
  drawHeadFront(ctx, cx, cy-11-lift, pal, false);
}

// ── playing_foosball — at foosball table side view ───────────────
function drawPlayingFoosball(ctx, cx, cy, pal, t) {

  px(ctx,cx+8+lean,cy+2,4,3,pal.skin);
  ctx.strokeStyle='#888'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(cx-14+lean,cy+3); ctx.lineTo(cx+14+lean,cy+3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-14+lean,cy+6); ctx.lineTo(cx+14+lean,cy+6); ctx.stroke();

  px(ctx,cx-6,cy-4,10,14,'#6050a0');
  px(ctx,cx+4,cy+8+jy,12,4,pal.pants);
